<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBloom | Log In</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --text-main: #2D3436; 
            --accent-red: #7a1d1d; 
            --bg-soft: #fff9e6;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
        }

        /* GLASSY BLUE NAVBAR */
        .navbar {
            background: rgba(199, 221, 255, 0.5); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4); 
            padding: 10px 40px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo-handwritten {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.5rem; 
            color: var(--accent-red) !important;
            text-decoration: none;
            line-height: 1;
        }

        .nav-link {
            font-weight: 600;
            font-size: 0.9rem; 
            color: var(--text-main) !important;
            opacity: 0.7;
            transition: all 0.3s ease;
            margin-right: 15px;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--accent-red) !important;
        }

        /* VINTAGE AUTHENTICATION CARD */
        .auth-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(122, 29, 29, 0.15);
            margin-top: 60px; /* Accounts for navbar */
        }

        .auth-title {
            font-family: 'Pinyon Script', cursive;
            color: var(--accent-red);
            font-size: 3.5rem;
            margin-bottom: 5px;
            line-height: 1;
        }

        .auth-subtitle {
            color: var(--text-main);
            opacity: 0.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-control {
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(122, 29, 29, 0.2);
            background-color: #fdfbf7;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(122, 29, 29, 0.1);
            background-color: white;
            outline: none;
        }

        .btn-vintage {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.4s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(122, 29, 29, 0.2);
        }

        .btn-vintage:hover {
            background-color: #5c1414;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(122, 29, 29, 0.3);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .auth-links a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <nav class="navbar d-flex justify-content-between align-items-center">
        <a class="navbar-brand logo-handwritten" href="{{ url_for('index') }}">MoodBloom</a>
        <div class="d-flex align-items-center">
            <a href="{{ url_for('register') }}" class="nav-link fw-bold" style="color: var(--accent-red) !important;">Sign Up</a>
        </div>
    </nav>

    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Unlock your almanac.</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn-vintage">Log In</button>
        </form>

        <div class="auth-links">
            <p class="mb-0">Need an account? <a href="/register">Sign up here</a></p>
        </div>
    </div>

</body>
</html>
