<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBloom | Log In</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --text-main: #2D3436; 
            --accent-chic: #D4A373; 
            --bg-soft: #fcf8f0;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-image: radial-gradient(circle at top right, #fffdf9, var(--bg-soft));
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .auth-title {
            font-family: 'Indie Flower', cursive;
            color: var(--accent-chic);
            font-size: 3rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .auth-subtitle {
            color: var(--text-main);
            opacity: 0.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-control {
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid #eaeaea;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-chic);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.2);
            background-color: white;
        }

        .btn-chic {
            background-color: var(--accent-chic);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .btn-chic:hover {
            background-color: #c29162;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(212, 163, 115, 0.3);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--text-main);
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }

        .auth-links a:hover {
            color: var(--accent-chic);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Unlock your emotional sanctuary.</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn-chic">Log In</button>
        </form>

        <div class="auth-links">
            <p class="mb-2">Need an account? <a href="/register" class="fw-bold">Sign up here</a></p>
            <a href="/" style="font-size: 0.85rem;">← Back to Home</a>
        </div>
    </div>

</body>
</html>
