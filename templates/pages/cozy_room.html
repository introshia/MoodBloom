<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Folio · Sanctuary</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0402
    }

    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair
    }

    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      z-index: 20;
      pointer-events: none
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 17px;
      color: rgba(255, 190, 90, .88);
      pointer-events: all;
      cursor: pointer;
      letter-spacing: -.01em
    }

    .logo span {
      font-size: 12px;
      opacity: .55;
      font-weight: 300
    }

    .links {
      display: flex;
      gap: 32px
    }

    .links a {
      font-size: 12px;
      color: rgba(200, 130, 50, .5);
      text-decoration: none;
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: all;
      cursor: pointer;
      transition: color .2s;
      font-weight: 300
    }

    .links a:hover,
    .links a.active {
      color: rgba(255, 190, 90, .9)
    }

    #tip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s;
      z-index: 30;
      background: rgba(10, 4, 1, .92);
      border: 1px solid rgba(180, 90, 25, .25);
      border-radius: 9px;
      padding: 7px 14px;
      white-space: nowrap
    }

    #tip .tt {
      font-family: 'Lora', serif;
      font-size: 12px;
      color: #FFA84A;
      margin-bottom: 2px
    }

    #tip .ts {
      font-size: 10px;
      color: rgba(160, 90, 30, .8);
      font-weight: 300;
      letter-spacing: .04em
    }

    #modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s
    }

    #modal.show {
      opacity: 1;
      pointer-events: all
    }

    .m-ov {
      position: absolute;
      inset: 0;
      background: rgba(4, 1, 0, .72)
    }

    .m-card {
      position: relative;
      background: #1A0802;
      border: 1px solid rgba(180, 90, 25, .22);
      border-radius: 18px;
      padding: 38px 44px;
      min-width: 320px;
      max-width: 460px;
      text-align: center
    }

    .m-card h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      color: #FFBA60;
      font-weight: 400;
      margin-bottom: 10px
    }

    .m-card p {
      font-size: 13px;
      color: rgba(180, 110, 40, .75);
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 28px
    }

    .m-btn {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid rgba(200, 110, 30, .4);
      border-radius: 24px;
      color: #FFA040;
      font-size: 12px;
      letter-spacing: .1em;
      cursor: pointer;
      transition: .2s;
      font-family: 'DM Sans', sans-serif
    }

    .m-btn:hover {
      background: rgba(200, 90, 20, .18)
    }

    .m-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 17px;
      color: rgba(180, 90, 30, .4);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit
    }

    .m-close:hover {
      color: rgba(255, 160, 60, .75)
    }

    #lamptgl {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 20;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .28);
      border-radius: 20px;
      padding: 7px 18px;
      color: rgba(200, 120, 40, .7);
      font-size: 11px;
      letter-spacing: .12em;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: .2s
    }

    #lamptgl:hover {
      color: rgba(255, 190, 80, .95)
    }

    #sound-ctrl {
      position: fixed;
      bottom: 72px;
      right: 36px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .55;
      transition: opacity .25s
    }

    #sound-ctrl:hover {
      opacity: 1
    }

    .s-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .2);
      color: rgba(200, 120, 40, .65);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s
    }

    .s-btn:hover,
    .s-btn.on {
      color: #FFA040;
      border-color: rgba(180, 90, 25, .45)
    }

    #timebadge {
      position: fixed;
      bottom: 28px;
      left: 44px;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(180, 100, 30, .38);
      pointer-events: none
    }

    #weatherbadge {
      position: fixed;
      bottom: 46px;
      left: 44px;
      font-size: 10px;
      color: rgba(160, 90, 30, .3);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .1em;
      pointer-events: none
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <nav id="nav">
    <div class="logo" id="logo-btn">&#10022; Folio <span>/ sanctuary</span></div>
    <div class="links">
      <a href="/dashboard">Folio</a>
      <a href="/sanctuary" class="active">Sanctuary</a>
      <a href="/journal">Journal</a>
      <a href="#" onclick="openM('mood');return false;">Mood</a>
    </div>
  </nav>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="m-ov" onclick="closeM()"></div>
    <div class="m-card">
      <button class="m-close" onclick="closeM()">&#x2715;</button>
      <h2 id="m-title"></h2>
      <p id="m-body"></p>
      <div class="m-btn" id="m-enter" onclick="closeM()">Enter &rarr;</div>
    </div>
  </div>

  <button id="lamptgl" onclick="toggleLamp()">&#9789; lamp</button>
  <div id="sound-ctrl">
    <button class="s-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#9835;</button>
    <button class="s-btn" id="btn-rain" onclick="toggleRain()" title="Rain">&#9748;</button>
  </div>
  <div id="timebadge">a quiet evening in your study</div>
  <div id="weatherbadge"></div>

  <script>
    // ── STATE ─────────────────────────────────────────────────────
    var lampOn = true, time = 0, hov = null;
    var mouseX = 0.5, mouseY = 0.5;
    var vinylPlaying = false, vinylAngle = 0;
    var journalDays = 0; // replace with: Number("{{ streak_days|default(0) }}")
    var weatherType = 'clear';
    var raindrops = [], snowflakes = [];
    var catBreath = 0, pageFlutter = 0;
    var musicOn = false, rainSoundOn = false;

    // Fireflies
    var fireflies = [];
    for (var _fi = 0; _fi < 10; _fi++) {
      fireflies.push({
        ox: 0.363 + Math.random() * 0.016, oy: 0.495 + Math.random() * 0.042,
        phase: Math.random() * Math.PI * 2, spd: 0.010 + Math.random() * 0.010,
        col: Math.random() > 0.5 ? '180,255,120' : '255,230,100'
      });
    }

    // Dust motes
    var dust = [];
    for (var _di = 0; _di < 24; _di++) dust.push(resetDust({}));
    function resetDust(d) {
      d.x = 0.05 + Math.random() * 0.65; d.y = 0.14 + Math.random() * 0.52;
      d.vx = (Math.random() - 0.5) * 0.00028; d.vy = -Math.random() * 0.00038 - 0.00009;
      d.life = Math.random(); d.sz = 0.35 + Math.random() * 1.05; return d;
    }

    // Weather
    var WEATHERS = ['clear', 'rain', 'snow', 'clear', 'clear'], weatherIdx = 0;
    setInterval(function () { weatherIdx = (weatherIdx + 1) % WEATHERS.length; weatherType = WEATHERS[weatherIdx]; initWeather(); }, 40000);
    function initWeather() {
      raindrops = []; snowflakes = [];
      if (weatherType === 'rain') for (var i = 0; i < 110; i++) raindrops.push(newRain());
      else if (weatherType === 'snow') for (var i = 0; i < 55; i++) snowflakes.push(newSnow());
    }
    function newRain() { return { x: Math.random(), y: Math.random() - .2, spd: 0.006 + Math.random() * 0.005, len: 0.026 + Math.random() * 0.016, a: 0.22 + Math.random() * 0.3 }; }
    function newSnow() { return { x: Math.random(), y: Math.random() - .1, spd: 0.0008 + Math.random() * 0.0007, drift: Math.random() * 6, a: 0.4 + Math.random() * 0.4, r: 1 + Math.random() * 2 }; }
    initWeather();

    function toggleLamp() { lampOn = !lampOn; document.getElementById('lamptgl').innerHTML = lampOn ? '&#9789; lamp' : '&#9788; lamp'; }
    function toggleMusic() { musicOn = !musicOn; vinylPlaying = musicOn; document.getElementById('btn-music').classList.toggle('on', musicOn); }
    function toggleRain() { rainSoundOn = !rainSoundOn; document.getElementById('btn-rain').classList.toggle('on', rainSoundOn); }
    window.toggleLamp = toggleLamp; window.toggleMusic = toggleMusic; window.toggleRain = toggleRain;

    // Modals
    var MODALS = {
      home: ['Your Room', 'Welcome home. Everything you have written lives here, waiting.'],
      write: ['Writing Desk', 'Open your journal and begin. A blank page is a kind of freedom.'],
      archive: ['Journal Archive', 'All your past entries, organised by season, mood and memory.'],
      mood: ['Atmosphere', 'Your Atmosphere companion reflects how you have been feeling lately.'],
      cat: ['Your Bunny', 'She is dozing softly. Bunnies sleep with their eyes half-closed — she feels safe here.'],
      plant: ['The Plant', journalDays >= 5 ? 'Thriving. She can feel you have been writing regularly.' : 'She misses you. Come back and write — she will perk right up.'],
      jar: ['Firefly Jar', 'Each light holds a word from your most uplifting entries. Small glowing thoughts.'],
      vinyl: ['Record Player', 'A soft lo-fi track fills the room with warmth.']
    };
    function openM(key) {
      var d = MODALS[key] || [key, ''];
      document.getElementById('m-title').textContent = d[0];
      document.getElementById('m-body').textContent = d[1];
      document.getElementById('modal').classList.add('show');
    }
    function closeM() { document.getElementById('modal').classList.remove('show'); }
    window.openM = openM; window.closeM = closeM;

    document.getElementById('logo-btn').addEventListener('click', function () { location.href = '/dashboard'; });

    // ── CANVAS ────────────────────────────────────────────────────
    var canv = document.getElementById('c');
    var ctx = canv.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, books = [];

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canv.width = W * DPR; canv.height = H * DPR;
      canv.style.width = W + 'px'; canv.style.height = H + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(DPR, DPR);
      genBooks();
    }
    window.addEventListener('resize', resize);

    // ── DRAW HELPERS ──────────────────────────────────────────────
    function px(x) { return x * W; } function py(y) { return y * H; }

    function fr(x, y, w, h, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col;
      ctx.fillRect(px(x), py(y), px(w), py(h));
      ctx.globalAlpha = 1;
    }
    function fp(pts, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(px(pts[0]), py(pts[1]));
      for (var i = 2; i < pts.length; i += 2) ctx.lineTo(px(pts[i]), py(pts[i + 1]));
      ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
    }
    function linG(x0, y0, x1, y1, stops) {
      var g = ctx.createLinearGradient(px(x0), py(y0), px(x1), py(y1));
      for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
      return g;
    }
    function circ(x, y, r, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a; ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(px(x), py(y), r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    function h2(x, y) { var n = Math.sin(x * 127.1 + y * 311.7) * 43758.5; return n - Math.floor(n); }
    function flk(t) { return 0.75 + Math.sin(t * 0.13) * 0.12 + Math.sin(t * 0.37) * 0.07; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function plx(f) { return 0; } function ply(f) { return 0; }

    // ── LAYOUT (Pixel Room — bookshelf left, window right) ────────────
    // Window: right side of wall (substantially larger)
    var WX = 0.28, WY = 0.05, WW = 0.70, WH = 0.58;
    // Window panel open/close state
    var leftOpen = false, rightOpen = false;
    // Breeze particles
    var breezeParticles = [];
    for (var _bp = 0; _bp < 30; _bp++) {
      breezeParticles.push({ x: WX + Math.random() * WW, y: WY + Math.random() * WH, vx: -0.0010 - Math.random() * 0.0010, vy: (Math.random() - 0.5) * 0.0004, a: Math.random(), life: Math.random() });
    }
    function resetBreeze(p, fromRight) {
      p.x = fromRight ? WX + WW - 0.02 : WX + 0.02;
      p.y = WY + 0.05 + Math.random() * (WH - 0.10);
      p.vx = fromRight ? -0.0010 - Math.random() * 0.0012 : 0.0010 + Math.random() * 0.0012;
      p.vy = (Math.random() - 0.5) * 0.0004;
      p.a = 0.2 + Math.random() * 0.5; p.life = 0;
    }
    // Bookshelf: front-facing on the left
    var SX = 0.00, SY = 0.04, SW = 0.20, SH = 0.78;
    // Floor
    var FY = 0.80;
    // Desk layout (3D structure: top surface and vertical front face with drawers)
    var DESK_TOP_Y = 0.65;   // Back edge of desk against the wall
    var DESK_FRONT_Y = 0.82; // Front edge of the desk top surface
    // Items on desk
    var DX = 0.35, DY = 0.72, DW = 0.30, DH = 0.10; // for zone calculations
    var LX = 0.26, LY = 0.55; // desk lamp position (moved to left side)

    // Book generation (for left side wall shelf)
    var BCOLS = ['#8B1A1A', '#1848A8', '#1E7830', '#C87A18', '#5C1A90', '#A83818', '#0A2E68', '#388014', '#8C2438', '#CA6820', '#1A5090', '#609830'];
    function genBooks() {
      books = [];
      // In first-person the shelf is on the left side wall — books appear foreshortened
      // We generate them as a flat list; draw loop handles the perspective skew
      var SHL = [0.20, 0.38, 0.56, 0.73];
      for (var si = 0; si < SHL.length; si++) {
        var bx = 0.016;
        while (bx < SW - 0.022) {
          var bw = 0.013 + h2(si * 11, bx * 900) * 0.012;
          var bh = 0.065 + h2(si * 7, bx * 400) * 0.065;
          var ci = Math.floor(h2(si * 3, bx * 200) * BCOLS.length) % BCOLS.length;
          books.push({ shelf: si, bx: bx, bh: bh, bw: bw, col: BCOLS[ci] });
          bx += bw + 0.002 + h2(si, bx * 50) * 0.003;
        }
      }
    }

    // ── TIME OF DAY PALETTE ───────────────────────────────────────
    function getTOD() { var h = new Date().getHours(); if (h >= 5 && h < 8) return 'dawn'; if (h >= 8 && h < 17) return 'day'; if (h >= 17 && h < 20) return 'dusk'; return 'night'; }
    function getPal() {
      var t = getTOD();
      return ({
        dawn: { w0: '#D4C4A0', w1: '#C0AD8A', ceil: '#6A4A30', wTint: 'rgba(255,225,185,.80)', wGlow: '255,210,160', aR: 245, aG: 175, aB: 110 },
        day: { w0: '#EDE0C4', w1: '#D8CC9A', ceil: '#5A3A20', wTint: 'rgba(255,248,220,.90)', wGlow: '255,240,180', aR: 255, aG: 230, aB: 160 },
        dusk: { w0: '#CEBA97', w1: '#B8A480', ceil: '#4A2A14', wTint: 'rgba(255,185,110,.78)', wGlow: '255,165,90', aR: 255, aG: 165, aB: 90 },
        night: { w0: '#9A8E78', w1: '#7C7060', ceil: '#2A1A0E', wTint: 'rgba(80,100,185,.45)', wGlow: '100,130,225', aR: 120, aG: 148, aB: 225 }
      })[t] || { w0: '#7A4828', w1: '#60341A', ceil: '#30180A', wTint: 'rgba(255,248,200,.86)', wGlow: '255,235,155', aR: 255, aG: 215, aB: 120 };
    }

    // ── MAIN DRAW (First-Person POV) ──────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      var pal = getPal();
      var anyOpen = leftOpen || rightOpen;

      // ── 1. FULL WALL BACKGROUND ────────────────────────────────────
      // Cream-colored wall fills everything behind furniture
      ctx.fillStyle = linG(0.5, 0, 0.5, FY, [[0, pal.ceil], [0.08, pal.w0], [0.5, pal.w1], [1, pal.w1]]);
      ctx.fillRect(0, 0, W, py(FY));

      // Subtle wallpaper texture on wall areas (skip where window/shelf will be)
      ctx.globalAlpha = 0.045;
      var STEP = Math.max(18, Math.round(W / 42));
      for (var wx2 = 0; wx2 < W; wx2 += STEP) {
        for (var wy2 = py(0.07); wy2 < py(FY); wy2 += STEP) {
          var nx2 = wx2 / W;
          if (nx2 >= WX - 0.01 && nx2 <= WX + WW + 0.01) continue; // skip window area
          if (nx2 <= SX + SW + 0.01) continue; // skip shelf area
          ctx.fillStyle = '#A08050';
          ctx.save(); ctx.translate(wx2, wy2); ctx.rotate(Math.PI / 4);
          var ss2 = STEP * 0.32; ctx.fillRect(-ss2, -ss2, ss2 * 2, ss2 * 2); ctx.restore();
        }
      }
      ctx.globalAlpha = 1;

      // Crown molding
      fr(0, 0.040, 1, 0.016, 'rgba(0,0,0,.12)');
      fr(0, 0.028, 1, 0.014, 'rgba(0,0,0,.08)');
      // Baseboard (only for the wall behind the desk/window)
      fr(SW, FY - 0.018, 1 - SW, 0.020, 'rgba(0,0,0,.18)');
      fr(SW, FY - 0.022, 1 - SW, 0.006, 'rgba(0,0,0,.10)');

      // Wall-shelf dividing edge (where left wall meets front wall)
      var wEdge = ctx.createLinearGradient(px(SW), 0, px(SW + 0.05), 0);
      wEdge.addColorStop(0, 'rgba(0,0,0,.35)'); wEdge.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = wEdge; ctx.fillRect(px(SW), py(0.04), px(0.05), py(FY - 0.04));

      // ── 2. SKY (drawn behind window, in window area only) ────────────
      var skyTop, skyBot;
      var tod = getTOD();
      if (tod === 'dawn') { skyTop = '#3A2050'; skyBot = '#D07848'; }
      else if (tod === 'day') { skyTop = '#2A5CA8'; skyBot = '#6898D8'; }
      else if (tod === 'dusk') { skyTop = '#18102A'; skyBot = '#A03810'; }
      else { skyTop = '#050810'; skyBot = '#10122A'; }
      var skyG = ctx.createLinearGradient(0, py(WY), 0, py(WY + WH));
      skyG.addColorStop(0, skyTop); skyG.addColorStop(1, skyBot);
      ctx.save();
      ctx.beginPath(); ctx.rect(px(WX), py(WY), px(WW), py(WH)); ctx.clip();
      ctx.fillStyle = skyG; ctx.fillRect(px(WX), py(WY), px(WW), py(WH));
      ctx.restore();

      // ── 3. FLOOR ────────────────────────────────────────────────────
      ctx.fillStyle = linG(0.5, FY, 0.5, 1, [[0, '#5A3A18'], [0.3, '#4A2E10'], [1, '#2A1808']]);
      ctx.fillRect(0, py(FY), W, py(1 - FY));
      // Floor planks
      ctx.strokeStyle = 'rgba(0,0,0,.22)'; ctx.lineWidth = 0.5;
      for (var fy3 = FY; fy3 < 1.0; fy3 += 0.022) {
        ctx.beginPath(); ctx.moveTo(0, py(fy3)); ctx.lineTo(W, py(fy3)); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(0,0,0,.10)'; ctx.lineWidth = 0.4;
      for (var fpk = 0; fpk < 18; fpk++) { var ftx = fpk / 17; ctx.beginPath(); ctx.moveTo(px(ftx), py(FY)); ctx.lineTo(px(ftx + 0.15 * (ftx - 0.5)), py(1)); ctx.stroke(); }

      // ── 4. WINDOW GLOW ──────────────────────────────────────────

      // ── 5. WINDOW GLOW ──────────────────────────────────────────
      var wa = lampOn ? 0.55 : 0.25;
      if (anyOpen) wa = Math.min(wa + 0.18, 0.90);
      var wgg = ctx.createRadialGradient(px(WX + WW * 0.4), py(WY + WH * 0.5), px(0.02), px(WX + WW * 0.4), py(WY + WH * 0.5), px(0.60));
      wgg.addColorStop(0, 'rgba(' + pal.wGlow + ',' + wa + ')');
      wgg.addColorStop(0.5, 'rgba(' + pal.wGlow + ',' + (wa * 0.3) + ')');
      wgg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = wgg; ctx.fillRect(0, 0, W, H);

      // ── 7. WINDOW FRAME ───────────────────────────────────────────
      // Outer frame (dark wood)
      var fT = 0.018; // frame thickness (normalized)
      fr(WX, WY, WW, WH, '#2E1408'); // full frame background
      // Center divider (vertical) — splits left/right panels
      fr(WX + WW * 0.5 - 0.010, WY, 0.020, WH, '#2A1206');
      // Top rail
      fr(WX, WY, WW, fT, '#381808');
      // Bottom sill
      fr(WX, WY + WH - fT, WW, fT * 1.5, '#2E1408');
      // Left jamb
      fr(WX, WY, fT, WH, '#381808');
      // Right jamb
      fr(WX + WW - fT, WY, fT, WH, '#381808');

      // ── 8. WINDOW PANELS (independently open/close) ───────────────
      var pW = WW / 2 - fT * 1.3; // panel content width
      var pX_L = WX + fT;          // left panel glass start X
      var pX_R = WX + WW * 0.5 + fT * 0.5; // right panel glass start X
      var pY = WY + fT;            // panel top
      var pH = WH - fT * 2.5;     // panel height
      // Grill bars: 2x2 grid per panel (1 horizontal, 1 vertical crossing) = 4 panes per side
      var midY = pY + pH * 0.50; // horizontal divider
      var midXL = pX_L + pW * 0.50; // left vertical divider
      var midXR = pX_R + pW * 0.50; // right vertical divider
      var pC = lampOn ? pal.wTint : 'rgba(38,52,115,.28)';

      // LEFT PANEL
      if (!leftOpen) {
        // Closed: draw glass with grills
        fr(pX_L, pY, pW, pH, pC);
        fr(pX_L, pY, pW, 0.018, 'rgba(255,255,220,.18)'); // top highlight
        fr(pX_L, pY, 0.008, pH, 'rgba(255,255,220,.10)'); // left highlight
        // cross grid
        fr(midXL - 0.005, pY, 0.011, pH, '#2A1206'); // vertical bar
        fr(pX_L, midY - 0.005, pW, 0.011, '#2A1206'); // horizontal bar
        fr(midXL - 0.002, pY, 0.004, pH, 'rgba(80,40,10,.18)'); // v-highlight
        fr(pX_L, midY - 0.002, pW, 0.004, 'rgba(80,40,10,.18)'); // h-highlight
      } else {
        // Open: panel swung inward — draw as foreshortened (thin strip on left edge of window)
        var openW = pW * 0.12;
        fr(pX_L, pY, openW, pH, '#2A1206');
        fr(pX_L, pY, openW, pH, 'rgba(0,0,0,.40)');
        // Reveal sky through open area
        var openSkyG = ctx.createLinearGradient(px(pX_L + openW), py(pY), px(pX_L + pW), py(pY));
        openSkyG.addColorStop(0, skyBot); openSkyG.addColorStop(1, skyTop);
        ctx.fillStyle = openSkyG; ctx.fillRect(px(pX_L + openW), py(pY), px(pW - openW), py(pH));
        // Curtain flutter (left side)
        var flutterL = Math.sin(time * 0.08) * 0.02 * (leftOpen ? 1 : 0);
        fp([pX_L - 0.04, WY - 0.01,
        pX_L - 0.01 + flutterL, WY - 0.01,
        pX_L - 0.005 + flutterL * 0.5, WY + WH + 0.02,
        pX_L - 0.048, WY + WH + 0.02], '#6A1C10', 0.88);
      }

      // RIGHT PANEL
      if (!rightOpen) {
        fr(pX_R, pY, pW, pH, pC);
        fr(pX_R, pY, pW, 0.018, 'rgba(255,255,220,.18)');
        fr(pX_R + pW - 0.008, pY, 0.008, pH, 'rgba(255,255,220,.10)');
        // cross grid
        fr(midXR - 0.005, pY, 0.011, pH, '#2A1206'); // vertical bar
        fr(pX_R, midY - 0.005, pW, 0.011, '#2A1206'); // horizontal bar
        fr(midXR - 0.002, pY, 0.004, pH, 'rgba(80,40,10,.18)'); // v-highlight
        fr(pX_R, midY - 0.002, pW, 0.004, 'rgba(80,40,10,.18)'); // h-highlight
      } else {
        var openW2 = pW * 0.12;
        fr(pX_R + pW - openW2, pY, openW2, pH, '#2A1206');
        fr(pX_R + pW - openW2, pY, openW2, pH, 'rgba(0,0,0,.40)');
        var openSkyG2 = ctx.createLinearGradient(px(pX_R), py(pY), px(pX_R + pW - openW2), py(pY));
        openSkyG2.addColorStop(0, skyTop); openSkyG2.addColorStop(1, skyBot);
        ctx.fillStyle = openSkyG2; ctx.fillRect(px(pX_R), py(pY), px(pW - openW2), py(pH));
        var flutterR = Math.sin(time * 0.08 + 1.2) * 0.02;
        fp([pX_R + pW + 0.01, WY - 0.01,
        pX_R + pW + 0.048, WY - 0.01,
        pX_R + pW + 0.052, WY + WH + 0.02,
        pX_R + pW + 0.005 + flutterR * 0.5, WY + WH + 0.02], '#6A1C10', 0.88);
      }

      // ── 9. CURTAINS (adaptive Antique Linen with lamp glow) ──────────
      var cFlutterL = anyOpen ? Math.sin(time * 0.07) * 0.014 : 0;
      var cFlutterR = anyOpen ? Math.sin(time * 0.07 + 0.8) * 0.014 : 0;

      // Curtain palette
      var cBase = '#FDF5E6'; // Antique Linen
      var cShadow = '#E8DEC7'; // Soft Sand shadow
      var cGlow = 'rgba(255, 180, 50, 0.45)'; // Warm Amber glow

      // Left curtain draw
      (function () {
        var x1 = WX - 0.07, y1 = WY - 0.02, x2 = WX + 0.04 + cFlutterL, y2 = WY + WH + 0.03;
        var g = ctx.createLinearGradient(px(x1), py(y1), px(x2), py(y2));
        g.addColorStop(0, cBase);
        g.addColorStop(lampOn ? 0.3 : 0.8, cBase);
        g.addColorStop(lampOn ? 0.7 : 0.95, cShadow);
        if (lampOn) {
          g.addColorStop(0.85, 'rgba(255, 180, 50, 0.25)'); // soft ramp
          g.addColorStop(1, 'rgba(255, 140, 20, 0.55)');   // rich core
        }

        // Base drape
        fp([x1, y1, x2, y1, x2 + 0.01, y2, x1 - 0.01, y2], g);
        // Vertical pleats for texture
        ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
        for (var pi = 0; pi < 3; pi++) {
          var px1 = x1 + 0.02 + pi * 0.025;
          ctx.beginPath(); ctx.moveTo(px(px1), py(y1));
          ctx.lineTo(px(px1 + cFlutterL), py(y2)); ctx.stroke();
        }
      })();

      // Right curtain draw (closer to the lamp usually)
      (function () {
        var x1 = WX + WW - 0.04 + cFlutterR, y1 = WY - 0.02, x2 = WX + WW + 0.07, y2 = WY + WH + 0.03;
        var g = ctx.createLinearGradient(px(WX + WW), py(y1), px(WX + WW), py(y2));
        g.addColorStop(0, cBase);
        g.addColorStop(lampOn ? 0.4 : 0.8, cBase);
        g.addColorStop(lampOn ? 0.8 : 0.95, cShadow);
        if (lampOn) {
          g.addColorStop(0.9, 'rgba(255, 200, 100, 0.15)'); // very subtle window-side catch
          g.addColorStop(1, 'rgba(255, 180, 50, 0.35)');
        }

        // Base drape
        fp([x1, y1, x2, y1, x2 + 0.01, y2, x1 - 0.01, y2], g);
        // Vertical pleats
        ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
        for (var pi = 0; pi < 3; pi++) {
          var px1 = x1 + 0.02 + pi * 0.025;
          ctx.beginPath(); ctx.moveTo(px(px1), py(y1));
          ctx.lineTo(px(px1 + cFlutterR), py(y2)); ctx.stroke();
        }
      })();
      // Curtain rod
      fr(WX - 0.08, WY - 0.030, WW + 0.16, 0.018, '#4A2210');
      ctx.fillStyle = '#6A3818';
      ctx.beginPath(); ctx.arc(px(WX - 0.082), py(WY - 0.021), px(0.011), 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px(WX + WW + 0.082), py(WY - 0.021), px(0.011), 0, Math.PI * 2); ctx.fill();

      // Window sill ledge (bottom of window, connects to wall/desk area)
      fr(WX - 0.06, WY + WH, WW + 0.12, 0.030, '#3A1C0A');
      fr(WX - 0.06, WY + WH, WW + 0.12, 0.010, '#4A2810');

      // ── 10. WEATHER (rain/snow clipped to open panes) ─────────────
      if (weatherType === 'rain' && anyOpen) {
        // Clip to window area
        ctx.save();
        ctx.beginPath(); ctx.rect(px(WX + fT), py(pY), px(WW - fT * 2), py(pH)); ctx.clip();
        ctx.strokeStyle = 'rgba(180,215,255,.55)'; ctx.lineWidth = 1;
        for (var ri = 0; ri < raindrops.length; ri++) {
          var rd = raindrops[ri]; rd.y += rd.spd;
          if (rd.y > pY + pH + 0.05) rd.y = pY - 0.05;
          if (rd.x < WX || rd.x > WX + WW) rd.x = WX + Math.random() * WW;
          ctx.globalAlpha = rd.a; ctx.beginPath();
          ctx.moveTo(px(rd.x), py(rd.y)); ctx.lineTo(px(rd.x - 0.002), py(rd.y + rd.len)); ctx.stroke();
        }
        ctx.globalAlpha = 1; ctx.restore();
      }
      if (weatherType === 'snow' && anyOpen) {
        ctx.save();
        ctx.beginPath(); ctx.rect(px(WX + fT), py(pY), px(WW - fT * 2), py(pH)); ctx.clip();
        for (var sni = 0; sni < snowflakes.length; sni++) {
          var sf = snowflakes[sni]; sf.y += sf.spd; sf.x += Math.sin(time * 0.02 + sf.drift) * 0.0003;
          if (sf.y > pY + pH + 0.04) { sf.y = pY - 0.04; sf.x = WX + Math.random() * WW; }
          circ(sf.x, sf.y, sf.r, 'rgba(218,232,255,1)', sf.a);
        }
        ctx.restore();
      }

      // ── 11. BREEZE PARTICLES (when any panel is open) ──────────────
      if (anyOpen) {
        for (var bpi = 0; bpi < breezeParticles.length; bpi++) {
          var bp = breezeParticles[bpi];
          bp.x += bp.vx; bp.y += bp.vy; bp.life += 0.008;
          bp.a = Math.sin(bp.life * Math.PI) * 0.4;
          if (bp.life > 1 || bp.x < 0.05 || bp.x > 0.95) {
            resetBreeze(bp, rightOpen && !leftOpen);
          }
          ctx.globalAlpha = bp.a;
          ctx.strokeStyle = 'rgba(210,240,255,1)'; ctx.lineWidth = 0.6;
          ctx.beginPath(); ctx.moveTo(px(bp.x), py(bp.y)); ctx.lineTo(px(bp.x - bp.vx * 18), py(bp.y)); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      // ── 12. WINDOW LIGHT SHAFT (coming from the right onto floor/desk) ──
      // This is the "transparent vertical thingy" - we'll clip it so it doesn't overlap the shelf area
      if (lampOn || anyOpen) {
        ctx.save();
        // Clip to exclude the left bookshelf area
        ctx.beginPath();
        ctx.rect(px(SW), 0, px(1 - SW), H);
        ctx.clip();

        var sg = ctx.createLinearGradient(px(WX), py(WY + WH), px(WX - 0.15), py(1.05));
        sg.addColorStop(0, 'rgba(' + pal.wGlow + ',.14)'); sg.addColorStop(1, 'rgba(' + pal.wGlow + ',0)');
        ctx.fillStyle = sg; ctx.beginPath();
        ctx.moveTo(px(WX + 0.02), py(WY + WH));
        ctx.lineTo(px(WX + WW - 0.02), py(WY + WH));
        ctx.lineTo(px(1.0), py(1.06)); ctx.lineTo(px(WX - 0.30), py(1.06));
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }

      // ── 13. WALL BELOW WINDOW (between sill and desk) ──────────────
      // Modified to start at SW (bookshelf edge) to fix the horizontal line cutting through the shelf
      var wallBelowY = WY + WH + 0.022;
      var wallBelowH = DESK_TOP_Y - wallBelowY;
      fr(SW, wallBelowY, 1 - SW, wallBelowH, pal.w1);

      // Window sill
      fr(WX - 0.04, WY + WH, WW + 0.08, 0.024, '#4A2810');
      fr(WX - 0.04, WY + WH, WW + 0.08, 0.010, '#6A3C18');
      // Baseboard (above desk)
      // Also modified to start at SW
      fr(SW, DESK_TOP_Y - 0.016, 1 - SW, 0.018, 'rgba(0,0,0,.15)');

      // ── 14. BOOKSHELF (Drawn here so it's in front of wall shadows/lines) ──
      drawIvy();
      drawFrontBookshelf();

      // ── 14. DESK SURFACE (3D desk matching photo reference) ──────────
      var dt_L = 0.18, dt_R = 0.98; // Width at the wall (aligned with window roughly)
      var df_L = -0.05, df_R = 1.05; // Width at front edge (perspective spread)

      // A. Top Surface (Trapezoid from wall to front edge)
      var topG = ctx.createLinearGradient(0, py(DESK_TOP_Y), 0, py(DESK_FRONT_Y));
      topG.addColorStop(0, '#754B2F');
      topG.addColorStop(0.5, '#56341E');
      topG.addColorStop(1, '#3B2212');
      ctx.fillStyle = topG;
      ctx.beginPath();
      ctx.moveTo(px(dt_L), py(DESK_TOP_Y));
      ctx.lineTo(px(dt_R), py(DESK_TOP_Y));
      ctx.lineTo(px(df_R), py(DESK_FRONT_Y));
      ctx.lineTo(px(df_L), py(DESK_FRONT_Y));
      ctx.closePath(); ctx.fill();

      // Wood grain lines (receding into distance on the top surface)
      ctx.strokeStyle = 'rgba(20,10,0,.15)'; ctx.lineWidth = 1.2;
      var vpX = px((dt_L + dt_R) / 2), vpY = py(0.2); // Vanishing point
      for (var gi = 0; gi <= 24; gi++) {
        var startX = px(df_L + (df_R - df_L) * (gi / 24));
        ctx.beginPath();
        ctx.moveTo(startX, py(DESK_FRONT_Y));
        ctx.lineTo(vpX + (startX - vpX) * 0.45, py(DESK_TOP_Y));
        ctx.stroke();
      }

      // B. Desk Front Lip (Thickness of the top wood panel)
      var lipH = 0.018; // Thickness
      ctx.fillStyle = '#261208';
      ctx.beginPath();
      ctx.moveTo(px(df_L), py(DESK_FRONT_Y));
      ctx.lineTo(px(df_R), py(DESK_FRONT_Y));
      ctx.lineTo(px(df_R), py(DESK_FRONT_Y + lipH));
      ctx.lineTo(px(df_L), py(DESK_FRONT_Y + lipH));
      ctx.closePath(); ctx.fill();
      // Highlight on the top front edge
      fr(df_L, DESK_FRONT_Y, df_R - df_L, 0.003, '#825234');
      fr(df_L, DESK_FRONT_Y + lipH - 0.002, df_R - df_L, 0.002, '#140804'); // lower shadow

      // C. Front Face (Desk body with left/right pedestals and leg space)
      var faceY = DESK_FRONT_Y + lipH;

      // Top drawer band (the horizontal frame beneath the surface lip)
      var bandH = 0.035;
      var bandG = ctx.createLinearGradient(0, py(faceY), 0, py(faceY + bandH));
      bandG.addColorStop(0, '#1E0E06'); bandG.addColorStop(1, '#0C0502');
      ctx.fillStyle = bandG;
      ctx.fillRect(px(df_L), py(faceY), px(df_R - df_L), py(bandH));

      // Left Pedestal (going to floor)
      var pW = (df_R - df_L) * 0.28;
      var pedR_X = df_R - pW;

      var pedG = ctx.createLinearGradient(0, py(faceY + bandH), 0, H);
      pedG.addColorStop(0, '#160B05'); pedG.addColorStop(1, '#050201');
      ctx.fillStyle = pedG;
      ctx.beginPath();
      // left ped
      ctx.moveTo(px(df_L), py(faceY + bandH)); ctx.lineTo(px(df_L + pW), py(faceY + bandH));
      ctx.lineTo(px(df_L + pW), H); ctx.lineTo(px(df_L), H);
      // right ped
      ctx.moveTo(px(pedR_X), py(faceY + bandH)); ctx.lineTo(px(df_R), py(faceY + bandH));
      ctx.lineTo(px(df_R), H); ctx.lineTo(px(pedR_X), H);
      ctx.closePath(); ctx.fill();

      // Knee-hole back wall shadow
      var kneeW = pedR_X - (df_L + pW);
      // Deep shadow under the desk
      var kneeG = ctx.createLinearGradient(0, py(faceY + bandH), 0, H);
      kneeG.addColorStop(0, '#0D0502'); kneeG.addColorStop(1, '#000000');
      ctx.fillStyle = kneeG;
      ctx.fillRect(px(df_L + pW), py(faceY + bandH), px(kneeW), py(1.0 - (faceY + bandH)));

      // D. Drawers (placed on the pedestals)
      var dwW = pW * 0.75;
      var dwH = 0.12;
      var dlX = df_L + (pW - dwW) * 0.5; // center on left pedestal
      var drX = pedR_X + (pW - dwW) * 0.5; // center on right pedestal

      // Left Drawer
      fr(dlX, faceY + 0.05, dwW, dwH, '#200D06'); // base
      fr(dlX, faceY + 0.05, dwW, 0.005, '#381C0C'); // top highlight
      fr(dlX, faceY + 0.05 + dwH - 0.005, dwW, 0.005, '#080301'); // bottom shadow
      fr(dlX + dwW - 0.004, faceY + 0.05, 0.004, dwH, '#0C0502'); // side shadow
      fr(dlX + dwW * 0.35, faceY + 0.09, dwW * 0.3, 0.008, '#080301'); // handle

      // Right Drawer
      fr(drX, faceY + 0.05, dwW, dwH, '#200D06');
      fr(drX, faceY + 0.05, dwW, 0.005, '#381C0C');
      fr(drX, faceY + 0.05 + dwH - 0.005, dwW, 0.005, '#080301');
      fr(drX + dwW - 0.004, faceY + 0.05, 0.004, dwH, '#0C0502');
      fr(drX + dwW * 0.35, faceY + 0.09, dwW * 0.3, 0.008, '#080301');

      // Second set of lower drawers (bottom stack)
      fr(dlX, faceY + 0.20, dwW, dwH, '#1c0b05');
      fr(dlX, faceY + 0.20, dwW, 0.004, '#2A1408');
      fr(dlX + dwW * 0.35, faceY + 0.24, dwW * 0.3, 0.008, '#060201');

      fr(drX, faceY + 0.20, dwW, dwH, '#1c0b05');
      fr(drX, faceY + 0.20, dwW, 0.004, '#2A1408');
      fr(drX + dwW * 0.35, faceY + 0.24, dwW * 0.3, 0.008, '#060201');

      // ── 15. ITEMS ON DESK ──────────────────────────────────────────
      // Perspective helper: maps a normalized desk position (fx: 0-1, fy: 0-1) to canvas coords
      function deskPos(fx, fy) {
        // fy: 0 is back edge, 1 is front edge
        var tY = DESK_TOP_Y + fy * (DESK_FRONT_Y - DESK_TOP_Y);
        // Interpolate the left and right bounds at this specific Y (depth)
        var curL = dt_L + fy * (df_L - dt_L);
        var curR = dt_R + fy * (df_R - dt_R);
        var tX = curL + fx * (curR - curL);
        return { x: tX, y: tY, scale: 0.60 + fy * 0.40 };
      }

      // ─ CLOSED JOURNAL ─
      (function () {
        var pos = deskPos(0.38, 0.28); var sc = pos.scale;
        var jW = 0.13 * sc, jH = 0.040 * sc;
        var jX = pos.x - jW * 0.5, jY = pos.y - jH * 0.5;
        ctx.fillStyle = 'rgba(0,0,0,.22)';
        ctx.beginPath(); ctx.ellipse(px(pos.x), py(pos.y + jH * 0.8), px(jW * 0.52), py(jH * 0.18), 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = linG(jX, jY, jX, jY + jH, [[0, '#3A4A2A'], [0.4, '#24341A'], [1, '#1A2410']]); ctx.fillRect(px(jX), py(jY), px(jW), py(jH));
        fr(jX, jY, jW, 0.004 * sc, 'rgba(100,140,80,.26)');
        ctx.strokeStyle = 'rgba(0,0,0,.30)'; ctx.lineWidth = 0.5; ctx.strokeRect(px(jX + 0.005 * sc), py(jY + 0.005 * sc), px(jW - 0.010 * sc), py(jH - 0.010 * sc));
        // Pages edge
        fr(jX + 0.003 * sc, jY + jH, jW - 0.006 * sc, 0.005 * sc, '#E8D8B8');
        // Gold clasp
        fr(jX + jW - 0.012 * sc, jY + jH * 0.35, 0.010 * sc, 0.016 * sc, '#D0A040');
        // Quest marker
        drawQuestMarker(pos.x, jY - 0.045, 'Write');
      })();

      // ─ FIREFLY JAR ─
      (function () {
        var pos = deskPos(0.62, 0.22); var sc = pos.scale;
        var jrX = pos.x - 0.020 * sc, jrY = pos.y - 0.068 * sc;
        var jrW = 0.040 * sc, jrH = 0.065 * sc;
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,.20)';
        ctx.beginPath(); ctx.ellipse(px(pos.x), py(pos.y + 0.010 * sc), px(jrW * 0.6), py(0.006 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Jar body
        ctx.fillStyle = linG(jrX, jrY, jrX + jrW, jrY, [[0, 'rgba(180,220,200,.55)'], [0.4, 'rgba(220,255,240,.30)'], [1, 'rgba(150,200,180,.40)']]);
        ctx.fillRect(px(jrX), py(jrY), px(jrW), py(jrH));
        ctx.strokeStyle = 'rgba(150,200,170,.60)'; ctx.lineWidth = 0.8;
        ctx.strokeRect(px(jrX), py(jrY), px(jrW), py(jrH));
        // Lid
        fr(jrX - 0.003 * sc, jrY - 0.010 * sc, jrW + 0.006 * sc, 0.013 * sc, '#5A4020');
        // Fireflies inside
        for (var ffi = 0; ffi < fireflies.length; ffi++) {
          var ff = fireflies[ffi];
          var fx2 = jrX + jrW * 0.2 + (jrW * 0.6) * ((ffi % 4) / 3);
          var fy2 = jrY + jrH * 0.25 + (jrH * 0.5) * (Math.floor(ffi / 4) / 2);
          var fa = (Math.sin(time * ff.spd + ff.phase) + 1) * 0.5;
          circ(fx2, fy2, px(0.003 * sc), 'rgba(' + ff.col + ',' + (0.4 + fa * 0.6) + ')');
        }
      })();

      // ─ MUG (with steam) ─
      (function () {
        var pos = deskPos(0.78, 0.34); var sc = pos.scale;
        var mX = pos.x - 0.022 * sc, mY = pos.y - 0.044 * sc;
        var mW = 0.044 * sc, mH = 0.042 * sc;
        ctx.fillStyle = 'rgba(0,0,0,.18)';
        ctx.beginPath(); ctx.ellipse(px(pos.x), py(pos.y + 0.008 * sc), px(mW * 0.6), py(0.006 * sc), 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = linG(mX, mY, mX, mY + mH, [[0, '#D8B880'], [1, '#B89050']]); ctx.fillRect(px(mX), py(mY), px(mW), py(mH));
        fr(mX, mY, mW, 0.007 * sc, '#C0A06A');
        fr(mX, mY + mH - 0.006 * sc, mW, 0.008 * sc, '#8A6030');
        // Handle
        ctx.strokeStyle = '#B08040'; ctx.lineWidth = px(0.007 * sc);
        ctx.beginPath(); ctx.arc(px(mX + mW + 0.006 * sc), py(mY + mH * 0.5), px(0.014 * sc), -Math.PI * 0.55, Math.PI * 0.55); ctx.stroke();
        // Top surface (ellipse)
        ctx.fillStyle = '#6A3010';
        ctx.beginPath(); ctx.ellipse(px(mX + mW * 0.5), py(mY), px(mW * 0.5), py(0.008 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Steam
        if (lampOn) {
          for (var sti = 0; sti < 3; sti++) {
            var sph = ((time * 0.8 + sti * 20) % 60) / 60;
            var sa = Math.sin(sph * Math.PI) * 0.38;
            fr(pos.x - 0.006 * sc + sti * 0.006 * sc, mY - sph * 0.045 * sc, 0.005 * sc, 0.010 * sc, 'rgba(255,240,218,.7)', sa);
          }
        }
      })();

      // ─ ORNATE DESK LAMP (moved and scaled up) ─
      (function () {
        var pos = deskPos(0.15, 0.18); var sc = pos.scale;
        var lbX = pos.x, lbY = pos.y;

        // 1. Base (Ornate Bronze/Wood Pedestal)
        ctx.fillStyle = linG(lbX - 0.04 * sc, lbY, lbX + 0.04 * sc, lbY, [[0, '#120804'], [0.4, '#3A1C10'], [0.6, '#3A1C10'], [1, '#120804']]);
        ctx.beginPath(); ctx.ellipse(px(lbX), py(lbY), px(0.045 * sc), py(0.015 * sc), 0, 0, Math.PI * 2); ctx.fill();
        fr(lbX - 0.025 * sc, lbY - 0.025 * sc, 0.05 * sc, 0.022 * sc, '#2A1408'); // larger pedestal block

        // 2. Ornate Turned Stem (Bulbous sections)
        var stY = lbY - 0.025 * sc;
        // Bottom bulb
        ctx.fillStyle = linG(lbX - 0.018 * sc, 0, lbX + 0.018 * sc, 0, [[0, '#1A0B05'], [0.5, '#4A2810'], [1, '#1A0B05']]);
        ctx.beginPath(); ctx.ellipse(px(lbX), py(stY - 0.03 * sc), px(0.018 * sc), py(0.025 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Middle spindle
        fr(lbX - 0.007 * sc, stY - 0.14 * sc, 0.014 * sc, 0.12 * sc, '#2E1208');
        // Top bulb
        ctx.beginPath(); ctx.ellipse(px(lbX), py(stY - 0.12 * sc), px(0.014 * sc), py(0.022 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Collar under shade
        fr(lbX - 0.01 * sc, lbY - 0.18 * sc, 0.02 * sc, 0.015 * sc, '#1A0B05');

        // 3. Peach Scalloped Shade
        var shTopY = lbY - 0.35 * sc, shBotY = lbY - 0.18 * sc;
        var shW_T = 0.06 * sc, shW_B = 0.125 * sc;

        ctx.fillStyle = lampOn ? '#FFB870' : '#8A4828';
        ctx.beginPath();
        ctx.moveTo(px(lbX - shW_T), py(shTopY));
        ctx.lineTo(px(lbX + shW_T), py(shTopY));
        ctx.lineTo(px(lbX + shW_B), py(shBotY));
        // Scalloped bottom edge
        var steps = 8;
        for (var i = 0; i < steps; i++) {
          var t = (i + 0.5) / steps;
          var sx = (lbX + shW_B) - (t * shW_B * 2);
          var sy = shBotY + 0.010 * sc * Math.sin(i * Math.PI); // wavy effect
          ctx.lineTo(px(sx), py(shBotY + 0.012 * sc));
        }
        ctx.lineTo(px(lbX - shW_B), py(shBotY));
        ctx.closePath(); ctx.fill();

        // Highline on shade
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(px(lbX - shW_T * 0.4), py(shTopY + 0.005 * sc)); ctx.lineTo(px(lbX - shW_B * 0.4), py(shBotY - 0.005 * sc)); ctx.stroke();

        if (lampOn) {
          // Internal bulb glow (balanced)
          var ig = ctx.createRadialGradient(px(lbX), py(shBotY - 0.02 * sc), 0, px(lbX), py(shBotY - 0.02 * sc), px(0.08 * sc));
          ig.addColorStop(0, 'rgba(255,250,220,0.85)'); ig.addColorStop(0.5, 'rgba(255,210,120,0.4)'); ig.addColorStop(1, 'rgba(255,160,60,0)');
          ctx.fillStyle = ig; ctx.beginPath(); ctx.ellipse(px(lbX), py(shBotY), px(shW_B * 1.1), py(0.020 * sc), 0, 0, Math.PI * 2); ctx.fill();

          // Desk light pool (wider, much softer transition)
          var dlg = ctx.createRadialGradient(px(lbX), py(lbY - 0.03 * sc), px(0.01), px(lbX), py(lbY - 0.03 * sc), px(0.55 * sc));
          dlg.addColorStop(0, 'rgba(255,180,50,0.35)'); dlg.addColorStop(0.4, 'rgba(255,160,40,0.12)'); dlg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = dlg; ctx.fillRect(0, py(DESK_TOP_Y), W, py(1 - DESK_TOP_Y));
        }
      })();

      // ── 16. DUST MOTES ─────────────────────────────────────────────
      if (lampOn) {
        for (var dmi = 0; dmi < dust.length; dmi++) {
          var d = dust[dmi];
          d.x += d.vx + Math.sin(time * 0.012 + d.life * 6) * 0.00028;
          d.y += d.vy; d.life += 0.0014;
          if (d.y < 0.06 || d.life > 1) resetDust(d);
          var da = Math.sin(d.life * Math.PI) * 0.45;
          ctx.globalAlpha = da;
          ctx.fillStyle = 'rgba(255,230,140,1)';
          ctx.beginPath(); ctx.arc(px(d.x), py(d.y), d.sz * 1.1, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      // ── 17. GLOBAL LIGHT TINT ────────────────────────────────────
      if (lampOn) {
        // Base ambient warm wash (softened global fill)
        ctx.fillStyle = 'rgba(' + pal.aR + ',' + pal.aG + ',' + pal.aB + ',.18)'; ctx.fillRect(0, 0, W, H);
        
        // Extra large, nearly transparent room-fill glow
        var roomGlow = ctx.createRadialGradient(px(LX), py(LY), px(0.05), px(LX), py(LY), px(1.2));
        roomGlow.addColorStop(0, 'rgba(255, 180, 80, 0.12)');
        roomGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = roomGlow; ctx.fillRect(0, 0, W, H);

        // Warm directional core glow (softened but wider reach)
        var wsg = ctx.createRadialGradient(px(LX), py(LY - 0.04), px(0.01), px(LX), py(LY - 0.04), px(0.75));
        wsg.addColorStop(0, 'rgba(' + pal.aR + ',' + pal.aG + ',' + pal.aB + ',.22)');
        wsg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = wsg; ctx.fillRect(0, 0, W, H);
      } else {
        ctx.fillStyle = 'rgba(0,0,8,.28)'; ctx.fillRect(0, 0, W, H);
        var mlg = ctx.createRadialGradient(px(WX + WW * 0.5), py(WY + WH * 0.4), px(0.01), px(WX + WW * 0.5), py(WY + WH * 0.4), px(0.5));
        mlg.addColorStop(0, 'rgba(90,120,195,.18)'); mlg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = mlg; ctx.fillRect(0, 0, W, H);
      }

      // ── 18. VIGNETTE ──────────────────────────────────────────────
      var vgA = lampOn ? 0.38 : 0.68;
      var vg = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.16, W * 0.5, H * 0.5, H * 0.85);
      vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,' + vgA + ')');
      ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
      // Hover halo
      if (hov) drawUIHalo(hov);

      // ── 19. UPDATE BADGES ─────────────────────────────────────────
      var tLab = { dawn: 'pale morning light', day: 'afternoon at your desk', dusk: 'golden hour fading', night: 'deep evening quiet' };
      document.getElementById('timebadge').textContent = tLab[getTOD()] || 'a quiet moment';
      var wLab = { rain: 'soft rain outside', snow: 'snow falling quietly' };
      document.getElementById('weatherbadge').textContent = wLab[weatherType] || (anyOpen ? 'a gentle breeze' : '');
    }

    // ── SIDE BOOKSHELF (left wall, foreshortened) ─────────────────
    function drawFrontBookshelf() {
      // Front-facing bookshelf on the left wall, full height
      var cabX = SX, cabY = SY, cabW = SW, cabH = SH;

      // Shelf frame / back panel (darker wood)
      fr(cabX, cabY, cabW, cabH, '#1C0C06');
      fr(cabX + 0.012, cabY + 0.010, cabW - 0.024, cabH - 0.020, '#0E0604'); // back panel dark

      // Side panels
      fr(cabX, cabY, 0.014, cabH, '#2E1608');
      fr(cabX + cabW - 0.014, cabY, 0.014, cabH, '#2E1608');

      // Top cap
      fr(cabX - 0.005, cabY - 0.014, cabW + 0.010, 0.018, '#3A1C0A');
      fr(cabX - 0.005, cabY - 0.003, cabW + 0.010, 0.006, '#4A2610');
      // Base / feet
      fr(cabX - 0.004, cabY + cabH, cabW + 0.008, 0.017, '#2A1206');
      fr(cabX + 0.014, cabY + cabH + 0.017, 0.018, 0.012, '#231008');
      fr(cabX + cabW - 0.032, cabY + cabH + 0.017, 0.018, 0.012, '#231008');

      // Shelf boards (4 shelves)
      var SHLS = [0.20, 0.40, 0.60, 0.80];
      for (var shi = 0; shi < SHLS.length; shi++) {
        var shY2 = cabY + SHLS[shi] * cabH;
        fr(cabX + 0.012, shY2, cabW - 0.024, 0.014, '#3A1C0A');
        fr(cabX + 0.014, shY2 + 0.014, cabW - 0.028, 0.005, 'rgba(0,0,0,.35)'); // shelf shadow
        fr(cabX + 0.014, shY2, cabW - 0.028, 0.004, 'rgba(100,60,20,.22)'); // shelf top highlight
      }

      // Books on each shelf
      for (var bi = 0; bi < books.length; bi++) {
        var b = books[bi];
        var shelfIdx = b.shelf;
        var shTop2 = cabY + SHLS[shelfIdx] * cabH;
        var bXf = cabX + 0.016 + b.bx * (cabW - 0.032) / (SW - 0.022);
        var bWf = b.bw * (cabW - 0.032) / (SW - 0.022);
        if (bXf + bWf > cabX + cabW - 0.016) continue;
        // Book body
        fr(bXf, shTop2 - b.bh * 0.88, bWf, b.bh * 0.88, b.col);
        // Spine highlight (left edge)
        fr(bXf, shTop2 - b.bh * 0.88, bWf * 0.12, b.bh * 0.88, 'rgba(255,255,255,.10)');
        // Shadow divider
        fr(bXf + bWf, shTop2 - b.bh * 0.88, 0.002, b.bh * 0.88, 'rgba(0,0,0,.25)');
        // Top edge
        fr(bXf, shTop2 - b.bh * 0.88, bWf, 0.004, 'rgba(255,255,255,.12)');
      }

      // Mood plant (top section of shelf, above first shelf)
      drawPlant(cabX + 0.040, cabY + 0.010, journalDays);

      // Small decorative knick-knack (second shelf, right side)
      var kx = cabX + cabW * 0.72, ky = cabY + SHLS[1] * cabH;
      fr(kx - 0.010, ky - 0.040, 0.022, 0.040, '#6A3018'); // small figurine
      circ(kx, ky - 0.045, px(0.010), '#8A4828');

      // Separator panel edge shadow (right side of shelf fades into wall)
      var sEdge = ctx.createLinearGradient(px(cabX + cabW), 0, px(cabX + cabW + 0.04), 0);
      sEdge.addColorStop(0, 'rgba(0,0,0,.40)'); sEdge.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sEdge; ctx.fillRect(px(cabX + cabW), py(cabY - 0.015), px(0.04), py(cabH + 0.04));

      // Quest marker
      drawQuestMarker(cabX + cabW * 0.50, cabY + SHLS[1] * cabH - 0.08, 'Archive');
    }
    function drawSideBookshelf() {
      // The left wall recedes into the background.
      // We draw the bookshelf as a foreshortened cabinet on the left strip.
      var cabX = 0.00, cabW = SW, cabY = WY + 0.02, cabH = WH + 0.14;
      // Wall shadow behind cabinet
      var bss = ctx.createLinearGradient(px(cabX + cabW), 0, px(cabX + cabW + 0.06), 0);
      bss.addColorStop(0, 'rgba(0,0,0,.60)'); bss.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bss; ctx.fillRect(px(cabX + cabW), py(cabY), px(0.06), py(cabH));
      // Cabinet body — slightly compressed in X to look foreshortened
      fr(cabX, cabY, cabW, cabH, '#140802');
      fr(cabX + 0.010, cabY + 0.010, cabW - 0.014, cabH - 0.020, '#0A0400');
      fr(cabX, cabY, cabW, 0.013, '#2E1606'); fr(cabX, cabY + cabH - 0.013, cabW, 0.013, '#1E0E04');
      fr(cabX + cabW - 0.012, cabY, 0.012, cabH, '#221008');
      // Shelf boards
      var SHLS = [0.22, 0.40, 0.58, 0.76];
      for (var shi = 0; shi < SHLS.length; shi++) {
        fr(cabX + 0.010, cabY + SHLS[shi] * cabH, cabW - 0.014, 0.013, '#2E1606');
        fr(cabX + 0.012, cabY + SHLS[shi] * cabH + 0.013, cabW - 0.018, 0.004, 'rgba(70,35,15,.50)');
      }
      // Top molding
      fr(cabX, cabY - 0.016, cabW + 0.006, 0.018, '#3A1C0A');
      // Books (foreshortened — drawn narrow, stacked horizontally)
      for (var bi = 0; bi < books.length; bi++) {
        var b = books[bi];
        var shTop = cabY + SHLS[b.shelf] * cabH;
        // Foreshorten book width by ~38% to simulate side-wall angle
        var bwF = b.bw * 0.62;
        var bX = cabX + 0.011 + b.bx * 0.62;
        if (bX + bwF > cabX + cabW - 0.014) continue;
        fr(bX, shTop - b.bh * 0.90, bwF, b.bh * 0.90, b.col);
        fr(bX, shTop - b.bh * 0.90, bwF * 0.12, b.bh * 0.90, 'rgba(0,0,0,.28)');
        fr(bX, shTop - b.bh * 0.90, bwF, 0.004, 'rgba(255,255,255,.08)');
      }
      // Mood plant (top of shelf)
      drawPlant(cabX + 0.010, cabY + 0.018, journalDays);
      // Quest marker
      drawQuestMarker(cabX + cabW * 0.5, cabY + cabH * 0.3, 'Archive');
    }

    // ── OBJECT DRAWERS ────────────────────────────────────────────
    function drawCat(x, y) {
      // ── Sitting rabbit, side profile, upright posture ────────────
      // Anchor (x,y) = bottom-center of rabbit (floor level)
      // Positive y = DOWN, negative y = UP (canvas coords)
      // Rabbit faces RIGHT. Total height ~0.110, width ~0.075
      catBreath += 0.011;
      var br = Math.sin(catBreath) * 0.0016;
      ctx.save(); ctx.translate(px(x), py(y));

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,.13)';
      ctx.beginPath(); ctx.ellipse(px(0.012), py(0.008), px(0.050), py(0.009), 0, 0, Math.PI * 2); ctx.fill();

      // ── HIND LEGS / HAUNCHES at bottom (wide, flat, slightly behind) ──
      var hleg = ctx.createLinearGradient(px(-0.025), py(0.005), px(0.010), py(0.005));
      hleg.addColorStop(0, '#9A6838'); hleg.addColorStop(0.6, '#B88A55'); hleg.addColorStop(1, '#CCA870');
      ctx.fillStyle = hleg;
      ctx.beginPath(); ctx.ellipse(px(-0.008), py(0.002), px(0.036), py(0.014), 0.05, 0, Math.PI * 2); ctx.fill();

      // Cotton tail
      ctx.fillStyle = '#F0EAD8'; ctx.beginPath(); ctx.arc(px(-0.034), py(-0.004), px(0.011), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(px(-0.036), py(-0.006), px(0.007), 0, Math.PI * 2); ctx.fill();

      // ── MAIN BODY — tall upright ellipse, the big shape ──────────
      // Highlight at upper-back (left-top), gradient darkens toward front-bottom
      var bodyG = ctx.createRadialGradient(
        px(-0.016), py(-0.052), px(0.005),   // highlight: upper-back
        px(0.002), py(-0.028), px(0.048)    // outer edge
      );
      bodyG.addColorStop(0, '#D4AA70');  // bright warm tan at top-back
      bodyG.addColorStop(0.32, '#BA8C52');  // mid honey
      bodyG.addColorStop(0.68, '#9A6838');  // shadow
      bodyG.addColorStop(1, '#7A5028');  // dark rim
      ctx.fillStyle = bodyG;
      // TALL ellipse, slightly tilted — this is the upright sitting posture
      ctx.beginPath(); ctx.ellipse(px(0.005), py(-0.032 + br * 0.5), px(0.038), py(0.046), -0.12, 0, Math.PI * 2); ctx.fill();

      // ── CHEST / BELLY — cream patch on front (right side of body) ──
      // In the reference this is the large off-white area on the right side
      ctx.fillStyle = '#E8D4A8';
      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022 + br * 0.4), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();
      // Soft feathered blend at edges
      var bellyFade = ctx.createRadialGradient(px(0.022), py(-0.022), px(0.004), px(0.022), py(-0.022), px(0.023));
      bellyFade.addColorStop(0.5, 'rgba(232,212,168,0)');
      bellyFade.addColorStop(1, 'rgba(140,90,40,.16)');
      ctx.fillStyle = bellyFade;
      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();

      // ── FRONT PAWS — small rounded ovals at bottom-right ─────────
      var pawG = ctx.createLinearGradient(px(0.008), py(0.006), px(0.038), py(0.006));
      pawG.addColorStop(0, '#9A6838'); pawG.addColorStop(1, '#CCA870');
      ctx.fillStyle = pawG;
      ctx.beginPath(); ctx.ellipse(px(0.014), py(0.006), px(0.011), py(0.007), 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#C09860';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(0.004), px(0.013), py(0.007), 0.1, 0, Math.PI * 2); ctx.fill();

      // ── HEAD — round, upper-right area, connected to body top ────
      var headG = ctx.createRadialGradient(
        px(0.024), py(-0.074), px(0.003),
        px(0.030), py(-0.062), px(0.026)
      );
      headG.addColorStop(0, '#D4AA70');
      headG.addColorStop(0.40, '#BA8C52');
      headG.addColorStop(0.80, '#9A6838');
      headG.addColorStop(1, '#7A5028');
      ctx.fillStyle = headG;
      ctx.beginPath(); ctx.ellipse(px(0.030), py(-0.062 - br * 0.5), px(0.024), py(0.022), -0.06, 0, Math.PI * 2); ctx.fill();
      // Warm lighter cheek area (front of face, reference shows cream/light patch)
      ctx.fillStyle = 'rgba(220,188,135,.45)';
      ctx.beginPath(); ctx.ellipse(px(0.042), py(-0.056), px(0.012), py(0.010), 0.25, 0, Math.PI * 2); ctx.fill();

      // ── EARS — tall upright, above the head ──────────────────────
      // Far ear (left, slightly behind, tilted left, no inner channel visible)
      var earFarG = ctx.createRadialGradient(px(0.012), py(-0.098), px(0.002), px(0.016), py(-0.090), px(0.010));
      earFarG.addColorStop(0, '#C4946A'); earFarG.addColorStop(1, '#9A6838');
      ctx.fillStyle = earFarG;
      ctx.beginPath(); ctx.ellipse(px(0.016), py(-0.090), px(0.008), py(0.025), -0.25, 0, Math.PI * 2); ctx.fill();
      // Far ear inner (muted, barely visible)
      ctx.fillStyle = 'rgba(175,110,80,.40)';
      ctx.beginPath(); ctx.ellipse(px(0.016), py(-0.088), px(0.005), py(0.016), -0.25, 0, Math.PI * 2); ctx.fill();

      // Near ear (right, more upright, fuller, warm)
      var earNearG = ctx.createRadialGradient(px(0.025), py(-0.104), px(0.003), px(0.028), py(-0.094), px(0.012));
      earNearG.addColorStop(0, '#D4AA70'); earNearG.addColorStop(0.5, '#BA8C52'); earNearG.addColorStop(1, '#9A6838');
      ctx.fillStyle = earNearG;
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.094), px(0.010), py(0.028), 0.10, 0, Math.PI * 2); ctx.fill();
      // Inner ear — warm salmon channel (clearly visible)
      ctx.fillStyle = '#C08060';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.092), px(0.006), py(0.019), 0.10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(195,125,95,.38)';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.091), px(0.003), py(0.012), 0.10, 0, Math.PI * 2); ctx.fill();

      // ── EYE — small, warm dark brown, with catchlight ────────────
      ctx.fillStyle = '#1E1008';
      ctx.beginPath(); ctx.arc(px(0.044), py(-0.063), px(0.007), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(px(0.047), py(-0.067), px(0.003), 0, Math.PI * 2); ctx.fill();

      // ── MUZZLE / NOSE ─────────────────────────────────────────────
      ctx.fillStyle = '#E8D4A8';
      ctx.beginPath(); ctx.ellipse(px(0.050), py(-0.054), px(0.009), py(0.007), 0.12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#C07858';
      ctx.beginPath(); ctx.ellipse(px(0.053), py(-0.054), px(0.004), py(0.003), 0, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }


    function drawPlant(x, y, streak) {
      var health = Math.min(1, streak / 7);
      var g1 = lerp(0x28, 0x38, health), g2 = lerp(0x48, 0x78, health);
      var gc = 'rgb(' + Math.round(g1) + ',' + Math.round(g2 * 0.88) + ',' + Math.round(g1 * 0.48) + ')';
      var gc2 = 'rgb(' + Math.round(g2) + ',' + Math.round(g2) + ',' + Math.round(g1) + ')';
      fr(x + 0.006, y + 0.070, 0.026, 0.040, '#522C0E');
      fr(x + 0.008, y + 0.070, 0.022, 0.006, '#7A4024', 0.7);
      ctx.strokeStyle = gc; ctx.lineWidth = px(0.005); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.070)); ctx.lineTo(px(x + 0.019), py(y + 0.044)); ctx.stroke();
      if (health > 0.28) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.058)); ctx.lineTo(px(x + 0.005), py(y + 0.044)); ctx.stroke(); }
      if (health > 0.58) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.053)); ctx.lineTo(px(x + 0.035), py(y + 0.040)); ctx.stroke(); }
      function leaf(lx, ly, rot, size) {
        ctx.save(); ctx.translate(px(lx), py(ly)); ctx.rotate(rot);
        ctx.fillStyle = gc2; ctx.beginPath(); ctx.ellipse(0, 0, px(size), py(size * 0.48), 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(-px(size), 0); ctx.lineTo(px(size), 0); ctx.stroke();
        ctx.restore();
      }
      leaf(x + 0.019, y + 0.042, 0, 0.014);
      if (health > 0.28) leaf(x + 0.005, y + 0.042, -0.68, 0.010 * health + 0.004);
      if (health > 0.58) leaf(x + 0.035, y + 0.038, 0.58, 0.012 * health + 0.002);
      if (health > 0.84) { circ(x + 0.019, y + 0.032, px(0.006), 'rgba(255,175,115,.82)'); circ(x + 0.019, y + 0.032, px(0.003), 'rgba(255,228,95,.9)'); }
      if (health < 0.28) { ctx.strokeStyle = 'rgba(95,75,18,.45)'; ctx.lineWidth = px(0.004); ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.052)); ctx.quadraticCurveTo(px(x + 0.032), py(y + 0.058), px(x + 0.035), py(y + 0.068)); ctx.stroke(); }
    }

    function drawOpenBook(x, y) {
      pageFlutter += 0.028;
      var fl = Math.sin(pageFlutter) * 0.0028;
      var bw = 0.130, bh = 0.086;
      // Left page
      fp([x, y + bh * 0.10, x + bw * 0.5, y, x + bw * 0.5, y + bh, x, y + bh], '#EEE5CD');
      for (var li = 0; li < 6; li++) fr(x + 0.008, y + 0.016 + li * 0.010, bw * 0.44 - 0.008, 0.002, 'rgba(95,65,38,.10)');
      // Right page (flutters slightly)
      fp([x + bw * 0.5, y, x + bw + fl, y + bh * 0.11 + fl, x + bw + fl, y + bh - fl * 0.5, x + bw * 0.5, y + bh], '#E8DFCA');
      for (var ri = 0; ri < 6; ri++) fr(x + bw * 0.52, y + 0.016 + ri * 0.010, bw * 0.44 - 0.008, 0.002, 'rgba(95,65,38,.09)');
      // Spine
      fp([x + bw * 0.5 - 0.004, y, x + bw * 0.5 + 0.004, y, x + bw * 0.5 + 0.004, y + bh, x + bw * 0.5 - 0.004, y + bh], '#521C0C');
      // Shadow under
      ctx.fillStyle = 'rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(px(x + bw * 0.5), py(y + bh + 0.005), px(bw * 0.48), py(0.008), 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawFireflyJar(x, y) {
      // Jar body
      fr(x, y + 0.015, 0.030, 0.050, 'rgba(175,208,198,.16)');
      fr(x - 0.002, y + 0.012, 0.034, 0.006, 'rgba(148,178,168,.28)');
      fr(x + 0.004, y + 0.065, 0.022, 0.006, 'rgba(148,178,168,.22)');
      // Glass highlight
      fr(x + 0.003, y + 0.017, 0.006, 0.040, 'rgba(255,255,255,.10)');
      // Cork lid
      fr(x - 0.002, y + 0.009, 0.034, 0.005, '#5A3018');
      // Fireflies
      for (var ffi = 0; ffi < fireflies.length; ffi++) {
        var ff = fireflies[ffi];
        var fa = (Math.sin(time * ff.spd + ff.phase) + 1) * 0.5;
        if (fa < 0.07) continue;
        var ffx = ff.ox + Math.sin(time * ff.spd * 0.68 + ff.phase) * 0.007;
        var ffy = ff.oy + Math.cos(time * ff.spd * 0.48 + ff.phase * 1.28) * 0.013;
        var ffg = ctx.createRadialGradient(px(ffx), py(ffy), 0, px(ffx), py(ffy), px(0.010));
        ffg.addColorStop(0, 'rgba(' + ff.col + ',' + (fa * 0.90) + ')');
        ffg.addColorStop(1, 'rgba(' + ff.col + ',0)');
        ctx.fillStyle = ffg; ctx.fillRect(px(ffx) - px(0.010), py(ffy) - px(0.010), px(0.020), px(0.020));
        circ(ffx, ffy, 1.1, 'rgba(' + ff.col + ',1)', fa * 0.92);
      }
    }

    function drawVinyl(x, y) {
      var vw = 0.050, vh = 0.034;
      fr(x, y, vw, vh, '#261204');
      fr(x, y, vw, 0.005, '#361A0A');
      var rx = x + 0.012, ry = y + 0.006;
      circ(rx + 0.010, ry + 0.010, px(0.013), '#180E06');
      circ(rx + 0.010, ry + 0.010, px(0.009), '#201208');
      circ(rx + 0.010, ry + 0.010, px(0.004), '#C02E1C');
      circ(rx + 0.010, ry + 0.010, px(0.002), '#381406');
      ctx.strokeStyle = 'rgba(255,255,255,.055)'; ctx.lineWidth = 0.5;
      for (var gi = 7; gi <= 13; gi += 2) { ctx.beginPath(); ctx.arc(px(rx + 0.010), py(ry + 0.010), gi, 0, Math.PI * 2); ctx.stroke(); }
      if (vinylPlaying) {
        vinylAngle += 0.038;
        var hx = rx + 0.010 + Math.cos(vinylAngle) * 0.009, hy = ry + 0.010 + Math.sin(vinylAngle) * 0.009;
        circ(hx, hy, px(0.0022), 'rgba(255,195,95,.72)');
      }
      // Arm
      ctx.save(); ctx.translate(px(x + 0.042), py(y + 0.005)); ctx.rotate(vinylPlaying ? 0.36 : 0.14);
      ctx.strokeStyle = '#8A4E1E'; ctx.lineWidth = px(0.003); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, py(0.026)); ctx.stroke();
      ctx.restore();
      // Playing LED
      if (vinylPlaying) {
        var li2 = (Math.sin(time * 0.05) + 1) * 0.5;
        circ(x + 0.046, y + 0.028, px(0.003), 'rgba(75,255,135,1)', li2 * 0.82 + 0.18);
      }
    }

    // ── PIXEL ART DESK ───────────────────────────────────────────
    function drawPixelDesk(ox, oy) {
      // ── SIMPLE DESK (matches the user's reference photo) ─────────
      var dw = DW, dh = DH;
      var floor = FY;

      // ── FOUR THIN LEGS (slightly tapered) ───────────────────
      function drawLeg(lx, ly, isBack) {
        var col = isBack ? '#240E04' : '#3A1808';
        var wth = isBack ? 0.010 : 0.018;
        var grad = isBack ? col : linG(lx, ly, lx + wth, ly, [[0, '#5A2C10'], [0.5, '#3A1808'], [1, '#240E04']]);
        ctx.fillStyle = grad;
        ctx.fillRect(px(lx), py(ly), px(wth), py(floor - ly));
        if (!isBack) fr(lx, ly, wth, 0.004, 'rgba(160,95,45,.40)');
      }
      // Rear legs
      drawLeg(ox + 0.026, oy + 0.04, true);
      drawLeg(ox + dw - 0.033, oy + 0.04, true);
      // Front legs
      drawLeg(ox + 0.018, oy + 0.04, false);
      drawLeg(ox + dw - 0.030, oy + 0.04, false);

      // ── MAIN DESK BODY ─────────────────────────────
      // Desktop overhang - warm brown
      ctx.fillStyle = linG(ox, oy, ox, oy + 0.012, [[0, '#8A4E28'], [0.5, '#6A3818'], [1, '#4A2210']]);
      ctx.fillRect(px(ox), py(oy), px(dw), py(0.012));

      // Main body housing (slightly inset)
      ctx.fillStyle = linG(ox, oy + 0.012, ox, oy + 0.045, [[0, '#3E1C0A'], [1, '#2A1408']]);
      ctx.fillRect(px(ox + 0.005), py(oy + 0.012), px(dw - 0.010), py(0.033));

      // ── TWO DRAWERS ─────────────────────────────────
      function drawDrawer(dx, dy, dwth) {
        // Drawer front face
        ctx.fillStyle = linG(dx, dy, dx, dy + 0.026, [[0, '#5A2C12'], [0.4, '#4A2210'], [1, '#321808']]);
        ctx.fillRect(px(dx), py(dy), px(dwth), py(0.026));
        // Subtle inset border
        ctx.strokeStyle = 'rgba(0,0,0,.26)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(px(dx) + 1, py(dy) + 1, px(dwth) - 2, py(0.026) - 2);
        // Dark handle / slot
        fr(dx + dwth * 0.35, dy + 0.011, dwth * 0.30, 0.005, '#1A0804');
        fr(dx + dwth * 0.35, dy + 0.011, dwth * 0.30, 0.002, 'rgba(255,160,80,.12)');
      }
      var drW = dw * 0.36;
      drawDrawer(ox + 0.022, oy + 0.018, drW);
      drawDrawer(ox + dw - 0.022 - drW, oy + 0.018, drW);

      // ── SPARKLES (matches photo's magic vibe) ────────
      ctx.save();
      for (var si = 0; si < 3; si++) {
        var sa = (Math.sin(time * 0.05 + si) + 1) * 0.5;
        var sx = ox + 0.05 + Math.sin(time * 0.02 + si * 2) * (dw - 0.1);
        var sy = oy + Math.cos(time * 0.03 + si) * 0.04;
        ctx.fillStyle = 'rgba(255,230,120,' + sa * 0.6 + ')';
        ctx.beginPath(); ctx.arc(px(sx), py(sy), px(0.003), 0, Math.PI * 2); ctx.fill();
        // Crosshair glint
        ctx.strokeStyle = 'rgba(255,245,180,' + sa * 0.4 + ')'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(px(sx - 0.008), py(sy)); ctx.lineTo(px(sx + 0.008), py(sy)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px(sx), py(sy - 0.008)); ctx.lineTo(px(sx), py(sy + 0.008)); ctx.stroke();
      }
      ctx.restore();

      // Shadow under desk body
      var ds = ctx.createRadialGradient(px(ox + dw * 0.5), py(floor), px(0.01), px(ox + dw * 0.5), py(floor), px(dw * 0.55));
      ds.addColorStop(0, 'rgba(0,0,0,.18)'); ds.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ds; ctx.fillRect(px(ox - 0.02), py(floor - 0.01), px(dw + 0.04), py(0.02));
    }

    // ── SMOOTH CHAIR (rear view, facing desk) ────────────────────
    // We see the back of the chair: backrest facing viewer,
    // seat and legs below. Chair is turned toward the desk.
    function drawPixelChair(ox, oy) {
      // 1 pixel unit  — scaled so chair width ≈ CWW
      // ── Proportions ──────────────────────────────────────────────
      var cw = CWW, ch = CHH;
      var bkH = ch * 0.55;           // backrest height
      var sY = oy + bkH;            // top of seat
      var sH = 0.022;               // seat frame thickness
      var legH = ch - bkH - sH;      // leg length below seat
      var postW = 0.016;             // back-post width

      // ── BACK LEGS (dark, behind seat) ────────────────────────────
      fr(ox + 0.012, sY + sH * 0.5, postW, legH * 0.92, '#381208');
      fr(ox + cw - 0.028, sY + sH * 0.5, postW, legH * 0.92, '#381208');

      // ── BACK POSTS (two vertical uprights of backrest frame) ──────
      // Left post
      ctx.fillStyle = linG(ox, oy, ox + postW, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + 0.012), py(oy), px(postW), py(bkH + sH));
      fr(ox + 0.012, oy, postW, 0.007, 'rgba(200,110,50,.50)'); // top cap
      // Right post
      ctx.fillStyle = linG(ox + cw - postW * 1.75, oy, ox + cw, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + cw - 0.028), py(oy), px(postW), py(bkH + sH));
      fr(ox + cw - 0.028, oy, postW, 0.007, 'rgba(200,110,50,.50)');

      // ── GREEN BACK CUSHION (between posts) ────────────────────────
      var bcX = ox + 0.012 + postW + 0.003;
      var bcW = (ox + cw - 0.028) - bcX - 0.003;
      var bcH = bkH * 0.86;
      ctx.fillStyle = linG(bcX, oy + 0.010, bcX, oy + 0.010 + bcH, [[0, '#7AAC30'], [0.45, '#5A8C1E'], [1, '#3E6412']]);
      ctx.fillRect(px(bcX), py(oy + 0.010), px(bcW), py(bcH));
      // Cushion highlight sheen
      fr(bcX, oy + 0.010, bcW, 0.008, 'rgba(165,230,65,.50)');
      fr(bcX, oy + 0.010, 0.007, bcH, 'rgba(165,230,65,.28)');
      // Cushion bottom shadow
      fr(bcX, oy + 0.010 + bcH - 0.006, bcW, 0.006, 'rgba(0,0,0,.18)');

      // ── SEAT FRAME ────────────────────────────────────────────────
      ctx.fillStyle = linG(ox, sY, ox, sY + sH, [[0, '#7A3018'], [1, '#4A1C0A']]);
      ctx.fillRect(px(ox), py(sY), px(cw), py(sH));
      fr(ox, sY, cw, 0.006, 'rgba(190,100,45,.45)'); // top rail highlight
      fr(ox, sY + sH - 0.005, cw, 0.005, 'rgba(0,0,0,.25)'); // bottom shadow

      // ── GREEN SEAT CUSHION (on top of seat) ───────────────────────
      var scH = 0.024;
      ctx.fillStyle = linG(ox, sY - scH, ox, sY, [[0, '#88C030'], [0.5, '#608C20'], [1, '#446012']]);
      ctx.fillRect(px(ox + 0.005), py(sY - scH), px(cw - 0.010), py(scH));
      fr(ox + 0.005, sY - scH, cw - 0.010, 0.007, 'rgba(175,240,70,.55)'); // top highlight
      fr(ox + 0.005, sY - scH, 0.008, scH, 'rgba(175,240,70,.30)');         // left highlight
      fr(ox + 0.005, sY - 0.005, cw - 0.010, 0.005, 'rgba(0,0,0,.14)');     // bottom edge

      // ── FRONT LEGS (slightly lighter, closer to viewer) ───────────
      fr(ox + 0.022, sY + sH, 0.015, legH * 0.88, '#6A2C10');
      fr(ox + 0.022, sY + sH, 0.005, legH * 0.88, 'rgba(180,90,35,.30)'); // front highlight
      fr(ox + cw - 0.037, sY + sH, 0.015, legH * 0.88, '#6A2C10');

      // ── STRETCHER BAR (horizontal brace) ─────────────────────────
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.008, '#5A2010');
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.003, 'rgba(180,90,35,.22)');

      // ── GROUND SHADOW ─────────────────────────────────────────────
      var csh = ctx.createRadialGradient(
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(0.005),
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(cw * 0.65)
      );
      csh.addColorStop(0, 'rgba(0,0,0,.22)'); csh.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = csh;
      ctx.fillRect(px(ox - 0.02), py(oy + ch), px(cw + 0.04), py(0.06));
    }

    function drawQuestMarker(x, y, label) {
      var s = (Math.sin(time * 0.12) + 1) * 0.5;
      var oy = Math.sin(time * 0.15) * 0.008;
      ctx.fillStyle = 'rgba(255,195,50,' + (0.3 + s * 0.5) + ')';
      ctx.beginPath(); ctx.arc(px(x), py(y + oy), px(0.004 + s * 0.002), 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,240,150,' + (0.2 + s * 0.4) + ')'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(px(x - 0.010), py(y + oy)); ctx.lineTo(px(x + 0.010), py(y + oy)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px(x), py(y + oy - 0.010)); ctx.lineTo(px(x), py(y + oy + 0.010)); ctx.stroke();
    }

    function drawVisionBoard(x, y, w, h) {
      fr(x - 0.005, y - 0.005, w + 0.010, h + 0.010, '#3A1808');
      ctx.fillStyle = linG(x, y, x, y + h, [[0, '#A47048'], [0.5, '#8C5832'], [1, '#744426']]);
      ctx.fillRect(px(x), py(y), px(w), py(h));
      function note(nx, ny, nw, nh, col, rot) {
        ctx.save(); ctx.translate(px(nx + nw / 2), py(ny + nh / 2)); ctx.rotate(rot);
        fr(-nw / 2, -nh / 2, nw, nh, col); fr(-nw / 2, -nh / 2, nw, 0.002, 'rgba(255,255,255,.15)');
        ctx.restore();
      }
      note(x + 0.02, y + 0.03, 0.045, 0.055, '#F4F4F4', -0.05); note(x + 0.07, y + 0.04, 0.035, 0.035, '#FFF8A0', 0.08);
      note(x + 0.04, y + 0.11, 0.055, 0.040, '#E8CFCF', -0.02); note(x + 0.12, y + 0.06, 0.040, 0.050, '#E0F0E0', 0.12);
    }

    function drawIvy() {
      function droopingVine(x, y, len, seed) {
        ctx.strokeStyle = '#1A2F10'; ctx.lineWidth = px(0.003); ctx.beginPath();
        for (var i = 0; i < 10; i++) {
          var step = i / 9; var ox = Math.sin(time * 0.04 + seed + i * 0.4) * 0.005;
          ctx.lineTo(px(x + ox), py(y + step * len));
        }
        ctx.stroke();
        for (var l = 0; l < 8; l++) {
          var tp = l / 7; var lx = x + Math.sin(time * 0.04 + seed + tp * 10 * 0.4) * 0.005;
          var ly = y + tp * len;
          circ(lx, ly, px(0.004), '#2E4C1A', 0.85); circ(lx + 0.003, ly, px(0.0022), '#4A7C2A', 0.4);
        }
      }
      droopingVine(0.05, 0.05, 0.18, 0.1); droopingVine(0.12, 0.05, 0.12, 0.5);
      droopingVine(0.88, 0.05, 0.22, 1.2); droopingVine(0.94, 0.05, 0.14, 2.3);
    }

    function drawUIHalo(zone) {
      if (!zone) return;
      var cx = zone.x + zone.w / 2, cy = zone.y + zone.h / 2;
      var r = Math.max(zone.w, zone.h) * 0.8;
      var g = ctx.createRadialGradient(px(cx), py(cy), 0, px(cx), py(cy), px(r));
      g.addColorStop(0, 'rgba(255,230,150,0.15)'); g.addColorStop(1, 'rgba(255,230,150,0)');
      ctx.fillStyle = g; ctx.fillRect(px(cx - r), py(cy - r), px(r * 2), py(r * 2));
    }

    // ── ZONES ─────────────────────────────────────────────────────
    var zones = [
      // Window panels
      { x: WX, y: WY, w: WW * 0.5, h: WH, title: 'Left Window', sub: leftOpen ? 'click to close' : 'click to open', winLeft: true },
      { x: WX + WW * 0.5, y: WY, w: WW * 0.5, h: WH, title: 'Right Window', sub: rightOpen ? 'click to close' : 'click to open', winRight: true },
      // Bookshelf
      { x: SX, y: SY, w: SW, h: SH, title: 'Journal Archive', sub: 'all your past entries', key: 'archive' },
      // Desk items (mapped to the 3D surface)
      { x: 0.44, y: DESK_TOP_Y + 0.03, w: 0.12, h: 0.09, title: 'Writing Desk', sub: 'start a new entry', key: 'write' },
      { x: 0.64, y: DESK_TOP_Y + 0.01, w: 0.07, h: 0.08, title: 'Firefly Jar', sub: 'glowing thoughts', key: 'jar' },
      { x: 0.76, y: DESK_TOP_Y + 0.04, w: 0.07, h: 0.07, title: 'Morning Mug', sub: 'still warm', key: 'home' },
      // Lamp (moved to left and scaled up)
      { x: 0.22, y: DESK_TOP_Y - 0.16, w: 0.14, h: 0.28, title: 'Desk Lamp', sub: 'click to toggle light', lamp: true },
    ];

    // ── CLICK: WINDOW TOGGLES ─────────────────────────────────────
    function toggleLeftWindow() { leftOpen = !leftOpen; zones[0].sub = leftOpen ? 'click to close' : 'click to open'; }
    function toggleRightWindow() { rightOpen = !rightOpen; zones[1].sub = rightOpen ? 'click to close' : 'click to open'; }

    var TIP = document.getElementById('tip'), TTe = document.getElementById('ttt'), TSe = document.getElementById('tts');

    canv.addEventListener('mousemove', function (e) {
      mouseX = e.clientX / W; mouseY = e.clientY / H;
      var mx = mouseX, my = mouseY, f = null;
      for (var i = 0; i < zones.length; i++) { var z = zones[i]; if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) { f = z; break; } }
      hov = f; canv.style.cursor = f ? 'pointer' : 'crosshair';
      if (f) {
        TTe.textContent = '&#10022; ' + f.title; TSe.innerHTML = '&#10022; ' + f.title + '</div><div class="ts">' + f.sub;
        TTe.textContent = f.title; TSe.textContent = f.sub;
        TIP.style.left = Math.min(e.clientX + 18, W - 220) + 'px';
        TIP.style.top = Math.max(e.clientY - 44, 10) + 'px';
        TIP.style.opacity = '1';
      } else { TIP.style.opacity = '0'; }
    });

    canv.addEventListener('click', function (e) {
      var mx = e.clientX / W, my = e.clientY / H;
      for (var i = 0; i < zones.length; i++) {
        var z = zones[i];
        if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) {
          if (z.winLeft) { toggleLeftWindow(); return; }
          if (z.winRight) { toggleRightWindow(); return; }
          if (z.lamp) { toggleLamp(); return; }
          if (z.vinyl) { toggleMusic(); return; }
          if (z.key === 'write') { location.href = '/journal'; return; }
          if (z.key === 'archive') { location.href = '/dashboard'; return; }
          if (z.key) { openM(z.key); return; }
        }
      }
    });

    canv.addEventListener('mouseleave', function () { TIP.style.opacity = '0'; hov = null; });

    function loop() { time++; draw(); requestAnimationFrame(loop); }
    resize();
    loop();
  </script>
