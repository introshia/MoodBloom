<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodBloom · Sanctuary</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #FDFCFB;
      --ink: #1C1917;
      --muted: #8C877E;
      --folio-orange: #FFA840;
      /* Golden orange */
      --glow: rgba(255, 170, 70, 0.15);
      --bg: #0A0402;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    /* ── CANVAS ── */
    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    /* ── NAVIGATION ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      z-index: 100;
      background: linear-gradient(rgba(10, 4, 1, 0.9), transparent);
    }

    .nav-logo {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      color: rgba(255, 190, 90, 0.85);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .nav-logo span {
      font-size: 13px;
      color: rgba(255, 160, 60, 0.4);
      font-weight: 300;
      margin-left: 4px;
    }

    .nav-right {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      color: rgba(200, 130, 50, 0.5);
      text-decoration: none;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.25s;
    }

    .nav-link:hover, .nav-link.active {
      color: rgba(255, 190, 90, 0.85);
    }

    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 160, 60, 0.1);
      border: 1px solid rgba(255, 160, 60, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255, 160, 60, 0.8);
      text-decoration: none;
      font-family: 'Lora', serif;
    }

    /* ── TOOLTIP ── */
    #tip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
      background: rgba(14, 5, 1, 0.92);
      border: 1px solid rgba(180, 90, 25, 0.25);
      border-radius: 12px;
      padding: 10px 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    #tip .tt {
      font-family: 'Lora', serif;
      font-size: 13px;
      color: var(--folio-orange);
      margin-bottom: 3px;
    }

    #tip .ts {
      font-size: 11px;
      color: rgba(160, 90, 30, 0.8);
      font-weight: 300;
      letter-spacing: 0.04em;
      font-style: italic;
    }

    /* ── MODAL ── */
    #modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #modal.show {
      opacity: 1;
      pointer-events: all;
    }

    #modal .overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 1, 0, 0.78);
      backdrop-filter: blur(4px);
    }

    #modal .card {
      position: relative;
      background: #1C0A03;
      border: 1px solid rgba(180, 90, 25, 0.22);
      border-radius: 20px;
      padding: 40px 48px;
      min-width: 340px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
      transform: translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #modal.show .card {
      transform: translateY(0);
    }

    #modal .card h2 {
      font-family: 'Lora', serif;
      font-size: 24px;
      color: #FFBA60;
      font-weight: 400;
      margin-bottom: 12px;
    }

    #modal .card p {
      font-size: 14px;
      color: rgba(180, 110, 40, 0.7);
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    #modal .card .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    #modal .card .btn {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid rgba(200, 110, 30, 0.4);
      border-radius: 24px;
      color: #FFA040;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'DM Sans', sans-serif;
    }

    #modal .card .btn:hover {
      background: rgba(200, 90, 20, 0.18);
      border-color: rgba(255, 160, 60, 0.6);
      transform: translateY(-2px);
    }

    #modal .card .close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 20px;
      color: rgba(180, 90, 30, 0.4);
      cursor: pointer;
      font-weight: 300;
      transition: color 0.2s;
    }

    #modal .card .close:hover {
      color: rgba(255, 160, 60, 0.8);
    }

    /* ── UI OVERLAYS ── */
    #lamptgl {
      position: fixed;
      bottom: 32px;
      right: 44px;
      z-index: 50;
      background: rgba(12, 5, 1, 0.75);
      border: 1px solid rgba(180, 90, 25, 0.25);
      border-radius: 22px;
      padding: 6px 20px;
      color: rgba(200, 120, 40, 0.7);
      font-size: 11.5px;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.25s;
    }

    #lamptgl:hover {
      color: rgba(255, 190, 80, 1);
      border-color: rgba(255, 160, 60, 0.4);
      background: rgba(24, 10, 2, 0.85);
    }

    #moodhint {
      position: fixed;
      bottom: 32px;
      left: 44px;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(180, 100, 30, 0.3);
      pointer-events: none;
      letter-spacing: 0.02em;
    }
  </style>
</head>

<body>

  <canvas id="c"></canvas>

  <nav>
    <a class="nav-logo" href="{{ url_for('dashboard') }}">
      ✦ Folio
      <span>/ sanctuary</span>
    </a>
    <div class="nav-right">
      <a href="{{ url_for('dashboard') }}" class="nav-link">Folio</a>
      <a href="{{ url_for('cozy_room') }}" class="nav-link active">Sanctuary</a>
      <a href="{{ url_for('journal') }}" class="nav-link">Journal</a>
      <a href="{{ url_for('profile') }}" class="nav-avatar" title="{{ session.get('username', 'Explorer') }}">
        {{ session.get('username', 'A')[0].upper() }}
      </a>
    </div>
  </nav>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="overlay" onclick="closeModal()"></div>
    <div class="card">
      <span class="close" onclick="closeModal()">✕</span>
      <h2 id="m-title">—</h2>
      <p id="m-body">—</p>
      <div id="m-action" class="btn-group">
        <div class="btn" onclick="closeModal()">Remain Quiet →</div>
      </div>
    </div>
  </div>

  <button id="lamptgl" onclick="toggleLamp()">☽ lamp</button>
  <div id="moodhint">a quiet evening in your study</div>

  <script>
    (function () {
      const canv = document.getElementById('c');
      const ctx = canv.getContext('2d');
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      let W, H, lampOn = true, time = 0, hov = null;
      const dust = Array.from({ length: 25 }, () => reset_dust({}));

      function reset_dust(d) {
        d.x = Math.random(); d.y = .15 + Math.random() * .55;
        d.vx = (Math.random() - .5) * .0003; d.vy = -Math.random() * .0004 - .0001;
        d.life = Math.random(); d.size = .5 + Math.random() * 1.5; return d;
      }

      function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canv.width = W * DPR; canv.height = H * DPR;
        canv.style.width = W + 'px'; canv.style.height = H + 'px';
        ctx.scale(DPR, DPR);
      }
      window.addEventListener('resize', () => { ctx.setTransform(1, 0, 0, 1, 0, 0); resize(); });
      resize();

      // helpers
      function px(x) { return x * W; }
      function py(y) { return y * H; }

      function rect(x, y, w, h, col, a = 1) {
        ctx.globalAlpha = a; ctx.fillStyle = col; ctx.fillRect(px(x), py(y), px(w), py(h)); ctx.globalAlpha = 1;
      }
      function tri(x1, y1, x2, y2, x3, y3, col, a = 1) {
        ctx.globalAlpha = a; ctx.fillStyle = col; ctx.beginPath();
        ctx.moveTo(px(x1), py(y1)); ctx.lineTo(px(x2), py(y2)); ctx.lineTo(px(x3), py(y3));
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      }
      function quad(pts, col, a = 1) {
        ctx.globalAlpha = a; ctx.fillStyle = col; ctx.beginPath();
        ctx.moveTo(px(pts[0]), py(pts[1]));
        for (let i = 2; i < pts.length; i += 2) ctx.lineTo(px(pts[i]), py(pts[i + 1]));
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      }
      function linGrad(x0, y0, x1, y1, stops) {
        const g = ctx.createLinearGradient(px(x0), py(y0), px(x1), py(y1));
        stops.forEach(([t, c]) => g.addColorStop(t, c)); return g;
      }

      // deterministic hash
      function h2(x, y) { const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5; return n - Math.floor(n); }

      const FLOOR_Y = 0.72;
      const WIN_X = 0.04, WIN_W = 0.14, WIN_Y = 0.12, WIN_H = 0.5;
      const SHELF_X = 0.74, SHELF_Y = 0.08, SHELF_W = 0.22, SHELF_H = 0.62;
      const LAMP_X = 0.638, LAMP_Y = 0.17;
      const DESK_X = 0.36, DESK_Y = 0.56, DESK_W = 0.22, DESK_H = 0.1;
      const CHAIR_X = 0.48, CHAIR_Y = 0.59;

      const BCOLS = ['#8B1A1A', '#1848A8', '#1E7830', '#C87A18', '#5C1A90', '#A83818', '#0A2E68', '#388014', '#8C2438', '#CA6820', '#1A5090', '#609830'];
      const books = [];
      function gen_books() {
        books.length = 0;
        const SHELVES = [.21, .38, .55, .71];
        SHELVES.forEach((sy, si) => {
          let bx = SHELF_X + .014;
          while (bx < SHELF_X + SHELF_W - .02) {
            const bw = .013 + h2(si * 11, bx * 900) * .012;
            const bh = .06 + h2(si * 7, bx * 400) * .065;
            const ci = Math.floor(h2(si * 3, bx * 200) * BCOLS.length);
            books.push({ x: bx, y: SHELF_Y + sy - bh, w: bw, h: bh, col: BCOLS[ci], shelf: si });
            bx += bw + .002 + h2(si, bx * 50) * .003;
          }
        });
      }
      gen_books();

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // ── SKY / CEILING ──
        const ceilG = linGrad(0, 0, 0, .12, [[0, '#0D0501'], [1, '#1E0B04']]);
        ctx.fillStyle = ceilG; ctx.fillRect(0, 0, W, py(.12));

        // ── WALLS ──
        const wallG = linGrad(.5, .12, .5, FLOOR_Y, [[0, '#3A1408'], [.4, '#4A1C0C'], [.7, '#421808'], [1, '#2E1006']]);
        ctx.fillStyle = wallG; ctx.fillRect(0, py(.12), W, py(FLOOR_Y - .12));

        // Wallpaper texture
        ctx.globalAlpha = 0.05;
        const STEP = 40;
        for (let x = 0; x < W; x += STEP) {
          for (let y = py(.14); y < py(FLOOR_Y - .01); y += STEP) {
            ctx.fillStyle = '#FF8020';
            ctx.save(); ctx.translate(x, y); ctx.rotate(Math.PI / 4);
            ctx.fillRect(-4, -4, 8, 8); ctx.restore();
          }
        }
        ctx.globalAlpha = 1;

        // Baseboard
        rect(0, FLOOR_Y - .018, 1, .02, '#1C0904');

        // ── WINDOW ──
        // Light glow
        const wg = ctx.createRadialGradient(px(WIN_X + WIN_W * .5), py(WIN_Y + WIN_H * .5), px(.02), px(WIN_X + WIN_W * .5), py(WIN_Y + WIN_H * .5), px(.38));
        wg.addColorStop(0, `rgba(255,200,80,${lampOn ? .32 : .04})`);
        wg.addColorStop(.4, `rgba(200,120,30,${lampOn ? .14 : .02})`);
        wg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = wg; ctx.fillRect(0, 0, W, H);

        rect(WIN_X, WIN_Y, WIN_W, WIN_H, '#2C1408');
        const paneCol = lampOn ? 'rgba(255,225,130,.75)' : 'rgba(80,100,160,.35)';
        rect(WIN_X + .012, WIN_Y + .012, WIN_W / 2 - .018, WIN_H * .55 - .006, paneCol);
        rect(WIN_X + WIN_W / 2 + .006, WIN_Y + .012, WIN_W / 2 - .018, WIN_H * .55 - .006, paneCol);
        rect(WIN_X + .012, WIN_Y + WIN_H * .55 + .006, WIN_W / 2 - .018, WIN_H * .45 - .018, lampOn ? 'rgba(240,210,110,.65)' : 'rgba(70,90,140,.3)');
        rect(WIN_X + WIN_W / 2 + .006, WIN_Y + WIN_H * .55 + .006, WIN_W / 2 - .018, WIN_H * .45 - .018, lampOn ? 'rgba(240,210,110,.65)' : 'rgba(70,90,140,.3)');

        // Curtains
        quad([WIN_X - .032, WIN_Y - .014, WIN_X + .018, WIN_Y - .014, WIN_X + .024, WIN_Y + WIN_H + .02, WIN_X - .04, WIN_Y + WIN_H + .02], '#6A1C10');
        quad([WIN_X + WIN_W - .018, WIN_Y - .014, WIN_X + WIN_W + .04, WIN_Y - .014, WIN_X + WIN_W + .046, WIN_Y + WIN_H + .02, WIN_X + WIN_W - .024, WIN_Y + WIN_H + .02], '#6A1C10');

        // Window light shaft
        if (lampOn) {
          const shaftG = ctx.createLinearGradient(px(WIN_X), py(FLOOR_Y - .01), px(WIN_X + .22), py(FLOOR_Y + .1));
          shaftG.addColorStop(0, 'rgba(255,200,80,.2)"); shaftG.addColorStop(1, 'rgba(255,180,60,0)");
          ctx.fillStyle = shaftG; ctx.beginPath(); ctx.moveTo(px(WIN_X + .012), py(FLOOR_Y)); ctx.lineTo(px(WIN_X + WIN_W - .01), py(FLOOR_Y));
          ctx.lineTo(px(WIN_X + WIN_W + .1), py(H)); ctx.lineTo(px(WIN_X - .08), py(H)); ctx.closePath(); ctx.fill();
        }

        // ── FLOOR ──
        const fG = linGrad(.5, FLOOR_Y, .5, 1, [[0, '#1A0804'], [.15, '#280E06'], [.5, '#220A04'], [1, '#0C0301']]);
        ctx.fillStyle = fG; ctx.fillRect(0, py(FLOOR_Y), W, py(1 - FLOOR_Y));
        for (let y = FLOOR_Y; y < 1; y += .025) { ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = .5; ctx.beginPath(); ctx.moveTo(0, py(y)); ctx.lineTo(W, py(y)); ctx.stroke(); }

        // ── RUG ──
        const rugX = .3, rugY = FLOOR_Y + .02, rugW = .38, rugH = .16;
        rect(rugX, rugY, rugW, rugH, '#5A1A10');
        ctx.globalAlpha = .12;
        for (let rx = rugX + .04; rx < rugX + rugW - .04; rx += .06) {
          ctx.fillStyle = '#FF6030'; ctx.save(); ctx.translate(px(rx), py(rugY + rugH * .5)); ctx.rotate(Math.PI / 4); ctx.fillRect(-px(.012), -px(.012), px(.024), px(.024)); ctx.restore();
        }
        ctx.globalAlpha = 1;

        // ── BOOKSHELF ──
        const sx = SHELF_X, sy = SHELF_Y, sw = SHELF_W, sh = SHELF_H;
        rect(sx, sy, sw, sh, '#1C0904');
        rect(sx + .012, sy + .012, sw - .024, sh - .024, '#0E0502');
        const SHELVES = [.21, .38, .55, .72];
        SHELVES.forEach(sy2 => { rect(sx + .012, sy + sy2 * sh, sw - 0.024, .014, '#3A1A08'); });
        books.forEach(b => { rect(b.x, b.y, b.w, b.h, b.col); rect(b.x, b.y, b.w, .004, 'rgba(255,255,255,.1)'); });

        // ── FLOOR LAMP ──
        const lpx = LAMP_X, lpy = LAMP_Y;
        rect(lpx - .018, FLOOR_Y - .012, .036, .012, '#3A1808');
        rect(lpx - .006, lpy, .012, FLOOR_Y - .03 - lpy, '#3A1808');
        const shdX = lpx - .048, shdY = lpy - .005, shdW = .096, shdH = .07;
        quad([shdX, shdY, shdX + shdW, shdY, shdX + shdW * .78, shdY + shdH, shdX + shdW * .22, shdY + shdH], lampOn ? '#C05C18' : '#4A1C0A');
        if (lampOn) {
          const lpg = ctx.createRadialGradient(px(lpx), py(lpy + .06), px(.006), px(lpx), py(lpy + .06), px(.42));
          lpg.addColorStop(0, 'rgba(255,190,60,.5)'); lpg.addColorStop(.5, 'rgba(200,100,10,.14)'); lpg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = lpg; ctx.fillRect(0, 0, W, H);
        }

        // ── WRITING DESK ──
        const dx = DESK_X, dy = DESK_Y, dw = DESK_W, dh = DESK_H;
        rect(dx + .014, dy + dh, .018, .08, '#3A1808'); rect(dx + dw - .028, dy + dh, .018, .08, '#3A1808');
        rect(dx, dy, dw, dh, '#4A2010');
        rect(dx + .04, dy - .04, .1, .064, '#8A3418'); // Journal
        if (lampOn) {
          const flame = .75 + Math.sin(time * .13) * .12;
          ctx.fillStyle = `rgba(255,220,80,${flame})`; ctx.fillRect(px(dx + .195), py(dy - .072), px(.006), py(.012));
        }

        // ── ARMCHAIR ──
        const cx = CHAIR_X, cy = CHAIR_Y, chW = .16, chH = .22;
        rect(cx, cy + chH * .52, chW, chH * .5, '#7A3018');
        rect(cx, cy, chW, chH * .52, '#7A3018');
        // Side table with tea
        rect(cx + chW + .01, cy + chH * .7, .048, .004, '#3A1808');
        rect(cx + chW + .018, cy + chH * .68, .028, .02, '#D8B880');
        if (lampOn) {
          const sp = ((time) % 60) / 60; const sa = Math.sin(sp * Math.PI) * .4;
          ctx.globalAlpha = sa; ctx.fillStyle = 'rgba(255,240,220,.7)'; ctx.fillRect(px(cx + chW + .03), py(cy + chH * .64 - sp * .05), px(.004), py(.006)); ctx.globalAlpha = 1;
        }

        // ── DUST MOTES ──
        if (lampOn) {
          dust.forEach(d => {
            d.x += d.vx; d.y += d.vy; d.life += .002;
            if (d.life > 1) reset_dust(d);
            ctx.globalAlpha = Math.sin(d.life * Math.PI) * .6; ctx.fillStyle = '#FFD278';
            ctx.beginPath(); ctx.arc(px(d.x), py(d.y), d.size, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
          });
        }

        // ── VIGNETTE ──
        const vg = ctx.createRadialGradient(W * .5, H * .5, H * .15, W * .5, H * .5, H * .75);
        vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,.85)');
        ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

        if (hov) {
          ctx.strokeStyle = 'rgba(255,160,50,.3)'; ctx.lineWidth = 1.5;
          ctx.strokeRect(px(hov.x) + 1, py(hov.y) + 1, px(hov.w) - 2, py(hov.h) - 2);
        }
      }

      // HOTSPOTS
      const zones = [
        { x: SHELF_X, y: SHELF_Y, w: SHELF_W, h: SHELF_H, title: 'Journal Archive', sub: 'reflect on your seasons', action: () => window.location.href = "{{ url_for('dashboard') }}" },
        { x: DESK_X, y: DESK_Y - .05, w: DESK_W, h: DESK_H + .08, title: 'Writing Desk', sub: 'inscribe a new memory', action: () => window.location.href = "{{ url_for('journal') }}" },
        { x: CHAIR_X - .01, y: CHAIR_Y, w: .19, h: .3, title: 'The Armchair', sub: 'check your atmosphere', modal: { t: 'Atmosphere Companion', b: 'Your companion is resting in the glow. Take a seat and check your recent emotional trends.' } },
        { x: LAMP_X - .06, y: LAMP_Y - .01, w: .1, h: .6, title: 'Floor Lamp', sub: 'toggle the glow', click: () => toggleLamp() },
        { x: WIN_X - .04, y: WIN_Y - .02, w: WIN_W + .08, h: WIN_H + .04, title: 'The Window', sub: 'watch the world turn', modal: { t: 'The Window', b: 'A soft starlight filters through. Beyond these walls, the world continues its slow, rhythmic dance.' } },
      ];

      const TIP = document.getElementById('tip'), TTe = document.getElementById('ttt'), TSe = document.getElementById('tts');
      const MOD = document.getElementById('modal');

      canv.addEventListener('mousemove', e => {
        const mx = e.clientX / W, my = e.clientY / H;
        const f = zones.find(z => mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) || null;
        hov = f; canv.style.cursor = f ? 'pointer' : 'crosshair';
        if (f && f.title !== 'Floor Lamp') {
          TTe.textContent = '✦ ' + f.title; TSe.textContent = f.sub;
          TIP.style.left = Math.min(e.clientX + 16, W - 200) + 'px';
          TIP.style.top = Math.max(e.clientY - 40, 60) + 'px'; TIP.style.opacity = '1';
        } else TIP.style.opacity = '0';
      });

      canv.addEventListener('click', e => {
        const mx = e.clientX / W, my = e.clientY / H;
        const f = zones.find(z => mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h);
        if (!f) return;
        if (f.modal) openModal(f.modal.t, f.modal.b);
        else if (f.click) f.click();
        else if (f.action) f.action();
      });

      window.openModal = function (t, b) {
        document.getElementById('m-title').textContent = t;
        document.getElementById('m-body').textContent = b;
        MOD.classList.add('show');
      };
      window.closeModal = function () { MOD.classList.remove('show'); };
      window.toggleLamp = function () {
        lampOn = !lampOn;
        document.getElementById('lamptgl').textContent = lampOn ? '☽ lamp' : '☀ lamp';
        document.getElementById('moodhint').textContent = lampOn ? 'a quiet evening in your study' : 'the cool touch of starlight';
      };

      function loop() { time++; draw(); requestAnimationFrame(loop); }
      loop();
    })();
  </script>
</body>

</html>
