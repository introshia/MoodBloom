<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Folio · Sanctuary</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0402
    }

    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair
    }

    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      z-index: 20;
      pointer-events: none
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 17px;
      color: rgba(255, 190, 90, .88);
      pointer-events: all;
      cursor: pointer;
      letter-spacing: -.01em
    }

    .logo span {
      font-size: 12px;
      opacity: .55;
      font-weight: 300
    }

    .links {
      display: flex;
      gap: 32px
    }

    .links a {
      font-size: 12px;
      color: rgba(200, 130, 50, .5);
      text-decoration: none;
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: all;
      cursor: pointer;
      transition: color .2s;
      font-weight: 300
    }

    .links a:hover,
    .links a.active {
      color: rgba(255, 190, 90, .9)
    }

    #tip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s;
      z-index: 30;
      background: rgba(10, 4, 1, .92);
      border: 1px solid rgba(180, 90, 25, .25);
      border-radius: 9px;
      padding: 7px 14px;
      white-space: nowrap
    }

    #tip .tt {
      font-family: 'Lora', serif;
      font-size: 12px;
      color: #FFA84A;
      margin-bottom: 2px
    }

    #tip .ts {
      font-size: 10px;
      color: rgba(160, 90, 30, .8);
      font-weight: 300;
      letter-spacing: .04em
    }

    #modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s
    }

    #modal.show {
      opacity: 1;
      pointer-events: all
    }

    .m-ov {
      position: absolute;
      inset: 0;
      background: rgba(4, 1, 0, .72)
    }

    .m-card {
      position: relative;
      background: #1A0802;
      border: 1px solid rgba(180, 90, 25, .22);
      border-radius: 18px;
      padding: 38px 44px;
      min-width: 320px;
      max-width: 460px;
      text-align: center
    }

    .m-card h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      color: #FFBA60;
      font-weight: 400;
      margin-bottom: 10px
    }

    .m-card p {
      font-size: 13px;
      color: rgba(180, 110, 40, .75);
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 28px
    }

    .m-btn {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid rgba(200, 110, 30, .4);
      border-radius: 24px;
      color: #FFA040;
      font-size: 12px;
      letter-spacing: .1em;
      cursor: pointer;
      transition: .2s;
      font-family: 'DM Sans', sans-serif
    }

    .m-btn:hover {
      background: rgba(200, 90, 20, .18)
    }

    .m-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 17px;
      color: rgba(180, 90, 30, .4);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit
    }

    .m-close:hover {
      color: rgba(255, 160, 60, .75)
    }

    #lamptgl {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 20;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .28);
      border-radius: 20px;
      padding: 7px 18px;
      color: rgba(200, 120, 40, .7);
      font-size: 11px;
      letter-spacing: .12em;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: .2s
    }

    #lamptgl:hover {
      color: rgba(255, 190, 80, .95)
    }

    #sound-ctrl {
      position: fixed;
      bottom: 72px;
      right: 36px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .55;
      transition: opacity .25s
    }

    #sound-ctrl:hover {
      opacity: 1
    }

    .s-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .2);
      color: rgba(200, 120, 40, .65);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s
    }

    .s-btn:hover,
    .s-btn.on {
      color: #FFA040;
      border-color: rgba(180, 90, 25, .45)
    }

    #timebadge {
      position: fixed;
      bottom: 28px;
      left: 44px;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(180, 100, 30, .38);
      pointer-events: none
    }

    #weatherbadge {
      position: fixed;
      bottom: 46px;
      left: 44px;
      font-size: 10px;
      color: rgba(160, 90, 30, .3);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .1em;
      pointer-events: none
    }

    /* ═══════════════════════════════════════════
       DESK OVERLAY
    ═══════════════════════════════════════════ */
    #desk-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.65s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #desk-overlay.show {
      opacity: 1;
      pointer-events: all
    }

    .desk-surface {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 35%, #8A5A30 0%, #6A3E1C 30%, #4A2810 65%, #2E1808 100%);
    }

    .desk-surface::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(87deg, transparent 0, transparent 38px, rgba(0, 0, 0, .05) 38px, rgba(0, 0, 0, .05) 40px);
      pointer-events: none;
    }

    .desk-surface::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255, 180, 80, .08) 0%, transparent 70%);
      pointer-events: none;
    }

    .btn-back-room {
      position: absolute;
      top: 20px;
      left: 24px;
      z-index: 200;
      background: rgba(10, 4, 1, .7);
      border: 1px solid rgba(180, 90, 25, .25);
      border-radius: 20px;
      padding: 8px 18px;
      color: rgba(200, 130, 50, .6);
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: all .2s;
    }

    .btn-back-room:hover {
      color: rgba(255, 190, 90, .9);
      border-color: rgba(200, 130, 50, .4)
    }

    /* ═══════════════════════════════════════════
       CLOSED JOURNAL — portrait orientation
    ═══════════════════════════════════════════ */
    #j-closed {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -52%) perspective(1000px) rotateX(12deg) rotateZ(-2deg);
      width: clamp(100px, 11vw, 150px);
      height: clamp(145px, 17vw, 220px);
      cursor: pointer;
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
    }

    #j-closed:hover {
      transform: translate(-50%, -55%) perspective(1000px) rotateX(10deg) rotateZ(-2deg) scale(1.05);
    }

    .j-cover-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #1E2B14 0%, #2A3A1C 45%, #1A2810 100%);
      border-radius: 3px 4px 4px 3px;
      position: relative;
      box-shadow: 0 20px 55px rgba(0, 0, 0, .65), 0 6px 16px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .j-spine-edge {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 12px;
      background: linear-gradient(to right, #060A04, #0E1608, rgba(0, 0, 0, 0));
      border-radius: 3px 0 0 3px;
    }

    /* Rings visible on spine of closed journal */
    .j-rings-closed {
      position: absolute;
      left: -4px;
      top: 0;
      bottom: 0;
      width: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 20% 0;
      pointer-events: none;
    }

    .j-ring-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #E0B830, #8A6010);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .5);
    }

    .j-page-edge {
      position: absolute;
      right: -4px;
      top: 4px;
      bottom: 4px;
      width: 5px;
      background: linear-gradient(to right, #D8C88A, #C4B070, #DDD0A0);
      border-radius: 0 2px 2px 0;
    }

    .j-page-edge-btm {
      position: absolute;
      bottom: -4px;
      left: 10px;
      right: 4px;
      height: 5px;
      background: linear-gradient(to bottom, #D8C88A, #C4B070);
      border-radius: 0 0 2px 2px;
    }

    .j-open-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 160, 100, .6);
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
    }

    #j-closed:hover .j-open-hint {
      opacity: 1
    }

    /* ═══════════════════════════════════════════
       COVER FLIP ANIMATION
    ═══════════════════════════════════════════ */
    #j-cover-flap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: left center;
      transform: translate(-50%, -52%) perspective(1000px);
      width: clamp(50px, 5.5vw, 75px);
      height: clamp(145px, 17vw, 220px);
      background: linear-gradient(160deg, #1E2B14 0%, #2A3A1C 45%, #1A2810 100%);
      border-radius: 0 4px 4px 0;
      box-shadow: 0 20px 55px rgba(0, 0, 0, .65);
      display: none;
      z-index: 110;
    }

    #j-cover-flap.flipping {
      display: block;
      animation: cover-flip 0.85s cubic-bezier(.4, 0, .2, 1) forwards;
    }

    @keyframes cover-flip {
      0% {
        transform: translate(-50%, -52%) perspective(1200px) rotateY(0deg);
      }

      100% {
        transform: translate(-140%, -52%) perspective(1200px) rotateY(-160deg);
      }
    }

    /* ═══════════════════════════════════════════
       OPEN JOURNAL — dark MoodBloom design
    ═══════════════════════════════════════════ */
    #j-open {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s ease;
      gap: 14px;
    }

    #j-open.visible {
      opacity: 1;
      pointer-events: all
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <nav id="nav">
    <div class="logo" id="logo-btn">&#10022; Folio <span>/ sanctuary</span></div>
    <div class="links">
      <a href="/dashboard">Dashboard</a>
      <a href="/journal">Journal</a>
      <a href="#" onclick="openM('mood');return false;">Mood</a>
    </div>
  </nav>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="m-ov" onclick="closeM()"></div>
    <div class="m-card">
      <button class="m-close" onclick="closeM()">&#x2715;</button>
      <h2 id="m-title"></h2>
      <p id="m-body"></p>
      <div class="m-btn" id="m-enter" onclick="closeM()">Enter &rarr;</div>
    </div>
  </div>

  <button id="lamptgl" onclick="toggleLamp()">&#9789; lamp</button>
  <div id="sound-ctrl">
    <button class="s-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#9835;</button>
    <button class="s-btn" id="btn-rain" onclick="toggleRain()" title="Rain">&#9748;</button>
  </div>
  <div id="timebadge">a quiet evening in your study</div>
  <div id="weatherbadge"></div>

  <script id="recent-entries-data" type="application/json">
    {{ recent_entries | default([]) | tojson }}
  </script>
  <script>
    // ── STATE ─────────────────────────────────────────────────────
    var lampOn = true, time = 0, hov = null;
    var mouseX = 0.5, mouseY = 0.5;
    var vinylPlaying = false, vinylAngle = 0;
    var journalDays = 0; // replace with: Number("{{ streak_days|default(0) }}")
    var weatherType = 'clear';
    var raindrops = [], snowflakes = [];
    var catBreath = 0, pageFlutter = 0;
    var musicOn = false, rainSoundOn = false;

    // Fireflies
    var fireflies = [];
    for (var _fi = 0; _fi < 10; _fi++) {
      fireflies.push({
        ox: 0.363 + Math.random() * 0.016, oy: 0.495 + Math.random() * 0.042,
        phase: Math.random() * Math.PI * 2, spd: 0.010 + Math.random() * 0.010,
        col: Math.random() > 0.5 ? '180,255,120' : '255,230,100'
      });
    }

    // Dust motes
    var dust = [];
    for (var _di = 0; _di < 24; _di++) dust.push(resetDust({}));
    function resetDust(d) {
      d.x = 0.05 + Math.random() * 0.65; d.y = 0.14 + Math.random() * 0.52;
      d.vx = (Math.random() - 0.5) * 0.00028; d.vy = -Math.random() * 0.00038 - 0.00009;
      d.life = Math.random(); d.sz = 0.35 + Math.random() * 1.05; return d;
    }

    // Weather
    var WEATHERS = ['clear', 'rain', 'snow', 'clear', 'clear'], weatherIdx = 0;
    setInterval(function () { weatherIdx = (weatherIdx + 1) % WEATHERS.length; weatherType = WEATHERS[weatherIdx]; initWeather(); }, 40000);
    function initWeather() {
      raindrops = []; snowflakes = [];
      if (weatherType === 'rain') for (var i = 0; i < 110; i++) raindrops.push(newRain());
      else if (weatherType === 'snow') for (var i = 0; i < 55; i++) snowflakes.push(newSnow());
    }
    function newRain() { return { x: Math.random(), y: Math.random() - .2, spd: 0.006 + Math.random() * 0.005, len: 0.026 + Math.random() * 0.016, a: 0.22 + Math.random() * 0.3 }; }
    function newSnow() { return { x: Math.random(), y: Math.random() - .1, spd: 0.0008 + Math.random() * 0.0007, drift: Math.random() * 6, a: 0.4 + Math.random() * 0.4, r: 1 + Math.random() * 2 }; }
    initWeather();

    function toggleLamp() { lampOn = !lampOn; document.getElementById('lamptgl').innerHTML = lampOn ? '&#9789; lamp' : '&#9788; lamp'; }
    function toggleMusic() { musicOn = !musicOn; vinylPlaying = musicOn; document.getElementById('btn-music').classList.toggle('on', musicOn); }
    function toggleRain() { rainSoundOn = !rainSoundOn; document.getElementById('btn-rain').classList.toggle('on', rainSoundOn); }
    window.toggleLamp = toggleLamp; window.toggleMusic = toggleMusic; window.toggleRain = toggleRain;

    // Modals
    var MODALS = {
      home: ['Your Room', 'Welcome home. Everything you have written lives here, waiting.'],
      write: ['Writing Desk', 'Open your journal and begin. A blank page is a kind of freedom.'],
      archive: ['Journal Archive', 'All your past entries, organised by season, mood and memory.'],
      mood: ['Atmosphere', 'Your Atmosphere companion reflects how you have been feeling lately.'],
      cat: ['Your Bunny', 'She is dozing softly. Bunnies sleep with their eyes half-closed — she feels safe here.'],
      plant: ['The Plant', journalDays >= 5 ? 'Thriving. She can feel you have been writing regularly.' : 'She misses you. Come back and write — she will perk right up.'],
      jar: ['Firefly Jar', 'Each light holds a word from your most uplifting entries. Small glowing thoughts.'],
      vinyl: ['Record Player', 'A soft lo-fi track fills the room with warmth.']
    };
    function openM(key) {
      var d = MODALS[key] || [key, ''];
      document.getElementById('m-title').textContent = d[0];
      document.getElementById('m-body').textContent = d[1];
      document.getElementById('modal').classList.add('show');
    }
    function closeM() { document.getElementById('modal').classList.remove('show'); }

    // ═══════════════════════════════════════════════════════════
    // DAILY PROMPTS & SCENES
    // ═══════════════════════════════════════════════════════════
    var DAILY_PROMPTS = [
      { title: 'Give It My All', icon: '◎', time: '11:00 PM', quote: 'I just do it, without worrying about the result. If it\'s not successful, I accept the outcome.', caption: 'A silence that held all the answers.', scene: 0 },
      { title: 'Small Steps', icon: '◈', time: '8:30 AM', quote: 'Every tiny movement forward is still progress. I honor the courage it takes to begin.', caption: 'A morning that asked nothing of me.', scene: 1 },
      { title: 'Let It Be', icon: '◉', time: '9:15 PM', quote: 'There is freedom in releasing what I cannot control. My peace does not depend on how things turn out.', caption: 'Waves that know where they belong.', scene: 2 },
      { title: 'Root Down', icon: '◆', time: '7:00 AM', quote: 'I am allowed to be still. To rest and grow quietly, without explanation or urgency.', caption: 'Mountains that have always known patience.', scene: 3 },
      { title: 'Open Hands', icon: '◇', time: '3:00 PM', quote: 'What is meant for me will not pass me by. I release my grip and trust the path ahead.', caption: 'A garden that keeps its promises.', scene: 4 },
      { title: 'Infinite Sky', icon: '✦', time: '11:45 PM', quote: 'I am more than my worries. There is a vastness inside me that fear has never touched.', caption: 'Stars that remember every wish.', scene: 5 },
      { title: 'Let Go', icon: '◉', time: '5:30 PM', quote: 'I release what has already passed. Every ending creates space for something beautiful.', caption: 'Leaves that dance on their way down.', scene: 6 },
      { title: 'Be Here', icon: '◎', time: '10:00 AM', quote: 'This moment is enough. I do not need to be anywhere else or anyone other than who I am right now.', caption: 'A field that holds its own warmth.', scene: 7 },
      { title: 'Bloom Gently', icon: '◈', time: '6:15 AM', quote: 'I do not have to rush my becoming. Growth has its own perfect timing, and I trust mine.', caption: 'Petals that know their own season.', scene: 8 },
      { title: 'Still Waters', icon: '◉', time: '8:00 PM', quote: 'Beneath all the noise, there is a quiet part of me that has always known what matters.', caption: 'A reflection that tells the truth.', scene: 9 }
    ];

    function getSceneSVG(idx) {
      var s = idx % 10;
      var scenes = [

    function getTodIcon() {
      var h = new Date().getHours();
      if (h >= 5 && h < 8) return '&#127748;';
      if (h >= 8 && h < 18) return '&#9728;';
      if (h >= 18 && h < 20) return '&#127747;';
      return '&#9790;';
    }



    // ═══════════════════════════════════════════════════════════
    // DESK VIEW (Triggers the overlay)
    // ═══════════════════════════════════════════════════════════
    function openDeskView() {
      if (window.startOpenJournal) {
        document.getElementById('desk-overlay').classList.add('show');
        var tip = document.getElementById('tip');
        if (tip) tip.style.opacity = '0';
      }
    }

    window.openM = openM; window.closeM = closeM;
    window.openDeskView = openDeskView;

    document.getElementById('logo-btn').addEventListener('click', function () { location.href = '/dashboard'; });

    // ── CANVAS ────────────────────────────────────────────────────
    var canv = document.getElementById('c');
    var ctx = canv.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, books = [];

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canv.width = W * DPR; canv.height = H * DPR;
      canv.style.width = W + 'px'; canv.style.height = H + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(DPR, DPR);
      genBooks();
    }
    window.addEventListener('resize', resize);

    // ── DRAW HELPERS ──────────────────────────────────────────────
    function px(x) { return x * W; } function py(y) { return y * H; }

    function fr(x, y, w, h, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col;
      ctx.fillRect(px(x), py(y), px(w), py(h));
      ctx.globalAlpha = 1;
    }
    function fp(pts, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(px(pts[0]), py(pts[1]));
      for (var i = 2; i < pts.length; i += 2) ctx.lineTo(px(pts[i]), py(pts[i + 1]));
      ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
    }
    function linG(x0, y0, x1, y1, stops) {
      var g = ctx.createLinearGradient(px(x0), py(y0), px(x1), py(y1));
      for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
      return g;
    }
    function circ(x, y, r, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a; ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(px(x), py(y), r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    function h2(x, y) { var n = Math.sin(x * 127.1 + y * 311.7) * 43758.5; return n - Math.floor(n); }
    function flk(t) { return 0.75 + Math.sin(t * 0.13) * 0.12 + Math.sin(t * 0.37) * 0.07; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function plx(f) { return 0; } function ply(f) { return 0; }

    // ── LAYOUT (Pixel Room — bookshelf left, window right) ────────────
    // Window: right side of wall (substantially larger)
    var WX = 0.32, WY = 0.05, WW = 0.64, WH = 0.58;
    // Window panel open/close state
    var leftOpen = false, rightOpen = false;
    // Breeze particles
    var breezeParticles = [];
    for (var _bp = 0; _bp < 30; _bp++) {
      breezeParticles.push({ x: WX + Math.random() * WW, y: WY + Math.random() * WH, vx: -0.0010 - Math.random() * 0.0010, vy: (Math.random() - 0.5) * 0.0004, a: Math.random(), life: Math.random() });
    }
    function resetBreeze(p, fromRight) {
      p.x = fromRight ? WX + WW - 0.02 : WX + 0.02;
      p.y = WY + 0.05 + Math.random() * (WH - 0.10);
      p.vx = fromRight ? -0.0010 - Math.random() * 0.0012 : 0.0010 + Math.random() * 0.0012;
      p.vy = (Math.random() - 0.5) * 0.0004;
      p.a = 0.2 + Math.random() * 0.5; p.life = 0;
    }
    // Bookshelf: front-facing on the left
    var SX = 0.00, SY = 0.04, SW = 0.20, SH = 0.78;
    // Floor
    var FY = 0.80;
    // Desk layout (3D structure: top surface and vertical front face with drawers)
    var DESK_TOP_Y = 0.65;   // Back edge of desk against the wall
    var DESK_FRONT_Y = 0.82; // Front edge of the desk top surface
    // Items on desk
    var DX = 0.35, DY = 0.72, DW = 0.30, DH = 0.10; // for zone calculations
    var LX = 0.26, LY = 0.55; // desk lamp position (moved to left side)

    // Book generation (for left side wall shelf)
    var BCOLS = ['#8B1A1A', '#1848A8', '#1E7830', '#C87A18', '#5C1A90', '#A83818', '#0A2E68', '#388014', '#8C2438', '#CA6820', '#1A5090', '#609830'];
    function genBooks() {
      books = [];
      // In first-person the shelf is on the left side wall — books appear foreshortened
      // We generate them as a flat list; draw loop handles the perspective skew
      var SHL = [0.20, 0.38, 0.56, 0.73];
      for (var si = 0; si < SHL.length; si++) {

      // ── 8. WINDOW PANELS (Traditional detailed inward swing) ───────

            var yr_t = by + (y_s - by) * (x_norm + w_norm), yr_b = (by + ph) + ((y_s + h_s) - (by + ph)) * (x_norm + w_norm);
            if (!isLeft) {

      // ── 9. CURTAINS (Original premium wavy version) ──────────
      var cFlutterL = anyOpen ? Math.sin(time * 0.07) * 0.012 : 0;

      // ─ ORNATE DESK LAMP (moved and scaled up) ─

        // 2. Ornate Turned Stem (Bulbous sections)
        var stY = lbY - 0.025 * sc;

        ctx.fillStyle = linG(lbX - 0.018 * sc, 0, lbX + 0.018 * sc, 0, [[0, '#1A0B05'], [0.5, '#4A2810'], [1, '#1A0B05']]);
        ctx.beginPath(); ctx.ellipse(px(lbX), py(stY - 0.03 * sc), px(0.018 * sc), py(0.025 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Middle spindle
        fr(lbX - 0.007 * sc, stY - 0.14 * sc, 0.014 * sc, 0.12 * sc, '#2E1208');
        // Top bulb
        ctx.beginPath(); ctx.ellipse(px(lbX), py(stY - 0.12 * sc), px(0.014 * sc), py(0.022 * sc), 0, 0, Math.PI * 2); ctx.fill();
        // Collar under shade
        fr(lbX - 0.01 * sc, lbY - 0.18 * sc, 0.02 * sc, 0.015 * sc, '#1A0B05');

        // 3. Peach Scalloped Shade
        var shTopY = lbY - 0.35 * sc, shBotY = lbY - 0.18 * sc;
        var shW_T = 0.06 * sc, shW_B = 0.125 * sc;

        ctx.fillStyle = lampOn ? '#FFB870' : '#8A4828';
        ctx.beginPath();
        ctx.moveTo(px(lbX - shW_T), py(shTopY));
        ctx.lineTo(px(lbX + shW_T), py(shTopY));
        ctx.lineTo(px(lbX + shW_B), py(shBotY));
        // Scalloped bottom edge
        var steps = 8;
        for (var i = 0; i < steps; i++) {
          var t = (i + 0.5) / steps;
          var sx = (lbX + shW_B) - (t * shW_B * 2);
          var sy = shBotY + 0.010 * sc * Math.sin(i * Math.PI); // wavy effect
          ctx.lineTo(px(sx), py(shBotY + 0.012 * sc));
        }
        ctx.lineTo(px(lbX - shW_B), py(shBotY));

        // Highline on shade
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(px(lbX - shW_T * 0.4), py(shTopY + 0.005 * sc)); ctx.lineTo(px(lbX - shW_B * 0.4), py(shBotY - 0.005 * sc)); ctx.stroke();

        if (lampOn) {
          // Internal bulb glow (balanced)
          var ig = ctx.createRadialGradient(px(lbX), py(shBotY - 0.02 * sc), 0, px(lbX), py(shBotY - 0.02 * sc), px(0.08 * sc));

          ctx.fillStyle = ig; ctx.beginPath(); ctx.ellipse(px(lbX), py(shBotY), px(shW_B * 1.1), py(0.020 * sc), 0, 0, Math.PI * 2); ctx.fill();

          // Desk light pool (wider, much softer transition)
          var dlg = ctx.createRadialGradient(px(lbX), py(lbY - 0.03 * sc), px(0.01), px(lbX), py(lbY - 0.03 * sc), px(0.55 * sc));

          ctx.fillStyle = dlg; ctx.fillRect(0, py(DESK_TOP_Y), W, py(1 - DESK_TOP_Y));
        }
      })();

      // ── 17. DUST MOTES ─────────────────────────────────────────────
      if (lampOn) {

          var d = dust[dmi];
          d.x += d.vx + Math.sin(time * 0.012 + d.life * 6) * 0.00028;

          ctx.globalAlpha = 1;
        }
      }

      // ── 18. VIGNETTE ──────────────────────────────────────────────
      var vgA = lampOn ? 0.38 : 0.68;
      var vg = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.16, W * 0.5, H * 0.5, H * 0.85);

      ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
      // Hover halo
      if (hov) drawUIHalo(hov);

      // ── 19. UPDATE BADGES ─────────────────────────────────────────
      var tLab = { dawn: 'pale morning light', day: 'afternoon at your desk', dusk: 'golden hour fading', night: 'deep evening quiet' };
      document.getElementById('timebadge').textContent = tLab[getTOD()] || 'a quiet moment';
      var wLab = { rain: 'soft rain outside', snow: 'snow falling quietly' };
      document.getElementById('weatherbadge').textContent = wLab[weatherType] || (anyOpen ? 'a gentle breeze' : '');
    }
    // ── SIDE BOOKSHELF (left wall, foreshortened) ─────────────────
    function drawFrontBookshelf() {
      // Front-facing bookshelf on the left wall, full height
      var cabX = SX, cabY = SY, cabW = SW, cabH = SH;

      // Shelf frame / back panel (darker wood)
      fr(cabX, cabY, cabW, cabH, '#1C0C06');

      // Side panels
      fr(cabX, cabY, 0.014, cabH, '#2E1608');
      fr(cabX + cabW - 0.014, cabY, 0.014, cabH, '#2E1608');

      // Top cap
      fr(cabX - 0.005, cabY - 0.014, cabW + 0.010, 0.018, '#3A1C0A');
      fr(cabX - 0.005, cabY - 0.003, cabW + 0.010, 0.006, '#4A2610');
      // Base / feet
      fr(cabX - 0.004, cabY + cabH, cabW + 0.008, 0.017, '#2A1206');

      // Shelf boards (4 shelves)

      for (var shi = 0; shi < SHLS.length; shi++) {

        fr(cabX + 0.014, shY2 + 0.014, cabW - 0.028, 0.005, 'rgba(0,0,0,.35)'); // shelf shadow
        fr(cabX + 0.014, shY2, cabW - 0.028, 0.004, 'rgba(100,60,20,.22)'); // shelf top highlight
      }

      // Books on each shelf
      for (var bi = 0; bi < books.length; bi++) {
        var b = books[bi];
        var shelfIdx = b.shelf;
        var shTop2 = cabY + SHLS[shelfIdx] * cabH;
        var bXf = cabX + 0.016 + b.bx * (cabW - 0.032) / (SW - 0.022);

      var kx = cabX + cabW * 0.72, ky = cabY + SHLS[1] * cabH;

      ctx.fillStyle = sEdge; ctx.fillRect(px(cabX + cabW), py(cabY - 0.015), px(0.04), py(cabH + 0.04));

      // Quest marker
      // Quest marker removed for minimalist look
      // drawQuestMarker(cabX + cabW * 0.50, cabY + SHLS[1] * cabH - 0.08, 'Archive');

    // ── OBJECT DRAWERS ────────────────────────────────────────────
    function drawCat(x, y) {
      // ── Sitting rabbit, side profile, upright posture ────────────
      // Anchor (x,y) = bottom-center of rabbit (floor level)
      // Positive y = DOWN, negative y = UP (canvas coords)
      // Rabbit faces RIGHT. Total height ~0.110, width ~0.075
      catBreath += 0.011;
      var br = Math.sin(catBreath) * 0.0016;
      ctx.save(); ctx.translate(px(x), py(y));

      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,.13)';
      ctx.beginPath(); ctx.ellipse(px(0.012), py(0.008), px(0.050), py(0.009), 0, 0, Math.PI * 2); ctx.fill();

      // ── HIND LEGS / HAUNCHES at bottom (wide, flat, slightly behind) ──
      var hleg = ctx.createLinearGradient(px(-0.025), py(0.005), px(0.010), py(0.005));
      hleg.addColorStop(0, '#9A6838'); hleg.addColorStop(0.6, '#B88A55'); hleg.addColorStop(1, '#CCA870');
      ctx.fillStyle = hleg;
      ctx.beginPath(); ctx.ellipse(px(-0.008), py(0.002), px(0.036), py(0.014), 0.05, 0, Math.PI * 2); ctx.fill();

      // Cotton tail
      ctx.fillStyle = '#F0EAD8'; ctx.beginPath(); ctx.arc(px(-0.034), py(-0.004), px(0.011), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(px(-0.036), py(-0.006), px(0.007), 0, Math.PI * 2); ctx.fill();

      // ── MAIN BODY — tall upright ellipse, the big shape ──────────
      // Highlight at upper-back (left-top), gradient darkens toward front-bottom
      var bodyG = ctx.createRadialGradient(
        px(-0.016), py(-0.052), px(0.005),   // highlight: upper-back
        px(0.002), py(-0.028), px(0.048)    // outer edge
      );
      bodyG.addColorStop(0, '#D4AA70');  // bright warm tan at top-back
      bodyG.addColorStop(0.32, '#BA8C52');  // mid honey
      bodyG.addColorStop(0.68, '#9A6838');  // shadow
      bodyG.addColorStop(1, '#7A5028');  // dark rim
      ctx.fillStyle = bodyG;
      // TALL ellipse, slightly tilted — this is the upright sitting posture
      ctx.beginPath(); ctx.ellipse(px(0.005), py(-0.032 + br * 0.5), px(0.038), py(0.046), -0.12, 0, Math.PI * 2); ctx.fill();

      // ── CHEST / BELLY — cream patch on front (right side of body) ──
      // In the reference this is the large off-white area on the right side
      ctx.fillStyle = '#E8D4A8';
      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022 + br * 0.4), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();
      // Soft feathered blend at edges
      var bellyFade = ctx.createRadialGradient(px(0.022), py(-0.022), px(0.004), px(0.022), py(-0.022), px(0.023));
      bellyFade.addColorStop(0.5, 'rgba(232,212,168,0)');
      bellyFade.addColorStop(1, 'rgba(140,90,40,.16)');
      ctx.fillStyle = bellyFade;
      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();

      // ── FRONT PAWS — small rounded ovals at bottom-right ─────────
      var pawG = ctx.createLinearGradient(px(0.008), py(0.006), px(0.038), py(0.006));
      pawG.addColorStop(0, '#9A6838'); pawG.addColorStop(1, '#CCA870');
      ctx.fillStyle = pawG;
      ctx.beginPath(); ctx.ellipse(px(0.014), py(0.006), px(0.011), py(0.007), 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#C09860';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(0.004), px(0.013), py(0.007), 0.1, 0, Math.PI * 2); ctx.fill();

      // ── HEAD — round, upper-right area, connected to body top ────
      var headG = ctx.createRadialGradient(
        px(0.024), py(-0.074), px(0.003),
        px(0.030), py(-0.062), px(0.026)
      );
      headG.addColorStop(0, '#D4AA70');
      headG.addColorStop(0.40, '#BA8C52');
      headG.addColorStop(0.80, '#9A6838');
      headG.addColorStop(1, '#7A5028');
      ctx.fillStyle = headG;

    function drawPlant(x, y, streak) {
      var health = Math.min(1, streak / 7);
      var g1 = lerp(0x28, 0x38, health), g2 = lerp(0x48, 0x78, health);
      var gc = 'rgb(' + Math.round(g1) + ',' + Math.round(g2 * 0.88) + ',' + Math.round(g1 * 0.48) + ')';
      var gc2 = 'rgb(' + Math.round(g2) + ',' + Math.round(g2) + ',' + Math.round(g1) + ')';
      fr(x + 0.006, y + 0.070, 0.026, 0.040, '#522C0E');
      fr(x + 0.008, y + 0.070, 0.022, 0.006, '#7A4024', 0.7);
      ctx.strokeStyle = gc; ctx.lineWidth = px(0.005); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.070)); ctx.lineTo(px(x + 0.019), py(y + 0.044)); ctx.stroke();
      if (health > 0.28) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.058)); ctx.lineTo(px(x + 0.005), py(y + 0.044)); ctx.stroke(); }
      if (health > 0.58) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.053)); ctx.lineTo(px(x + 0.035), py(y + 0.040)); ctx.stroke(); }
      function leaf(lx, ly, rot, size) {
        ctx.save(); ctx.translate(px(lx), py(ly)); ctx.rotate(rot);
        ctx.fillStyle = gc2; ctx.beginPath(); ctx.ellipse(0, 0, px(size), py(size * 0.48), 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(-px(size), 0); ctx.lineTo(px(size), 0); ctx.stroke();
        ctx.restore();
      }
      leaf(x + 0.019, y + 0.042, 0, 0.014);
      if (health > 0.28) leaf(x + 0.005, y + 0.042, -0.68, 0.010 * health + 0.004);
      if (health > 0.58) leaf(x + 0.035, y + 0.038, 0.58, 0.012 * health + 0.002);
      if (health > 0.84) { circ(x + 0.019, y + 0.032, px(0.006), 'rgba(255,175,115,.82)'); circ(x + 0.019, y + 0.032, px(0.003), 'rgba(255,228,95,.9)'); }
      if (health < 0.28) { ctx.strokeStyle = 'rgba(95,75,18,.45)'; ctx.lineWidth = px(0.004); ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.052)); ctx.quadraticCurveTo(px(x + 0.032), py(y + 0.058), px(x + 0.035), py(y + 0.068)); ctx.stroke(); }
    }

    function drawFireflyJar(x, y) {

      fr(x, y + 0.015, 0.030, 0.050, 'rgba(175,208,198,.16)');

    // ── PIXEL ART DESK ───────────────────────────────────────────
    function drawPixelDesk(ox, oy) {
      // ── SIMPLE DESK (matches the user's reference photo) ─────────
      var dw = DW, dh = DH;
      var floor = FY;

      // ── FOUR THIN LEGS (slightly tapered) ───────────────────
      function drawLeg(lx, ly, isBack) {
        var col = isBack ? '#240E04' : '#3A1808';
        var wth = isBack ? 0.010 : 0.018;
        var grad = isBack ? col : linG(lx, ly, lx + wth, ly, [[0, '#5A2C10'], [0.5, '#3A1808'], [1, '#240E04']]);
        ctx.fillStyle = grad;
        ctx.fillRect(px(lx), py(ly), px(wth), py(floor - ly));
        if (!isBack) fr(lx, ly, wth, 0.004, 'rgba(160,95,45,.40)');
      }
      // Rear legs
      drawLeg(ox + 0.026, oy + 0.04, true);
      drawLeg(ox + dw - 0.033, oy + 0.04, true);
      // Front legs
      drawLeg(ox + 0.018, oy + 0.04, false);
      drawLeg(ox + dw - 0.030, oy + 0.04, false);

      // ── MAIN DESK BODY ─────────────────────────────
      // Desktop overhang - warm brown
      ctx.fillStyle = linG(ox, oy, ox, oy + 0.012, [[0, '#8A4E28'], [0.5, '#6A3818'], [1, '#4A2210']]);
      ctx.fillRect(px(ox), py(oy), px(dw), py(0.012));

      // Main body housing (slightly inset)
      ctx.fillStyle = linG(ox, oy + 0.012, ox, oy + 0.045, [[0, '#3E1C0A'], [1, '#2A1408']]);
      ctx.fillRect(px(ox + 0.005), py(oy + 0.012), px(dw - 0.010), py(0.033));

      // ── TWO DRAWERS ─────────────────────────────────
      function drawDrawer(dx, dy, dwth) {
        // Drawer front face
        ctx.fillStyle = linG(dx, dy, dx, dy + 0.026, [[0, '#5A2C12'], [0.4, '#4A2210'], [1, '#321808']]);
        ctx.fillRect(px(dx), py(dy), px(dwth), py(0.026));
        // Subtle inset border
        ctx.strokeStyle = 'rgba(0,0,0,.26)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(px(dx) + 1, py(dy) + 1, px(dwth) - 2, py(0.026) - 2);
        // Dark handle / slot
        fr(dx + dwth * 0.35, dy + 0.011, dwth * 0.30, 0.005, '#1A0804');
        fr(dx + dwth * 0.35, dy + 0.011, dwth * 0.30, 0.002, 'rgba(255,160,80,.12)');
      }
      var drW = dw * 0.36;
      drawDrawer(ox + 0.022, oy + 0.018, drW);
      drawDrawer(ox + dw - 0.022 - drW, oy + 0.018, drW);

      // ── SPARKLES (matches photo's magic vibe) ────────
      ctx.save();
      for (var si = 0; si < 3; si++) {
        var sa = (Math.sin(time * 0.05 + si) + 1) * 0.5;
        var sx = ox + 0.05 + Math.sin(time * 0.02 + si * 2) * (dw - 0.1);
        var sy = oy + Math.cos(time * 0.03 + si) * 0.04;
        ctx.fillStyle = 'rgba(255,230,120,' + sa * 0.6 + ')';
        ctx.beginPath(); ctx.arc(px(sx), py(sy), px(0.003), 0, Math.PI * 2); ctx.fill();
        // Crosshair glint
        ctx.strokeStyle = 'rgba(255,245,180,' + sa * 0.4 + ')'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(px(sx - 0.008), py(sy)); ctx.lineTo(px(sx + 0.008), py(sy)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px(sx), py(sy - 0.008)); ctx.lineTo(px(sx), py(sy + 0.008)); ctx.stroke();
      }
      ctx.restore();

      // Shadow under desk body
      var ds = ctx.createRadialGradient(px(ox + dw * 0.5), py(floor), px(0.01), px(ox + dw * 0.5), py(floor), px(dw * 0.55));
      ds.addColorStop(0, 'rgba(0,0,0,.18)'); ds.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ds; ctx.fillRect(px(ox - 0.02), py(floor - 0.01), px(dw + 0.04), py(0.02));
    }

    // ── SMOOTH CHAIR (rear view, facing desk) ────────────────────
    // We see the back of the chair: backrest facing viewer,
    // seat and legs below. Chair is turned toward the desk.
    function drawPixelChair(ox, oy) {
      // 1 pixel unit  — scaled so chair width ≈ CWW
      // ── Proportions ──────────────────────────────────────────────
      var cw = CWW, ch = CHH;
      var bkH = ch * 0.55;           // backrest height
      var sY = oy + bkH;            // top of seat
      var sH = 0.022;               // seat frame thickness
      var legH = ch - bkH - sH;      // leg length below seat
      var postW = 0.016;             // back-post width

      // ── BACK LEGS (dark, behind seat) ────────────────────────────
      fr(ox + 0.012, sY + sH * 0.5, postW, legH * 0.92, '#381208');
      fr(ox + cw - 0.028, sY + sH * 0.5, postW, legH * 0.92, '#381208');

      // ── BACK POSTS (two vertical uprights of backrest frame) ──────
      // Left post
      ctx.fillStyle = linG(ox, oy, ox + postW, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + 0.012), py(oy), px(postW), py(bkH + sH));
      fr(ox + 0.012, oy, postW, 0.007, 'rgba(200,110,50,.50)'); // top cap
      // Right post
      ctx.fillStyle = linG(ox + cw - postW * 1.75, oy, ox + cw, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + cw - 0.028), py(oy), px(postW), py(bkH + sH));
      fr(ox + cw - 0.028, oy, postW, 0.007, 'rgba(200,110,50,.50)');

      // ── GREEN BACK CUSHION (between posts) ────────────────────────
      var bcX = ox + 0.012 + postW + 0.003;
      var bcW = (ox + cw - 0.028) - bcX - 0.003;
      var bcH = bkH * 0.86;
      ctx.fillStyle = linG(bcX, oy + 0.010, bcX, oy + 0.010 + bcH, [[0, '#7AAC30'], [0.45, '#5A8C1E'], [1, '#3E6412']]);
      ctx.fillRect(px(bcX), py(oy + 0.010), px(bcW), py(bcH));
      // Cushion highlight sheen
      fr(bcX, oy + 0.010, bcW, 0.008, 'rgba(165,230,65,.50)');
      fr(bcX, oy + 0.010, 0.007, bcH, 'rgba(165,230,65,.28)');
      // Cushion bottom shadow
      fr(bcX, oy + 0.010 + bcH - 0.006, bcW, 0.006, 'rgba(0,0,0,.18)');

      // ── SEAT FRAME ────────────────────────────────────────────────
      ctx.fillStyle = linG(ox, sY, ox, sY + sH, [[0, '#7A3018'], [1, '#4A1C0A']]);
      ctx.fillRect(px(ox), py(sY), px(cw), py(sH));
      fr(ox, sY, cw, 0.006, 'rgba(190,100,45,.45)'); // top rail highlight
      fr(ox, sY + sH - 0.005, cw, 0.005, 'rgba(0,0,0,.25)'); // bottom shadow

      // ── GREEN SEAT CUSHION (on top of seat) ───────────────────────
      var scH = 0.024;
      ctx.fillStyle = linG(ox, sY - scH, ox, sY, [[0, '#88C030'], [0.5, '#608C20'], [1, '#446012']]);
      ctx.fillRect(px(ox + 0.005), py(sY - scH), px(cw - 0.010), py(scH));
      fr(ox + 0.005, sY - scH, cw - 0.010, 0.007, 'rgba(175,240,70,.55)'); // top highlight
      fr(ox + 0.005, sY - scH, 0.008, scH, 'rgba(175,240,70,.30)');         // left highlight
      fr(ox + 0.005, sY - 0.005, cw - 0.010, 0.005, 'rgba(0,0,0,.14)');     // bottom edge

      // ── FRONT LEGS (slightly lighter, closer to viewer) ───────────
      fr(ox + 0.022, sY + sH, 0.015, legH * 0.88, '#6A2C10');
      fr(ox + 0.022, sY + sH, 0.005, legH * 0.88, 'rgba(180,90,35,.30)'); // front highlight
      fr(ox + cw - 0.037, sY + sH, 0.015, legH * 0.88, '#6A2C10');

      // ── STRETCHER BAR (horizontal brace) ─────────────────────────
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.008, '#5A2010');
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.003, 'rgba(180,90,35,.22)');

      // ── GROUND SHADOW ─────────────────────────────────────────────
      var csh = ctx.createRadialGradient(
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(0.005),
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(cw * 0.65)
      );
      csh.addColorStop(0, 'rgba(0,0,0,.22)'); csh.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = csh;
      ctx.fillRect(px(ox - 0.02), py(oy + ch), px(cw + 0.04), py(0.06));
    }

    function drawIvy() {
      function droopingVine(x, y, len, seed) {
        ctx.strokeStyle = '#1A2F10'; ctx.lineWidth = px(0.003); ctx.beginPath();
        for (var i = 0; i < 10; i++) {
          var step = i / 9; var ox = Math.sin(time * 0.04 + seed + i * 0.4) * 0.005;
          ctx.lineTo(px(x + ox), py(y + step * len));
        }
        ctx.stroke();
        for (var l = 0; l < 8; l++) {
          var tp = l / 7; var lx = x + Math.sin(time * 0.04 + seed + tp * 10 * 0.4) * 0.005;
          var ly = y + tp * len;
          circ(lx, ly, px(0.004), '#2E4C1A', 0.85); circ(lx + 0.003, ly, px(0.0022), '#4A7C2A', 0.4);
        }
      }
      droopingVine(0.05, 0.05, 0.18, 0.1); droopingVine(0.12, 0.05, 0.12, 0.5);
      droopingVine(0.88, 0.05, 0.22, 1.2); droopingVine(0.94, 0.05, 0.14, 2.3);
    }

    function drawUIHalo(zone) {
      if (!zone) return;

      var r = Math.max(zone.w, zone.h) * 0.8;
      var g = ctx.createRadialGradient(px(cx), py(cy), 0, px(cx), py(cy), px(r));
      g.addColorStop(0, 'rgba(255,230,150,0.15)'); g.addColorStop(1, 'rgba(255,230,150,0)');
      ctx.fillStyle = g; ctx.fillRect(px(cx - r), py(cy - r), px(r * 2), py(r * 2));
    }

    // ── ZONES ─────────────────────────────────────────────────────
    var zones = [
      // Window panels
      { x: WX, y: WY, w: WW * 0.5, h: WH, title: 'Left Window', sub: leftOpen ? 'click to close' : 'click to open', winLeft: true },
      { x: WX + WW * 0.5, y: WY, w: WW * 0.5, h: WH, title: 'Right Window', sub: rightOpen ? 'click to close' : 'click to open', winRight: true },
      // Bookshelf
      { x: SX, y: SY, w: SW, h: SH, title: 'Journal Archive', sub: 'all your past entries', key: 'archive' },
      // Desk items (mapped to the 3D surface)
      { x: 0.44, y: DESK_TOP_Y + 0.03, w: 0.12, h: 0.09, title: 'Writing Desk', sub: 'start a new entry', key: 'write' },
      { x: 0.64, y: DESK_TOP_Y + 0.01, w: 0.07, h: 0.08, title: 'Firefly Jar', sub: 'glowing thoughts', key: 'jar' },
      { x: 0.76, y: DESK_TOP_Y + 0.04, w: 0.07, h: 0.07, title: 'Morning Mug', sub: 'still warm', key: 'home' },
      // Lamp (moved to left and scaled up)
      { x: 0.22, y: DESK_TOP_Y - 0.16, w: 0.14, h: 0.28, title: 'Desk Lamp', sub: 'click to toggle light', lamp: true },
    ];

    // ── CLICK: WINDOW TOGGLES ─────────────────────────────────────
    function toggleLeftWindow() { leftOpen = !leftOpen; zones[0].sub = leftOpen ? 'click to close' : 'click to open'; }
    function toggleRightWindow() { rightOpen = !rightOpen; zones[1].sub = rightOpen ? 'click to close' : 'click to open'; }

    var TIP = document.getElementById('tip'), TTe = document.getElementById('ttt'), TSe = document.getElementById('tts');

    canv.addEventListener('mousemove', function (e) {
      mouseX = e.clientX / W; mouseY = e.clientY / H;
      var mx = mouseX, my = mouseY, f = null;
      for (var i = 0; i < zones.length; i++) { var z = zones[i]; if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) { f = z; break; } }
      hov = f; canv.style.cursor = f ? 'pointer' : 'crosshair';
      if (f) {
        TTe.textContent = '&#10022; ' + f.title; TSe.innerHTML = '&#10022; ' + f.title + '</div><div class="ts">' + f.sub;
        TTe.textContent = f.title; TSe.textContent = f.sub;
        TIP.style.left = Math.min(e.clientX + 18, W - 220) + 'px';
        TIP.style.top = Math.max(e.clientY - 44, 10) + 'px';
        TIP.style.opacity = '1';
      } else { TIP.style.opacity = '0'; }
    });

    canv.addEventListener('click', function (e) {
      var mx = e.clientX / W, my = e.clientY / H;
      for (var i = 0; i < zones.length; i++) {
        var z = zones[i];
        if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) {
          if (z.winLeft) { toggleLeftWindow(); return; }
          if (z.winRight) { toggleRightWindow(); return; }
          if (z.lamp) { toggleLamp(); return; }
          if (z.vinyl) { toggleMusic(); return; }
          if (z.key === 'write') { openDeskView(); return; }
          if (z.key === 'archive') { location.href = '/dashboard'; return; }
          if (z.key) { openM(z.key); return; }
        }
      }
    });

    canv.addEventListener('mouseleave', function () { TIP.style.opacity = '0'; hov = null; });

    function loop() { time++; draw(); requestAnimationFrame(loop); }
    resize();
    loop();
  </script>

</body>
