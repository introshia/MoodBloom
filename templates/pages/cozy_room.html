<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Folio · Sanctuary</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0402
    }

    #c {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair
    }

    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      z-index: 20;
      pointer-events: none
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 17px;
      color: rgba(255, 190, 90, .88);
      pointer-events: all;
      cursor: pointer;
      letter-spacing: -.01em
    }

    .logo span {
      font-size: 12px;
      opacity: .55;
      font-weight: 300
    }

    .links {
      display: flex;
      gap: 32px
    }

    .links a {
      font-size: 12px;
      color: rgba(200, 130, 50, .5);
      text-decoration: none;
      letter-spacing: .12em;
      text-transform: uppercase;
      pointer-events: all;
      cursor: pointer;
      transition: color .2s;
      font-weight: 300
    }

    .links a:hover,
    .links a.active {
      color: rgba(255, 190, 90, .9)
    }

    #tip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s;
      z-index: 30;
      background: rgba(10, 4, 1, .92);
      border: 1px solid rgba(180, 90, 25, .25);
      border-radius: 9px;
      padding: 7px 14px;
      white-space: nowrap
    }

    #tip .tt {
      font-family: 'Lora', serif;
      font-size: 12px;
      color: #FFA84A;
      margin-bottom: 2px
    }

    #tip .ts {
      font-size: 10px;
      color: rgba(160, 90, 30, .8);
      font-weight: 300;
      letter-spacing: .04em
    }

    #modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s
    }

    #modal.show {
      opacity: 1;
      pointer-events: all
    }

    .m-ov {
      position: absolute;
      inset: 0;
      background: rgba(4, 1, 0, .72)
    }

    .m-card {
      position: relative;
      background: #1A0802;
      border: 1px solid rgba(180, 90, 25, .22);
      border-radius: 18px;
      padding: 38px 44px;
      min-width: 320px;
      max-width: 460px;
      text-align: center
    }

    .m-card h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      color: #FFBA60;
      font-weight: 400;
      margin-bottom: 10px
    }

    .m-card p {
      font-size: 13px;
      color: rgba(180, 110, 40, .75);
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 28px
    }

    .m-btn {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid rgba(200, 110, 30, .4);
      border-radius: 24px;
      color: #FFA040;
      font-size: 12px;
      letter-spacing: .1em;
      cursor: pointer;
      transition: .2s;
      font-family: 'DM Sans', sans-serif
    }

    .m-btn:hover {
      background: rgba(200, 90, 20, .18)
    }

    .m-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 17px;
      color: rgba(180, 90, 30, .4);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit
    }

    .m-close:hover {
      color: rgba(255, 160, 60, .75)
    }

    #lamptgl {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 20;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .28);
      border-radius: 20px;
      padding: 7px 18px;
      color: rgba(200, 120, 40, .7);
      font-size: 11px;
      letter-spacing: .12em;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: .2s
    }

    #lamptgl:hover {
      color: rgba(255, 190, 80, .95)
    }

    #sound-ctrl {
      position: fixed;
      bottom: 72px;
      right: 36px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: .55;
      transition: opacity .25s
    }

    #sound-ctrl:hover {
      opacity: 1
    }

    .s-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(10, 4, 1, .78);
      border: 1px solid rgba(180, 90, 25, .2);
      color: rgba(200, 120, 40, .65);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s
    }

    .s-btn:hover,
    .s-btn.on {
      color: #FFA040;
      border-color: rgba(180, 90, 25, .45)
    }

    #timebadge {
      position: fixed;
      bottom: 28px;
      left: 44px;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(180, 100, 30, .38);
      pointer-events: none
    }

    #weatherbadge {
      position: fixed;
      bottom: 46px;
      left: 44px;
      font-size: 10px;
      color: rgba(160, 90, 30, .3);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .1em;
      pointer-events: none
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <nav id="nav">
    <div class="logo" id="logo-btn">&#10022; Folio <span>/ sanctuary</span></div>
    <div class="links">
      <a href="/dashboard">Folio</a>
      <a href="/sanctuary" class="active">Sanctuary</a>
      <a href="/journal">Journal</a>
      <a href="#" onclick="openM('mood');return false;">Mood</a>
    </div>
  </nav>

  <div id="tip">
    <div class="tt" id="ttt"></div>
    <div class="ts" id="tts"></div>
  </div>

  <div id="modal">
    <div class="m-ov" onclick="closeM()"></div>
    <div class="m-card">
      <button class="m-close" onclick="closeM()">&#x2715;</button>
      <h2 id="m-title"></h2>
      <p id="m-body"></p>
      <div class="m-btn" id="m-enter" onclick="closeM()">Enter &rarr;</div>
    </div>
  </div>

  <button id="lamptgl" onclick="toggleLamp()">&#9789; lamp</button>
  <div id="sound-ctrl">
    <button class="s-btn" id="btn-music" onclick="toggleMusic()" title="Music">&#9835;</button>
    <button class="s-btn" id="btn-rain" onclick="toggleRain()" title="Rain">&#9748;</button>
  </div>
  <div id="timebadge">a quiet evening in your study</div>
  <div id="weatherbadge"></div>

  <script>
    // ── STATE ─────────────────────────────────────────────────────
    var lampOn = true, time = 0, hov = null;
    var mouseX = 0.5, mouseY = 0.5;
    var vinylPlaying = false, vinylAngle = 0;
    var journalDays = 0; // replace with: Number("{{ streak_days|default(0) }}")
    var weatherType = 'clear';
    var raindrops = [], snowflakes = [];
    var catBreath = 0, pageFlutter = 0;
    var musicOn = false, rainSoundOn = false;

    // Fireflies
    var fireflies = [];
    for (var _fi = 0; _fi < 10; _fi++) {
      fireflies.push({
        ox: 0.363 + Math.random() * 0.016, oy: 0.495 + Math.random() * 0.042,
        phase: Math.random() * Math.PI * 2, spd: 0.010 + Math.random() * 0.010,
        col: Math.random() > 0.5 ? '180,255,120' : '255,230,100'
      });
    }

    // Dust motes
    var dust = [];
    for (var _di = 0; _di < 24; _di++) dust.push(resetDust({}));
    function resetDust(d) {
      d.x = 0.05 + Math.random() * 0.65; d.y = 0.14 + Math.random() * 0.52;
      d.vx = (Math.random() - 0.5) * 0.00028; d.vy = -Math.random() * 0.00038 - 0.00009;
      d.life = Math.random(); d.sz = 0.35 + Math.random() * 1.05; return d;
    }

    // Weather
    var WEATHERS = ['clear', 'rain', 'snow', 'clear', 'clear'], weatherIdx = 0;
    setInterval(function () { weatherIdx = (weatherIdx + 1) % WEATHERS.length; weatherType = WEATHERS[weatherIdx]; initWeather(); }, 40000);
    function initWeather() {
      raindrops = []; snowflakes = [];
      if (weatherType === 'rain') for (var i = 0; i < 110; i++) raindrops.push(newRain());
      else if (weatherType === 'snow') for (var i = 0; i < 55; i++) snowflakes.push(newSnow());
    }
    function newRain() { return { x: Math.random(), y: Math.random() - .2, spd: 0.006 + Math.random() * 0.005, len: 0.026 + Math.random() * 0.016, a: 0.22 + Math.random() * 0.3 }; }
    function newSnow() { return { x: Math.random(), y: Math.random() - .1, spd: 0.0008 + Math.random() * 0.0007, drift: Math.random() * 6, a: 0.4 + Math.random() * 0.4, r: 1 + Math.random() * 2 }; }
    initWeather();

    function toggleLamp() { lampOn = !lampOn; document.getElementById('lamptgl').innerHTML = lampOn ? '&#9789; lamp' : '&#9788; lamp'; }
    function toggleMusic() { musicOn = !musicOn; vinylPlaying = musicOn; document.getElementById('btn-music').classList.toggle('on', musicOn); }
    function toggleRain() { rainSoundOn = !rainSoundOn; document.getElementById('btn-rain').classList.toggle('on', rainSoundOn); }
    window.toggleLamp = toggleLamp; window.toggleMusic = toggleMusic; window.toggleRain = toggleRain;

    // Modals
    var MODALS = {
      home: ['Your Room', 'Welcome home. Everything you have written lives here, waiting.'],
      write: ['Writing Desk', 'Open your journal and begin. A blank page is a kind of freedom.'],
      archive: ['Journal Archive', 'All your past entries, organised by season, mood and memory.'],
      mood: ['Atmosphere', 'Your Atmosphere companion reflects how you have been feeling lately.'],
      cat: ['Your Bunny', 'She is dozing softly. Bunnies sleep with their eyes half-closed — she feels safe here.'],
      plant: ['The Plant', journalDays >= 5 ? 'Thriving. She can feel you have been writing regularly.' : 'She misses you. Come back and write — she will perk right up.'],
      jar: ['Firefly Jar', 'Each light holds a word from your most uplifting entries. Small glowing thoughts.'],
      vinyl: ['Record Player', 'A soft lo-fi track fills the room with warmth.']
    };
    function openM(key) {
      var d = MODALS[key] || [key, ''];
      document.getElementById('m-title').textContent = d[0];
      document.getElementById('m-body').textContent = d[1];
      document.getElementById('modal').classList.add('show');
    }
    function closeM() { document.getElementById('modal').classList.remove('show'); }
    window.openM = openM; window.closeM = closeM;

    document.getElementById('logo-btn').addEventListener('click', function () { location.href = '/dashboard'; });

    // ── CANVAS ────────────────────────────────────────────────────
    var canv = document.getElementById('c');
    var ctx = canv.getContext('2d');
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, books = [];

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canv.width = W * DPR; canv.height = H * DPR;
      canv.style.width = W + 'px'; canv.style.height = H + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(DPR, DPR);
      genBooks();
    }
    window.addEventListener('resize', resize);

    // ── DRAW HELPERS ──────────────────────────────────────────────
    function px(x) { return x * W; } function py(y) { return y * H; }

    function fr(x, y, w, h, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col;
      ctx.fillRect(px(x), py(y), px(w), py(h));
      ctx.globalAlpha = 1;
    }
    function fp(pts, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a;
      ctx.fillStyle = col; ctx.beginPath();
      ctx.moveTo(px(pts[0]), py(pts[1]));
      for (var i = 2; i < pts.length; i += 2) ctx.lineTo(px(pts[i]), py(pts[i + 1]));
      ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
    }
    function linG(x0, y0, x1, y1, stops) {
      var g = ctx.createLinearGradient(px(x0), py(y0), px(x1), py(y1));
      for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
      return g;
    }
    function circ(x, y, r, col, a) {
      ctx.globalAlpha = (a == null) ? 1 : a; ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(px(x), py(y), r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    function h2(x, y) { var n = Math.sin(x * 127.1 + y * 311.7) * 43758.5; return n - Math.floor(n); }
    function flk(t) { return 0.75 + Math.sin(t * 0.13) * 0.12 + Math.sin(t * 0.37) * 0.07; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function plx(f) { return (mouseX - 0.5) * f; } function ply(f) { return (mouseY - 0.5) * f * 0.4; }

    // ── LAYOUT ────────────────────────────────────────────────────
    var FY = 0.72;
    var WX = 0.04, WY = 0.10, WW = 0.22, WH = 0.52; // window
    var SX = 0.74, SY = 0.06, SW = 0.24, SH = 0.65;  // bookshelf
    var LX = 0.71, LY = 0.14;                     // lamp
    var DX = 0.38, DY = 0.55, DW = 0.24, DH = 0.10;  // desk (centered)
    var CX = 0.415, CY = 0.57, CWW = 0.17, CHH = 0.23; // chair (centered)

    // Book generation
    var BCOLS = ['#8B1A1A', '#1848A8', '#1E7830', '#C87A18', '#5C1A90', '#A83818', '#0A2E68', '#388014', '#8C2438', '#CA6820', '#1A5090', '#609830'];
    function genBooks() {
      books = [];
      var SHL = [0.20, 0.38, 0.56, 0.73];
      for (var si = 0; si < SHL.length; si++) {
        var s2 = SHL[si], bx = SX + 0.016;
        while (bx < SX + SW - 0.022) {
          var bw = 0.013 + h2(si * 11, bx * 900) * 0.012;
          var bh = 0.065 + h2(si * 7, bx * 400) * 0.065;
          var ci = Math.floor(h2(si * 3, bx * 200) * BCOLS.length) % BCOLS.length;
          books.push({ x: bx, y: SY + s2 * SH - bh, w: bw, h: bh, col: BCOLS[ci] });
          bx += bw + 0.002 + h2(si, bx * 50) * 0.003;
        }
      }
    }

    // ── TIME OF DAY PALETTE ───────────────────────────────────────
    function getTOD() { var h = new Date().getHours(); if (h >= 5 && h < 8) return 'dawn'; if (h >= 8 && h < 17) return 'day'; if (h >= 17 && h < 20) return 'dusk'; return 'night'; }
    function getPal() {
      var t = getTOD();
      return ({
        dawn: { w0: '#8A5030', w1: '#6A3818', ceil: '#3A2010', wTint: 'rgba(255,225,185,.80)', wGlow: '255,210,160', aR: 245, aG: 175, aB: 110 },
        day: { w0: '#7A4828', w1: '#60341A', ceil: '#30180A', wTint: 'rgba(255,248,200,.86)', wGlow: '255,235,155', aR: 255, aG: 215, aB: 120 },
        dusk: { w0: '#8A3C18', w1: '#6A2C0C', ceil: '#2C1006', wTint: 'rgba(255,165,90,.75)', wGlow: '255,145,70', aR: 255, aG: 148, aB: 72 },
        night: { w0: '#4A2C1C', w1: '#361E10', ceil: '#1A0C06', wTint: 'rgba(80,100,185,.45)', wGlow: '100,130,225', aR: 120, aG: 148, aB: 225 }
      })[t] || { w0: '#7A4828', w1: '#60341A', ceil: '#30180A', wTint: 'rgba(255,248,200,.86)', wGlow: '255,235,155', aR: 255, aG: 215, aB: 120 };
    }

    // ── MAIN DRAW ─────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      var pal = getPal();
      var ox0 = plx(0.010), oy0 = ply(0.010);
      var ox1 = plx(0.022), oy1 = ply(0.022);

      // ─ CEILING ─
      ctx.fillStyle = linG(0, 0, 0, 0.12, [[0, pal.ceil], [1, pal.w1]]);
      ctx.fillRect(0, 0, W, py(0.12));

      // ─ WALL ─
      ctx.fillStyle = linG(0.5, 0.10, 0.5, FY, [[0, pal.w0], [0.45, pal.w1], [1, '#3A1E0A']]);
      ctx.fillRect(0, py(0.10), W, py(FY - 0.10));

      // Wallpaper diamonds
      ctx.globalAlpha = 0.07;
      var STEP = Math.max(24, Math.round(W / 34));
      for (var wx = 0; wx < W; wx += STEP) {
        for (var wy = py(0.13); wy < py(FY - 0.01); wy += STEP) {
          ctx.fillStyle = '#C86820';
          ctx.save(); ctx.translate(wx, wy); ctx.rotate(Math.PI / 4);
          var ss = STEP * 0.38; ctx.fillRect(-ss, -ss, ss * 2, ss * 2); ctx.restore();
        }
      }
      ctx.globalAlpha = 1;

      // Horizontal panelling lines
      ctx.strokeStyle = 'rgba(0,0,0,.20)'; ctx.lineWidth = 0.8;
      for (var pl = 0.18; pl < FY; pl += 0.088) { ctx.beginPath(); ctx.moveTo(0, py(pl)); ctx.lineTo(W, py(pl)); ctx.stroke(); }
      // Cornice
      fr(0, 0.110, 1, 0.016, '#1E0C06'); fr(0, 0.095, 1, 0.018, '#2A1408');
      // Chair rail
      fr(0, 0.460, 1, 0.014, '#1C0A06'); fr(0, 0.474, 1, 0.007, '#140804');
      // Baseboard
      fr(0, FY - 0.020, 1, 0.022, '#1A0905'); fr(0, FY - 0.024, 1, 0.007, '#241208');

      // ─ WINDOW (parallax far) ─
      ctx.save(); ctx.translate(px(ox0), py(oy0));
      // Glow behind window
      var wa = lampOn ? 0.68 : 0.28;
      var wgg = ctx.createRadialGradient(px(WX + WW * 0.5), py(WY + WH * 0.5), px(0.02), px(WX + WW * 0.5), py(WY + WH * 0.5), px(0.52));
      wgg.addColorStop(0, 'rgba(' + pal.wGlow + ',' + wa + ')');
      wgg.addColorStop(0.35, 'rgba(' + pal.wGlow + ',' + (wa * 0.45) + ')');
      wgg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = wgg; ctx.fillRect(0, 0, W, H);

      // Window outer frame
      fr(WX, WY, WW, WH, '#3A1C0A');
      // Glass — split into 4 panes
      var pw = WW / 2 - 0.018, ph1 = WH * 0.56 - 0.006, ph2 = WH * 0.44 - 0.018;
      var pC = lampOn ? pal.wTint : 'rgba(38,52,115,.30)';
      var pC2 = lampOn ? 'rgba(240,205,105,.68)' : 'rgba(55,75,130,.24)';
      fr(WX + 0.013, WY + 0.013, pw, ph1, pC);
      fr(WX + WW / 2 + 0.005, WY + 0.013, pw, ph1, pC);
      fr(WX + 0.013, WY + WH * 0.56 + 0.005, pw, ph2, pC2);
      fr(WX + WW / 2 + 0.005, WY + WH * 0.56 + 0.005, pw, ph2, pC2);
      // Pane highlights
      fr(WX + 0.015, WY + 0.015, pw, 0.025, 'rgba(255,255,220,.28)');
      fr(WX + WW / 2 + 0.007, WY + 0.015, pw, 0.025, 'rgba(255,255,220,.22)');
      // Frame dividers
      fr(WX + WW / 2 - 0.007, WY, 0.014, WH, '#3A1C0A');
      fr(WX, WY + WH * 0.56 - 0.006, WW, 0.012, '#3A1C0A');
      fr(WX, WY, WW, 0.013, '#3A1C0A'); fr(WX, WY + WH - 0.011, WW, 0.011, '#3A1C0A');
      fr(WX, WY, 0.012, WH, '#3A1C0A'); fr(WX + WW - 0.012, WY, 0.012, WH, '#3A1C0A');

      // RAIN / SNOW inside window
      if (weatherType === 'rain') {
        ctx.save();
        ctx.beginPath(); ctx.rect(px(WX + 0.013), py(WY + 0.013), px(WW - 0.026), py(WH - 0.026)); ctx.clip();
        ctx.strokeStyle = 'rgba(180,215,255,.52)'; ctx.lineWidth = 1;
        for (var ri = 0; ri < raindrops.length; ri++) {
          var rd = raindrops[ri]; rd.y += rd.spd; if (rd.y > WY + WH + 0.05) rd.y = WY - 0.05;
          ctx.globalAlpha = rd.a; ctx.beginPath(); ctx.moveTo(px(rd.x), py(rd.y)); ctx.lineTo(px(rd.x - 0.003), py(rd.y + rd.len)); ctx.stroke();
        }
        ctx.globalAlpha = 1; ctx.restore();
        ctx.fillStyle = 'rgba(110,150,215,.055)'; ctx.fillRect(0, 0, W, H);
      }
      if (weatherType === 'snow') {
        ctx.save();
        ctx.beginPath(); ctx.rect(px(WX + 0.013), py(WY + 0.013), px(WW - 0.026), py(WH - 0.026)); ctx.clip();
        for (var sni = 0; sni < snowflakes.length; sni++) {
          var sf = snowflakes[sni]; sf.y += sf.spd; sf.x += Math.sin(time * 0.02 + sf.drift) * 0.0003;
          if (sf.y > WY + WH + 0.04) { sf.y = WY - 0.04; sf.x = WX + 0.013 + Math.random() * (WW - 0.026); }
          circ(sf.x, sf.y, sf.r, 'rgba(218,232,255,1)', sf.a);
        }
        ctx.restore();
        ctx.fillStyle = 'rgba(170,195,238,.04)'; ctx.fillRect(0, 0, W, H);
      }

      // Curtains
      fp([WX - 0.034, WY - 0.016, WX + 0.020, WY - 0.016, WX + 0.026, WY + WH + 0.022, WX - 0.042, WY + WH + 0.022], '#5A1A0E');
      fp([WX - 0.031, WY - 0.013, WX - 0.004, WY - 0.013, WX - 0.002, WY + WH + 0.017, WX - 0.033, WY + WH + 0.017], '#7A2416', 0.82);

    // ── OBJECT DRAWERS ────────────────────────────────────────────
    function drawCat(x, y) {
      // ── Sitting rabbit, side profile, upright posture ────────────
      // Anchor (x,y) = bottom-center of rabbit (floor level)
      // Positive y = DOWN, negative y = UP (canvas coords)
      // Rabbit faces RIGHT. Total height ~0.110, width ~0.075

      ctx.fillStyle = hleg;
      ctx.beginPath(); ctx.ellipse(px(-0.008), py(0.002), px(0.036), py(0.014), 0.05, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(px(-0.036), py(-0.006), px(0.007), 0, Math.PI * 2); ctx.fill();

      // ── MAIN BODY — tall upright ellipse, the big shape ──────────

        px(-0.016), py(-0.052), px(0.005),   // highlight: upper-back
        px(0.002),  py(-0.028), px(0.048)    // outer edge

      bodyG.addColorStop(0.32, '#BA8C52');  // mid honey
      bodyG.addColorStop(0.68, '#9A6838');  // shadow
      bodyG.addColorStop(1,    '#7A5028');  // dark rim
      ctx.fillStyle = bodyG;
      // TALL ellipse, slightly tilted — this is the upright sitting posture
      ctx.beginPath(); ctx.ellipse(px(0.005), py(-0.032 + br * 0.5), px(0.038), py(0.046), -0.12, 0, Math.PI * 2); ctx.fill();

      // ── CHEST / BELLY — cream patch on front (right side of body) ──
      // In the reference this is the large off-white area on the right side
      ctx.fillStyle = '#E8D4A8';
      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022 + br * 0.4), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();
      // Soft feathered blend at edges

      bellyFade.addColorStop(0.5, 'rgba(232,212,168,0)');

      ctx.beginPath(); ctx.ellipse(px(0.022), py(-0.022), px(0.020), py(0.030), 0.18, 0, Math.PI * 2); ctx.fill();

      // ── FRONT PAWS — small rounded ovals at bottom-right ─────────
      var pawG = ctx.createLinearGradient(px(0.008), py(0.006), px(0.038), py(0.006));

      ctx.fillStyle = '#C09860';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(0.004), px(0.013), py(0.007), 0.1, 0, Math.PI * 2); ctx.fill();

      // ── HEAD — round, upper-right area, connected to body top ────

        px(0.024), py(-0.074), px(0.003),

      // Near ear (right, more upright, fuller, warm)
      var earNearG = ctx.createRadialGradient(px(0.025), py(-0.104), px(0.003), px(0.028), py(-0.094), px(0.012));
      earNearG.addColorStop(0, '#D4AA70'); earNearG.addColorStop(0.5, '#BA8C52'); earNearG.addColorStop(1, '#9A6838');
      ctx.fillStyle = earNearG;
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.094), px(0.010), py(0.028), 0.10, 0, Math.PI * 2); ctx.fill();
      // Inner ear — warm salmon channel (clearly visible)
      ctx.fillStyle = '#C08060';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.092), px(0.006), py(0.019), 0.10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(195,125,95,.38)';
      ctx.beginPath(); ctx.ellipse(px(0.028), py(-0.091), px(0.003), py(0.012), 0.10, 0, Math.PI * 2); ctx.fill();

      // ── EYE — small, warm dark brown, with catchlight ────────────
      ctx.fillStyle = '#1E1008';
      ctx.beginPath(); ctx.arc(px(0.044), py(-0.063), px(0.007), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(px(0.047), py(-0.067), px(0.003), 0, Math.PI * 2); ctx.fill();

      // ── MUZZLE / NOSE ─────────────────────────────────────────────
      ctx.fillStyle = '#E8D4A8';
      ctx.beginPath(); ctx.ellipse(px(0.050), py(-0.054), px(0.009), py(0.007), 0.12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#C07858';
      ctx.beginPath(); ctx.ellipse(px(0.053), py(-0.054), px(0.004), py(0.003), 0, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }


    function drawPlant(x, y, streak) {
      var health = Math.min(1, streak / 7);
      var g1 = lerp(0x28, 0x38, health), g2 = lerp(0x48, 0x78, health);
      var gc = 'rgb(' + Math.round(g1) + ',' + Math.round(g2 * 0.88) + ',' + Math.round(g1 * 0.48) + ')';
      var gc2 = 'rgb(' + Math.round(g2) + ',' + Math.round(g2) + ',' + Math.round(g1) + ')';
      fr(x + 0.006, y + 0.070, 0.026, 0.040, '#522C0E');
      fr(x + 0.008, y + 0.070, 0.022, 0.006, '#7A4024', 0.7);
      ctx.strokeStyle = gc; ctx.lineWidth = px(0.005); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.070)); ctx.lineTo(px(x + 0.019), py(y + 0.044)); ctx.stroke();
      if (health > 0.28) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.058)); ctx.lineTo(px(x + 0.005), py(y + 0.044)); ctx.stroke(); }
      if (health > 0.58) { ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.053)); ctx.lineTo(px(x + 0.035), py(y + 0.040)); ctx.stroke(); }
      function leaf(lx, ly, rot, size) {
        ctx.save(); ctx.translate(px(lx), py(ly)); ctx.rotate(rot);
        ctx.fillStyle = gc2; ctx.beginPath(); ctx.ellipse(0, 0, px(size), py(size * 0.48), 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(-px(size), 0); ctx.lineTo(px(size), 0); ctx.stroke();
        ctx.restore();
      }
      leaf(x + 0.019, y + 0.042, 0, 0.014);
      if (health > 0.28) leaf(x + 0.005, y + 0.042, -0.68, 0.010 * health + 0.004);
      if (health > 0.58) leaf(x + 0.035, y + 0.038, 0.58, 0.012 * health + 0.002);
      if (health > 0.84) { circ(x + 0.019, y + 0.032, px(0.006), 'rgba(255,175,115,.82)'); circ(x + 0.019, y + 0.032, px(0.003), 'rgba(255,228,95,.9)'); }
      if (health < 0.28) { ctx.strokeStyle = 'rgba(95,75,18,.45)'; ctx.lineWidth = px(0.004); ctx.beginPath(); ctx.moveTo(px(x + 0.019), py(y + 0.052)); ctx.quadraticCurveTo(px(x + 0.032), py(y + 0.058), px(x + 0.035), py(y + 0.068)); ctx.stroke(); }
    }

    function drawOpenBook(x, y) {
      pageFlutter += 0.028;
      var fl = Math.sin(pageFlutter) * 0.0028;
      var bw = 0.130, bh = 0.086;
      // Left page
      fp([x, y + bh * 0.10, x + bw * 0.5, y, x + bw * 0.5, y + bh, x, y + bh], '#EEE5CD');
      for (var li = 0; li < 6; li++) fr(x + 0.008, y + 0.016 + li * 0.010, bw * 0.44 - 0.008, 0.002, 'rgba(95,65,38,.10)');
      // Right page (flutters slightly)
      fp([x + bw * 0.5, y, x + bw + fl, y + bh * 0.11 + fl, x + bw + fl, y + bh - fl * 0.5, x + bw * 0.5, y + bh], '#E8DFCA');
      for (var ri = 0; ri < 6; ri++) fr(x + bw * 0.52, y + 0.016 + ri * 0.010, bw * 0.44 - 0.008, 0.002, 'rgba(95,65,38,.09)');
      // Spine
      fp([x + bw * 0.5 - 0.004, y, x + bw * 0.5 + 0.004, y, x + bw * 0.5 + 0.004, y + bh, x + bw * 0.5 - 0.004, y + bh], '#521C0C');
      // Shadow under
      ctx.fillStyle = 'rgba(0,0,0,.16)'; ctx.beginPath(); ctx.ellipse(px(x + bw * 0.5), py(y + bh + 0.005), px(bw * 0.48), py(0.008), 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawFireflyJar(x, y) {
      // Jar body
      fr(x, y + 0.015, 0.030, 0.050, 'rgba(175,208,198,.16)');
      fr(x - 0.002, y + 0.012, 0.034, 0.006, 'rgba(148,178,168,.28)');
      fr(x + 0.004, y + 0.065, 0.022, 0.006, 'rgba(148,178,168,.22)');
      // Glass highlight
      fr(x + 0.003, y + 0.017, 0.006, 0.040, 'rgba(255,255,255,.10)');
      // Cork lid
      fr(x - 0.002, y + 0.009, 0.034, 0.005, '#5A3018');
      // Fireflies
      for (var ffi = 0; ffi < fireflies.length; ffi++) {
        var ff = fireflies[ffi];
        var fa = (Math.sin(time * ff.spd + ff.phase) + 1) * 0.5;
        if (fa < 0.07) continue;
        var ffx = ff.ox + Math.sin(time * ff.spd * 0.68 + ff.phase) * 0.007;
        var ffy = ff.oy + Math.cos(time * ff.spd * 0.48 + ff.phase * 1.28) * 0.013;
        var ffg = ctx.createRadialGradient(px(ffx), py(ffy), 0, px(ffx), py(ffy), px(0.010));
        ffg.addColorStop(0, 'rgba(' + ff.col + ',' + (fa * 0.90) + ')');
        ffg.addColorStop(1, 'rgba(' + ff.col + ',0)');
        ctx.fillStyle = ffg; ctx.fillRect(px(ffx) - px(0.010), py(ffy) - px(0.010), px(0.020), px(0.020));
        circ(ffx, ffy, 1.1, 'rgba(' + ff.col + ',1)', fa * 0.92);
      }
    }

    function drawVinyl(x, y) {
      var vw = 0.050, vh = 0.034;
      fr(x, y, vw, vh, '#261204');
      fr(x, y, vw, 0.005, '#361A0A');
      var rx = x + 0.012, ry = y + 0.006;
      circ(rx + 0.010, ry + 0.010, px(0.013), '#180E06');
      circ(rx + 0.010, ry + 0.010, px(0.009), '#201208');
      circ(rx + 0.010, ry + 0.010, px(0.004), '#C02E1C');
      circ(rx + 0.010, ry + 0.010, px(0.002), '#381406');
      ctx.strokeStyle = 'rgba(255,255,255,.055)'; ctx.lineWidth = 0.5;
      for (var gi = 7; gi <= 13; gi += 2) { ctx.beginPath(); ctx.arc(px(rx + 0.010), py(ry + 0.010), gi, 0, Math.PI * 2); ctx.stroke(); }
      if (vinylPlaying) {
        vinylAngle += 0.038;
        var hx = rx + 0.010 + Math.cos(vinylAngle) * 0.009, hy = ry + 0.010 + Math.sin(vinylAngle) * 0.009;
        circ(hx, hy, px(0.0022), 'rgba(255,195,95,.72)');
      }
      // Arm
      ctx.save(); ctx.translate(px(x + 0.042), py(y + 0.005)); ctx.rotate(vinylPlaying ? 0.36 : 0.14);
      ctx.strokeStyle = '#8A4E1E'; ctx.lineWidth = px(0.003); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, py(0.026)); ctx.stroke();
      ctx.restore();
      // Playing LED
      if (vinylPlaying) {
        var li2 = (Math.sin(time * 0.05) + 1) * 0.5;
        circ(x + 0.046, y + 0.028, px(0.003), 'rgba(75,255,135,1)', li2 * 0.82 + 0.18);
      }
    }

    // ── PIXEL ART DESK ───────────────────────────────────────────
    function drawPixelDesk(ox, oy) {
      // ── SMOOTH DESK (matches room's 2D gradient style) ────────────
      var dw = DW, dh = DH;

      // Legs
      fr(ox + 0.016, oy + dh, 0.018, 0.080, '#3A1808');
      fr(ox + 0.016, oy + dh, 0.018, 0.003, '#5A2810'); // leg top cap
      fr(ox + dw - 0.034, oy + dh, 0.018, 0.080, '#3A1808');
      fr(ox + dw - 0.034, oy + dh, 0.018, 0.003, '#5A2810');

      // Hutch back panel (dark leather/felt texture above surface)
      var hH = 0.095; // hutch height
      fr(ox, oy - hH, dw, hH, '#2A1408');
      // Hutch top rail
      fr(ox, oy - hH, dw, 0.010, '#5A2C10');
      fr(ox, oy - hH, dw, 0.004, 'rgba(160,90,40,.40)');
      // Hutch bottom rail (sits on desk surface)
      fr(ox, oy - 0.008, dw, 0.008, '#4A2010');
      // Hutch felt/leather inset
      fr(ox + 0.016, oy - hH + 0.012, dw - 0.032, hH - 0.022, '#1A0E06');
      fr(ox + 0.016, oy - hH + 0.012, dw - 0.032, 0.005, '#2E1C0A'); // inset top edge
      fr(ox + 0.016, oy - hH + 0.012, 0.005, hH - 0.022, '#2E1C0A'); // inset left edge
      // Hutch side panels
      fr(ox, oy - hH, 0.014, hH, '#5A2C10');
      fr(ox, oy - hH, 0.006, hH, 'rgba(160,90,40,.30)');
      fr(ox + dw - 0.014, oy - hH, 0.014, hH, '#3A1C08');

      // Desktop surface — warm wood gradient
      ctx.fillStyle = linG(ox, oy, ox, oy + dh, [[0, '#7A4020'], [0.3, '#5A2C12'], [1, '#3E1C08']]);
      ctx.fillRect(px(ox), py(oy), px(dw), py(dh));
      // Grain lines (subtle)
      ctx.strokeStyle = 'rgba(0,0,0,.09)'; ctx.lineWidth = 0.5;
      for (var gi = 0; gi < 6; gi++) {
        var gx2 = ox + 0.04 + gi * (dw - 0.08) / 5;
        ctx.beginPath(); ctx.moveTo(px(gx2), py(oy)); ctx.lineTo(px(gx2), py(oy + dh)); ctx.stroke();
      }
      // Top edge highlight
      fr(ox, oy, dw, 0.006, 'rgba(180,100,40,.35)');
      fr(ox, oy, dw, 0.002, 'rgba(230,150,65,.25)');
      // Bottom edge shadow
      fr(ox, oy + dh - 0.005, dw, 0.005, 'rgba(0,0,0,.22)');
      // Left highlight
      fr(ox, oy, 0.006, dh, 'rgba(160,85,30,.22)');
      // Right shadow
      fr(ox + dw - 0.005, oy, 0.005, dh, 'rgba(0,0,0,.20)');

      // Drawer outlines (suggested, not pixel-art)
      // Left pedestal drawers
      for (var di = 0; di < 3; di++) {
        var dlY = oy + 0.016 + di * (dh * 0.26);
        fr(ox + 0.006, dlY, dw * 0.30, dh * 0.22, 'rgba(0,0,0,.06)');
        fr(ox + 0.006, dlY, dw * 0.30, 0.003, 'rgba(200,120,50,.15)');
        // Drawer handle
        fr(ox + 0.024, dlY + dh * 0.09, 0.042, 0.007, '#C89028');
        fr(ox + 0.024, dlY + dh * 0.09, 0.042, 0.003, '#E8B840');
      }
      // Right pedestal drawers
      for (var di2 = 0; di2 < 3; di2++) {
        var drY = oy + 0.016 + di2 * (dh * 0.26);
        fr(ox + dw - 0.006 - dw * 0.30, drY, dw * 0.30, dh * 0.22, 'rgba(0,0,0,.06)');
        fr(ox + dw - 0.006 - dw * 0.30, drY, dw * 0.30, 0.003, 'rgba(200,120,50,.15)');
        fr(ox + dw - 0.006 - dw * 0.30 + 0.018, drY + dh * 0.09, 0.042, 0.007, '#C89028');
        fr(ox + dw - 0.006 - dw * 0.30 + 0.018, drY + dh * 0.09, 0.042, 0.003, '#E8B840');
      }

      // Shadow under desk
      var ds = ctx.createRadialGradient(px(ox + dw * 0.5), py(oy + dh + 0.055), px(0.01), px(ox + dw * 0.5), py(oy + dh + 0.055), px(dw * 0.70));
      ds.addColorStop(0, 'rgba(0,0,0,.18)'); ds.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ds; ctx.fillRect(px(ox - 0.04), py(oy + dh + 0.060), px(dw + 0.08), py(0.04));
    }

    // ── SMOOTH CHAIR (rear view, facing desk) ────────────────────
    // We see the back of the chair: backrest facing viewer,
    // seat and legs below. Chair is turned toward the desk.
    function drawPixelChair(ox, oy) {
      // 1 pixel unit  — scaled so chair width ≈ CWW
      // ── Proportions ──────────────────────────────────────────────
      var cw = CWW, ch = CHH;
      var bkH = ch * 0.50;           // backrest height
      var sY = oy + bkH;            // top of seat
      var sH = 0.022;               // seat frame thickness
      var legH = ch - bkH - sH;      // leg length below seat
      var postW = 0.016;             // back-post width

      // ── BACK LEGS (dark, behind seat) ────────────────────────────
      fr(ox + 0.012, sY + sH * 0.5, postW, legH * 0.92, '#381208');
      fr(ox + cw - 0.028, sY + sH * 0.5, postW, legH * 0.92, '#381208');

      // ── BACK POSTS (two vertical uprights of backrest frame) ──────
      // Left post
      ctx.fillStyle = linG(ox, oy, ox + postW, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + 0.012), py(oy), px(postW), py(bkH + sH));
      fr(ox + 0.012, oy, postW, 0.007, 'rgba(200,110,50,.50)'); // top cap
      // Right post
      ctx.fillStyle = linG(ox + cw - postW * 1.75, oy, ox + cw, oy, [[0, '#8A3820'], [1, '#5A2010']]);
      ctx.fillRect(px(ox + cw - 0.028), py(oy), px(postW), py(bkH + sH));
      fr(ox + cw - 0.028, oy, postW, 0.007, 'rgba(200,110,50,.50)');

      // ── GREEN BACK CUSHION (between posts) ────────────────────────
      var bcX = ox + 0.012 + postW + 0.003;
      var bcW = (ox + cw - 0.028) - bcX - 0.003;
      var bcH = bkH * 0.86;
      ctx.fillStyle = linG(bcX, oy + 0.010, bcX, oy + 0.010 + bcH, [[0, '#7AAC30'], [0.45, '#5A8C1E'], [1, '#3E6412']]);
      ctx.fillRect(px(bcX), py(oy + 0.010), px(bcW), py(bcH));
      // Cushion highlight sheen
      fr(bcX, oy + 0.010, bcW, 0.008, 'rgba(165,230,65,.50)');
      fr(bcX, oy + 0.010, 0.007, bcH, 'rgba(165,230,65,.28)');
      // Cushion bottom shadow
      fr(bcX, oy + 0.010 + bcH - 0.006, bcW, 0.006, 'rgba(0,0,0,.18)');

      // ── SEAT FRAME ────────────────────────────────────────────────
      ctx.fillStyle = linG(ox, sY, ox, sY + sH, [[0, '#7A3018'], [1, '#4A1C0A']]);
      ctx.fillRect(px(ox), py(sY), px(cw), py(sH));
      fr(ox, sY, cw, 0.006, 'rgba(190,100,45,.45)'); // top rail highlight
      fr(ox, sY + sH - 0.005, cw, 0.005, 'rgba(0,0,0,.25)'); // bottom shadow

      // ── GREEN SEAT CUSHION (on top of seat) ───────────────────────
      var scH = 0.024;
      ctx.fillStyle = linG(ox, sY - scH, ox, sY, [[0, '#88C030'], [0.5, '#608C20'], [1, '#446012']]);
      ctx.fillRect(px(ox + 0.005), py(sY - scH), px(cw - 0.010), py(scH));
      fr(ox + 0.005, sY - scH, cw - 0.010, 0.007, 'rgba(175,240,70,.55)'); // top highlight
      fr(ox + 0.005, sY - scH, 0.008, scH, 'rgba(175,240,70,.30)');         // left highlight
      fr(ox + 0.005, sY - 0.005, cw - 0.010, 0.005, 'rgba(0,0,0,.14)');     // bottom edge

      // ── FRONT LEGS (slightly lighter, closer to viewer) ───────────
      fr(ox + 0.022, sY + sH, 0.015, legH * 0.88, '#6A2C10');
      fr(ox + 0.022, sY + sH, 0.005, legH * 0.88, 'rgba(180,90,35,.30)'); // front highlight
      fr(ox + cw - 0.037, sY + sH, 0.015, legH * 0.88, '#6A2C10');

      // ── STRETCHER BAR (horizontal brace) ─────────────────────────
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.008, '#5A2010');
      fr(ox + 0.026, sY + sH + legH * 0.52, cw - 0.052, 0.003, 'rgba(180,90,35,.22)');

      // ── GROUND SHADOW ─────────────────────────────────────────────
      var csh = ctx.createRadialGradient(
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(0.005),
        px(ox + cw * 0.5), py(oy + ch + 0.018), px(cw * 0.65)
      );
      csh.addColorStop(0, 'rgba(0,0,0,.22)'); csh.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = csh;
      ctx.fillRect(px(ox - 0.02), py(oy + ch), px(cw + 0.04), py(0.06));
    }

    // ── ZONES ─────────────────────────────────────────────────────
    var zones = [
      { x: SX, y: SY, w: SW, h: SH, title: 'Journal Archive', sub: 'all your past entries', key: 'archive' },
      { x: DX, y: DY - 0.055, w: DW, h: DH + 0.11, title: 'Writing Desk', sub: 'start a new entry', key: 'write' },
      { x: CX - 0.01, y: CY, w: 0.22, h: 0.35, title: 'The Chair', sub: 'mood check', key: 'mood' },
      { x: LX - 0.062, y: LY - 0.012, w: 0.112, h: 0.60, title: 'Floor Lamp', sub: 'click to toggle light', lamp: true },
      { x: WX - 0.044, y: WY - 0.022, w: WW + 0.09, h: WH + 0.044, title: 'The Window', sub: 'soft light from outside', key: 'home' },
      { x: 0.10, y: FY + 0.055, w: 0.10, h: 0.12, title: 'Your Bunny', sub: 'sleeping peacefully', key: 'cat' },
      { x: SX, y: SY + 0.010, w: 0.045, h: 0.130, title: 'Mood Plant', sub: journalDays >= 5 ? 'thriving' : 'needs your attention', key: 'plant' },
      { x: DX, y: DY - 0.085, w: 0.042, h: 0.055, title: 'Firefly Jar', sub: 'glowing thoughts', key: 'jar' },
      { x: CX + CWW + 0.008, y: CY + CHH * 0.54, w: 0.062, h: 0.050, title: 'Record Player', sub: 'click to play', vinyl: true },
    ];

    var TIP = document.getElementById('tip'), TTe = document.getElementById('ttt'), TSe = document.getElementById('tts');

    canv.addEventListener('mousemove', function (e) {
      mouseX = e.clientX / W; mouseY = e.clientY / H;
      var mx = mouseX, my = mouseY, f = null;
      for (var i = 0; i < zones.length; i++) { var z = zones[i]; if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) { f = z; break; } }
      hov = f; canv.style.cursor = f ? 'pointer' : 'crosshair';
      if (f) {
        TTe.textContent = '&#10022; ' + f.title; TSe.innerHTML = '&#10022; ' + f.title + '</div><div class="ts">' + f.sub;
        TTe.textContent = f.title; TSe.textContent = f.sub;
        TIP.style.left = Math.min(e.clientX + 18, W - 220) + 'px';
        TIP.style.top = Math.max(e.clientY - 44, 10) + 'px';
        TIP.style.opacity = '1';
      } else { TIP.style.opacity = '0'; }
    });

    canv.addEventListener('click', function (e) {
      var mx = e.clientX / W, my = e.clientY / H;
      for (var i = 0; i < zones.length; i++) {
        var z = zones[i];
        if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) {
          if (z.lamp) { toggleLamp(); return; }
          if (z.vinyl) { toggleMusic(); return; }
          if (z.key === 'write') { location.href = '/journal'; return; }
          if (z.key === 'archive') { location.href = '/dashboard'; return; }
          if (z.key) { openM(z.key); return; }
        }
      }
    });

    canv.addEventListener('mouseleave', function () { TIP.style.opacity = '0'; hov = null; });

    function loop() { time++; draw(); requestAnimationFrame(loop); }
    resize();
    loop();
  </script>
