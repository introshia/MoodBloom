<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBloom | 404 Page Not Found</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="manifest" href="/static/manifest.json">

    <style>
        :root {
            --bg-canvas: #F7F7F8;
            --text-black: #000000;
            --text-gray: #333333;
            --color-cyan: #00D9FF;
            --color-yellow: #FFEB3B;
            --color-mint: #00E5A0;
            --white: #FFFFFF;
            --border: 1px solid #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-black);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 40px;
        }

        /* Reusing Navbar Styling */
        .navbar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--bg-canvas);
            z-index: 100;
        }

        .navbar-logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .navbar-center {
            display: flex;
            gap: 0;
            background: var(--white);
            border: var(--border);
            border-radius: 50px;
            padding: 8px 20px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .navbar-link {
            color: var(--text-black);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 14px;
            transition: color 0.25s;
        }

        .navbar-link:hover {
            color: var(--color-cyan);
        }

        .navbar-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .navbar-contact {
            color: var(--text-black);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn-collaborate {
            background: var(--color-cyan);
            color: var(--text-black);
            border: var(--border);
            border-radius: 50px;
            padding: 10px 22px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-block;
        }

        .btn-collaborate:hover {
            background: var(--text-black);
            color: var(--color-cyan);
        }

        /* 404 Specific Styling - Reusing Hero Classes */
        .error-content {
            text-align: center;
            max-width: 800px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 20px;
            color: var(--text-black);
            letter-spacing: -4px;
        }

        .error-headline {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 24px;
            color: var(--text-black);
            letter-spacing: -1px;
        }

        .error-subtext {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 48px;
            line-height: 1.7;
        }

        /* CTA Button Reused */
        .cta-button {
            display: inline-block;
            background: var(--color-cyan);
            color: var(--text-black);
            border: var(--border);
            border-radius: 50px;
            padding: 14px 32px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .cta-button:hover {
            background: var(--text-black);
            color: var(--color-cyan);
            transform: translateY(-2px);
        }

        /* Reusing Footer Styling */
        .site-footer {
            background: var(--color-yellow);
            color: var(--text-black);
            padding: 80px 40px 40px;
            border-top: var(--border);
        }

        .footer-headline {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 60px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.5fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        .footer-col-header {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .footer-tagline {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            max-width: 250px;
        }

        .footer-links {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--text-black);
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 0.6;
        }

        .footer-newsletter-text {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .newsletter-form {
            display: flex;
            position: relative;
            border-bottom: 2px solid var(--text-black);
            padding-bottom: 8px;
        }

        .newsletter-form input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-black);
            font-size: 0.9rem;
            font-weight: 500;
            width: 100%;
            padding-right: 30px;
        }

        .newsletter-form button {
            background: none;
            border: none;
            cursor: pointer;
            position: absolute;
            right: 0;
            bottom: 8px;
            font-size: 1rem;
            color: var(--text-black);
        }

        .sub-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-legal {
            display: flex;
            gap: 20px;
        }

        .footer-legal a {
            text-decoration: none;
            color: var(--text-black);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .footer-copyright {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 1024px) {
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
            .error-code {
                font-size: 6rem;
            }
        }

        @media (max-width: 600px) {
            .navbar-center {
                display: none;
            }
            .footer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    {% include 'components/_navbar.html' %}

    <main>
        <section class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-headline">Looks like you wandered off the path.</h2>
            <p class="error-subtext">
                Don't worry, every journey has a few detours. <br>
                Let's get you back to blooming.
            </p>
            <a href="{{ url_for('index') }}" class="cta-button">Back to Home</a>
        </section>
    </main>

    {% include 'components/_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
