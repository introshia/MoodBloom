<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBloom | Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="manifest" href="/static/manifest.json">

    <style>
        :root {
            --bg-canvas: #F7F7F8;
            --text-black: #000000;
            --text-gray: #333333;
            --color-cyan: #00D9FF;
            --color-yellow: #FFEB3B;
            --color-mint: #00E5A0;
            --white: #FFFFFF;
            --border: 1px solid #000000;
        }

        body {
            background-color: var(--bg-canvas);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1.6;
            margin: 0;
        }

        .auth-card {
            background: var(--white);
            border: var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .brutal-title {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-black);
            line-height: 1.1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-gray);
            margin-bottom: 30px;
        }

        .form-control {
            background: var(--white);
            border: var(--border);
            border-radius: 4px;
            padding: 12px 14px;
            margin-bottom: 16px;
            color: var(--text-black);
            font-size: 0.95rem;
        }

        .form-control::placeholder {
            color: var(--text-gray);
            opacity: 0.7;
        }

        .form-control:focus {
            background: var(--white);
            border: 2px solid var(--text-black);
            outline: none;
            box-shadow: none;
        }

        .btn-brutal {
            background-color: var(--color-cyan);
            color: var(--text-black);
            border: var(--border);
            border-radius: 50px;
            padding: 12px;
            width: 100%;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-brutal:hover {
            background-color: var(--text-black);
            color: var(--color-cyan);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--text-black);
            text-decoration: underline;
            font-weight: 700;
        }

        .auth-links a:hover {
            color: var(--color-cyan);
            background: var(--text-black);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .auth-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    {% include 'components/_navbar.html' %}

    <div class="auth-card">
        <h1 class="brutal-title">Begin</h1>
        <p class="subtitle">Secure your pages and start writing.</p>

        <form action="/register" method="POST">
            <input type="text" name="username" class="form-control" placeholder="Choose a Pen Name" required>
            <input type="password" name="password" class="form-control" placeholder="Create a Password" required>
            <button type="submit" class="btn-brutal">Bind This Almanac</button>
        </form>

        <div class="auth-links">
            <p>Already bound an almanac? <a href="{{ url_for('login') }}">Log in here</a></p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>

</html>
