<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodBloom | {% block title %}Welcome{% endblock %}</title>

    <!-- External Assets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;500;600;700&display=swap" rel="stylesheet">

    <!-- App Manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Core Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block head %}{% endblock %}
</head>

<body>
    {% include 'components/_navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'components/_footer.html' %}

    <!-- Common JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>AOS.init({ once: true, offset: 50, duration: 800 });</script>

    <!-- Global Logic -->
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.log('Service Worker Failed!', err));
            });
        }

        // Theme Toggle Persistence
        function initTheme() {
            const toggle = document.getElementById('theme-toggle');
            const body = document.body;
            if (!toggle) return;
            const icon = toggle.querySelector('i');

            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-theme');
                if (icon) icon.className = 'fa-solid fa-sun';
            }

            toggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                const isDark = body.classList.contains('dark-theme');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                if (icon) icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
                
                if (typeof gsap !== 'undefined') {
                    gsap.fromTo(toggle, { scale: 0.8 }, { scale: 1, duration: 0.3, ease: "back.out(2)" });
                }
            });
        }
        initTheme();
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
